name: Docker Build and Publish
description: Build and publish Docker images with caching support

inputs:
  image_name:
    description: 'Docker image name (e.g., consensys/linea-coordinator)'
    required: true
  image_tags:
    description: 'Comma-separated list of docker image tags to apply (e.g. "0.3.4-20260511-935ef04,0.3.4-20260511-935ef04-rc1"). The first entry is treated as the primary tag; all entries are pushed when push_image is true. Duplicates and empty entries will be dropped.'
    required: true
  develop_tag:
    description: 'Develop tag (used when on main branch)'
    required: false
    default: ''
  push_image:
    description: 'Whether to push the image to registry'
    required: false
    default: 'false'
  dockerfile_path:
    description: 'Path to Dockerfile'
    required: true
  docker_context:
    description: 'Docker build context'
    required: false
    default: '.'
  build_args:
    description: 'Docker build arguments (multiline)'
    required: false
    default: ''
  build_secrets:
    description: 'Docker build secrets (one per line, in buildx --secret format: id=mysecret,src=<path> or "id=mysecret,env=VAR_NAME")'
    required: false
    default: ''
  build_contexts:
    description: 'Docker build contexts (multiline)'
    required: false
    default: ''
  requires_qemu:
    description: 'Whether QEMU setup is required for multi-arch builds'
    required: false
    default: 'false'
  push_platforms:
    description: 'Platforms to build for when pushing'
    required: false
    default: 'linux/amd64,linux/arm64'
  save_artifact:
    description: 'Whether to save and upload the Docker image as an artifact (only applies when push_image is false)'
    required: false
    default: 'false'
  artifact_name:
    description: 'Name for the uploaded artifact (required when save_artifact is true)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set tags
      id: set-tags
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_TAGS: ${{ inputs.image_tags }}
        DEVELOP_TAG: ${{ inputs.develop_tag }}
      run: |
        set -euo pipefail

        # Parse image_tags (comma-separated). The first non-empty entry is the
        # "primary" tag — used for the local build/load and `docker save`. All
        # entries get pushed when push_image=true. Optionally append develop_tag
        # when running on main.
        TAGS_RAW=()
        if [[ -n "${IMAGE_TAGS}" ]]; then
          IFS=',' read -ra PARSED <<< "${IMAGE_TAGS}"
          for t in "${PARSED[@]}"; do
            # Trim surrounding whitespace.
            t="${t#"${t%%[![:space:]]*}"}"
            t="${t%"${t##*[![:space:]]}"}"
            [[ -n "${t}" ]] && TAGS_RAW+=("${t}")
          done
        fi
        if [[ "${{ github.ref }}" == "refs/heads/main" ]] && [[ -n "${DEVELOP_TAG}" ]]; then
          TAGS_RAW+=("${DEVELOP_TAG}")
        fi

        if [[ ${#TAGS_RAW[@]} -eq 0 ]]; then
          echo "::error::image_tags is empty — this usually means the upstream version-tag job was cancelled or failed. Failing early to avoid an invalid Docker tag."
          exit 1
        fi

        PRIMARY_TAG="${TAGS_RAW[0]}"

        # De-duplicate while preserving first-occurrence order.
        declare -A SEEN=()
        TAGS=""
        for t in "${TAGS_RAW[@]}"; do
          if [[ -z "${SEEN[$t]:-}" ]]; then
            SEEN[$t]=1
            TAGS+="${TAGS:+,}${IMAGE_NAME}:${t}"
          fi
        done

        echo "primary_tag=${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
        echo "primary_image=${IMAGE_NAME}:${PRIMARY_TAG}" >> "$GITHUB_OUTPUT"
        echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU
      if: ${{ inputs.requires_qemu == 'true' }}
      uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0
      with:
        platforms: 'arm64,arm'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

    - name: Configure cache
      id: cache-config
      shell: bash
      run: |
        if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
          echo "cache_from_test=" >> $GITHUB_OUTPUT
          echo "cache_from_push=" >> $GITHUB_OUTPUT
          echo "cache_to_push=" >> $GITHUB_OUTPUT
        else
          echo "cache_from_test=type=registry,ref=${{ inputs.image_name }}:buildcache-amd64" >> $GITHUB_OUTPUT
          echo "cache_from_push<<EOF" >> $GITHUB_OUTPUT
          echo "type=registry,ref=${{ inputs.image_name }}:buildcache-amd64,platform=linux/amd64" >> $GITHUB_OUTPUT
          echo "type=registry,ref=${{ inputs.image_name }}:buildcache-arm64,platform=linux/arm64" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "cache_to_push<<EOF" >> $GITHUB_OUTPUT
          echo "type=registry,ref=${{ inputs.image_name }}:buildcache-amd64,mode=max,platform=linux/amd64" >> $GITHUB_OUTPUT
          echo "type=registry,ref=${{ inputs.image_name }}:buildcache-arm64,mode=max,platform=linux/arm64" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        fi

    # Build for testing (when push_image is false)
    - name: Build for testing
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      if: ${{ inputs.push_image == 'false' }}
      with:
        context: ${{ inputs.docker_context }}
        build-contexts: ${{ inputs.build_contexts }}
        file: ${{ inputs.dockerfile_path }}
        platforms: linux/amd64
        load: true
        push: false
        tags: ${{ steps.set-tags.outputs.primary_image }}
        secrets: ${{ inputs.build_secrets }}
        build-args: ${{ inputs.build_args }}
        cache-from: ${{ steps.cache-config.outputs.cache_from_test }}

    - name: Save Docker image as artifact
      if: ${{ inputs.save_artifact == 'true' }}
      shell: bash
      run: |
        docker save ${{ steps.set-tags.outputs.primary_image }} | gzip > ${{ inputs.artifact_name }}-docker-image.tar.gz

    - name: Upload Docker image artifact
      if: ${{ inputs.save_artifact == 'true' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.artifact_name }}-docker-image.tar.gz

    # Build & push
    - name: Build & push
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
      if: ${{ inputs.push_image == 'true' }}
      with:
        context: ${{ inputs.docker_context }}
        build-contexts: ${{ inputs.build_contexts }}
        file: ${{ inputs.dockerfile_path }}
        platforms: ${{ inputs.push_platforms }}
        push: true
        tags: ${{ steps.set-tags.outputs.tags }}
        secrets: ${{ inputs.build_secrets }}
        build-args: ${{ inputs.build_args }}
        cache-from: ${{ steps.cache-config.outputs.cache_from_push }}
        cache-to: ${{ steps.cache-config.outputs.cache_to_push }}
