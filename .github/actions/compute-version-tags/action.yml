---
name: Compute version tags
description: 'Composite action to compute the version tags for release'

outputs:
  commit_tag:
    description: commit tag
    value: ${{ steps.compute_version_tags.outputs.COMMIT_TAG }}

  last_commit_tag:
    description: last commit tag
    value: ${{ steps.compute_version_tags.outputs.LAST_COMMIT_TAG }}

  develop_tag:
    description: develop tag
    value: ${{ steps.compute_version_tags.outputs.DEVELOP_TAG }}

runs:
  using: "composite"
  steps:
    - name: Compute version tags
      id: compute_version_tags
      shell: bash
      run: |
        set -euo pipefail

        # For PR, GITHUB_SHA or HEAD is NOT the last commit pushed onto the PR branch -
        # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#pull_request
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          commit_sha="${{ github.event.pull_request.head.sha }}"
          last_sha="${{ github.event.before }}"
        else
          # Use HEAD instead of GITHUB_SHA because we want the latest commit hash
          # after a potential CHANGELOG.md update commit pushed earlier in the run.
          commit_sha="HEAD"
          last_sha="HEAD~1"
        fi

        COMMIT_TAG=$(git rev-parse --short=7 "${commit_sha}")

        # LAST_COMMIT_TAG can legitimately be unresolvable:
        #   - workflow_dispatch (github.event.before is empty)
        #   - first commit on a new branch (no HEAD~1)
        #   - shallow checkout with fetch-depth=1
        # Silently emit an empty value in those cases so callers can decide.
        LAST_COMMIT_TAG=""
        if [[ -n "${last_sha}" ]]; then
          LAST_COMMIT_TAG=$(git rev-parse --short=7 "${last_sha}" 2>/dev/null || true)
        fi

        {
          echo "COMMIT_TAG=${COMMIT_TAG}"
          echo "LAST_COMMIT_TAG=${LAST_COMMIT_TAG}"
          echo "DEVELOP_TAG=develop"
        } >> "$GITHUB_OUTPUT"
