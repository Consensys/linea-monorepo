name: 'Setup Arithmetization RISC-V Environment'
description: 'Install what is needed for building / testing'
inputs:
  enable-ssh:
    description: 'Enable ability to ssh into session'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
      - name: Setup upterm session
        if: ${{ inputs.enable-ssh == 'true' }}
        uses: lhotari/action-upterm@b0357f23233f5ea6d58947c0c402e0631bab7334 #v1

      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: '1.24.6'
          cache-dependency-path: "**/*.sum"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: '0.17.0-dev.251+0db721ec2'

      - name: Install Rust nightly
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          . "$HOME/.cargo/env"
          rustup component add rust-src --toolchain nightly

      - name: Install mise
        shell: bash
        run: |
          curl https://mise.run | sh
          MISE_DATA_DIR="${RUNNER_TEMP}/mise-data"
          MISE_CACHE_DIR="${RUNNER_TEMP}/mise-cache"
          MISE_WRAPPER_DIR="${RUNNER_TEMP}/mise-bin"
          mkdir -p "${MISE_DATA_DIR}" "${MISE_CACHE_DIR}" "${MISE_WRAPPER_DIR}"
          cat > "${MISE_WRAPPER_DIR}/mise" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          exec flock "${RUNNER_TEMP}/mise.lock" "${HOME}/.local/bin/mise" "$@"
          EOF
          chmod +x "${MISE_WRAPPER_DIR}/mise"
          echo "MISE_DATA_DIR=${MISE_DATA_DIR}" >> "${GITHUB_ENV}"
          echo "MISE_CACHE_DIR=${MISE_CACHE_DIR}" >> "${GITHUB_ENV}"
          echo "${MISE_WRAPPER_DIR}" >> "${GITHUB_PATH}"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "${MISE_DATA_DIR}/shims" >> "${GITHUB_PATH}"

      - name: Install riscv64-unknown-elf toolchain
        # Install the riscv64-unknown-elf toolchain
        # Use the xpack-dev-tools/riscv-none-elf-gcc-xpack for riscv64-none-elf-gcc
        # Simlinked riscv64-none-elf-gcc to riscv64-none-elf-gcc
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y binutils-riscv64-unknown-elf time
          XPACK_GCC_VERSION="15.2.0-1"
          XPACK_GCC_DIR="${HOME}/riscv-none-elf-gcc"
          mkdir -p "${XPACK_GCC_DIR}"
          curl --fail --location \
            "https://github.com/xpack-dev-tools/riscv-none-elf-gcc-xpack/releases/download/v${XPACK_GCC_VERSION}/xpack-riscv-none-elf-gcc-${XPACK_GCC_VERSION}-linux-x64.tar.gz" \
            | tar xz --directory="${XPACK_GCC_DIR}" --strip-components=1
          ln -sf "${XPACK_GCC_DIR}/bin/riscv-none-elf-gcc" "${XPACK_GCC_DIR}/bin/riscv64-unknown-elf-gcc"
          echo "${XPACK_GCC_DIR}/bin" >> "${GITHUB_PATH}"


