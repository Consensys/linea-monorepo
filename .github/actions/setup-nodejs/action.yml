name: 'Setup nodes'
description: 'Setup nodejs'

inputs:
  pnpm-install-options:
    description: 'The options to pass to pnpm install'
    required: true
    default: '--frozen-lockfile --prefer-offline --ignore-scripts'
  commands:
    description: |
      Optional newline-separated list of commands to run after install.
      Example:
        commands: |
          pnpm run build
          pnpm run build:libs
    required: false
    default: ''

outputs:
  node-version:
    description: 'Resolved Node.js version'
    value: ${{ steps.versions.outputs.node }}
  pnpm-version:
    description: 'Resolved pnpm version'
    value: ${{ steps.versions.outputs.pnpm }}

runs:
  using: 'composite'
  steps:
    - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      name: setup-pnpm

    - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      name: setup-nodejs
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'
    
    - id: versions
      name: Capture versions
      shell: bash
      run: |
        echo "node=$(node -v | sed 's/^v//')" >> "$GITHUB_OUTPUT"
        echo "pnpm=$(pnpm -v)" >> "$GITHUB_OUTPUT"

    - name: pnpm install
      run: pnpm i ${{ inputs.pnpm-install-options }}
      shell: bash

    - name: Run post-install commands
      if: inputs.commands != ''
      shell: bash
      run: ${{ inputs.commands }}
