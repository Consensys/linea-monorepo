name: bridge-ui-tests

permissions:
  contents: read
  actions: read

on:
  pull_request:
    branches:
      - main
    paths:
      - "bridge-ui/**"
      - ".github/workflows/bridge-ui-tests.yml"
      - "!bridge-ui/**/*.md"
      - ".nvmrc"
  push:
    branches:
      - main
    paths:
      - "bridge-ui/**"
      - ".github/workflows/bridge-ui-tests.yml"
      - "!bridge-ui/**/*.md"
      - ".nvmrc"

jobs:
  test:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-med
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: actions/cache@v5.0.4
        with:
          path: |
            ~/.npm
            ~/_work/.pnpm-store/v3
            ${{ github.workspace }}/bridge-ui/.next/cache
          key: ${{ runner.os }}-bridge-ui-tests-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-bridge-ui-tests-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build workspace dependencies
        run: |
          pnpm run -F @consensys/linea-sdk-core build
          pnpm run -F @consensys/linea-sdk-viem build

      - name: Typecheck Bridge UI
        run: pnpm run -F bridge-ui check-types

      - name: Run unit tests
        run: pnpm run -F bridge-ui test:unit
        env:
          CI: "true"

  notify:
    needs: [test]
    if: ${{ always() && github.ref == 'refs/heads/main' && contains(needs.*.result, 'failure') }}
    uses: ./.github/workflows/slack-notify-failed-jobs.yml
    with:
      title: "Bridge UI tests workflow failed"
      run_id: ${{ github.run_id }}
    secrets:
      channel_id: ${{ secrets.SLACK_ENGINEERING_ALERTS_CHANNEL_ID }}
      slack_bot_token: ${{ secrets.SLACK_GITHUB_ACTIONS_ALERTS_BOT_TOKEN }}
