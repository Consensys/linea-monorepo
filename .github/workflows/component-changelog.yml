name: "Component Changelog (PR preview)"

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - 'coordinator/**'
      - '!coordinator/CHANGELOG.md'
      - 'cliff.toml'
      - 'commitlint.config.mjs'
      - '.github/workflows/coordinator-changelog.yml'

concurrency:
  group: component-changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-latest-commit-message:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    name: Lint latest PR commit message
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need enough history to resolve the latest PR commit
          fetch-depth: 0
          submodules: false

      - name: Lint latest PR commit with commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed #(v6.2.1)
        with:
          configFile: commitlint.config.mjs
          commitDepth: 1
          failOnWarnings: true
          helpURL: https://www.conventionalcommits.org

  generate-component-changelog:
    needs: lint-latest-commit-message
    if: github.event.pull_request.head.repo.fork == false
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    strategy:
      fail-fast: false
      matrix:
        component: [ coordinator, postman, tx-exclusion-api, besu-package ]
        include:
          - component: coordinator
            include-path: coordinator/**
          - component: postman
            include-path: postman/**
          - component: tx-exclusion-api
            include-path: transaction-exclusion-api/**
          - component: besu-package
            include-path: {tracer,tracer-constraints,besu-plugins/linea-sequencer,linea-besu,linea-besu-package,gradle}/**

    name: Generate ${{ matrix.component }} [Unreleased] changelog & next version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # git-cliff needs full history + tags to compute changelog/version
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Generate ${{ matrix.component }} [Unreleased] changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 #(v4.7.1)
        with:
          config: cliff.toml
          args: >-
            --unreleased
            --include-path "${{ matrix.include-path }}"
            --tag-pattern "releases/${{ matrix.component }}/v*"

      # Install git-cliff directly so we can call --bumped-version without the
      # git-cliff-action post-processing that jq-parses stdout and breaks on
      # prefixed tag output like `releases/coordinator/v0.2.0`.
      - name: Install git-cliff
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 #(v2.75.19)
        with:
          tool: git-cliff

      - name: Compute next ${{ matrix.component }} version (semver)
        id: version
        shell: bash
        run: |
          set -euo pipefail
          next_tag=$(git cliff \
            --config cliff.toml \
            --bumped-version \
            --include-path "${{ matrix.include-path }}" \
            --tag-pattern "releases/${{ matrix.component }}/v*")
          next_semver="${next_tag#releases/${{ matrix.component }}/v}"
          echo "next ${{ matrix.component }} tag:    ${next_tag}"
          echo "next ${{ matrix.component }} semver: ${next_semver}"
          {
            echo "tag=${next_tag}"
            echo "version=${next_semver}"
          } >> "$GITHUB_OUTPUT"

      - name: Post/update ${{ matrix.component }} changelog preview comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 #(v3.0.4)
        with:
          header: ${{ matrix.component }}-changelog-preview
          message: |
            ## ${{ matrix.component }} Changelog Preview (informational)

            **Next proposed version:** `${{ steps.version.outputs.tag }}`

            <details>
            <summary><strong>[Unreleased] diff</strong> (commits touching <code>${{ matrix.component }}/**</code> since latest <code>releases/${{ matrix.component }}/v*</code> tag)</summary>

            ${{ steps.changelog.outputs.content }}

            </details>

            <sub>Generated by <a href="https://github.com/orhun/git-cliff-action">git-cliff-action</a> using <code>cliff.toml</code>. This comment is informational and does not gate the PR.</sub>
