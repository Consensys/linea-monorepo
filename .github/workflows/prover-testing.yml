name: prover-testing

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      commit_tag:
        required: true
        type: string

env:
  GOPROXY: "https://proxy.golang.org"

concurrency:
  group: prover-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  staticcheck:
    # ~1.5 mins saved vs small
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-med
    name: Prover static check
    steps:
    - name: checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: install Go
      uses: actions/setup-go@v5
      with:
        go-version: 1.25.7
        cache-dependency-path: |
              prover/go.sum
    - uses: actions/cache@v5.0.4
      with:
        path: |
          ~/.cache/go-build
          ~/Library/Caches/go-build
          %LocalAppData%\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: gofmt
      working-directory: prover
      run: if [[ -n $(gofmt -l .) ]]; then echo "please run gofmt"; exit 1; fi
    - name: golangci-lint
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 #v8
      with:
          version: v2.11.3
          working-directory: prover
          args: --timeout=5m
    - name: generated files should not be modified
      working-directory: prover
      run: |
        go generate ./...
        git update-index --assume-unchanged go.mod
        git update-index --assume-unchanged go.sum
        if [[ -n $(git status --porcelain) ]]; then echo "git repo is dirty after running go generate -- please don't modify generated files"; echo $(git diff);echo $(git status --porcelain); exit 1; fi

  test:
    strategy:
      matrix:
        go-version: [1.25.7]
    # ~1 min saved vs large
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-xxl
    name: Prover testing
    needs:
      - staticcheck
    env:
      COMMIT_TAG: ${{ inputs.commit_tag }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
    - name: checkout code
      uses: actions/checkout@v6
    - name: install Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache-dependency-path: |
              prover/go.sum
    - uses: actions/cache@v5.0.4
      with:
        path: |
          ~/.cache/go-build
          ~/Library/Caches/go-build
          %LocalAppData%\go-build
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Test with coverage
      working-directory: prover
      run: |
        go test -p=1 -short -tags=nocorset,fuzzlight -timeout=120m -coverprofile=coverage.out -covermode=atomic ./...
    - name: Stage prover coverage for artifact (fork PR uploads)
      run: |
        mkdir -p ci-prover-coverage
        cp prover/coverage.out ci-prover-coverage/coverage.out
    - name: Upload prover coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: prover-coverage-${{ env.COMMIT_TAG }}
        if-no-files-found: error
        path: ci-prover-coverage/
    - name: Upload prover coverage to Codecov
      if: ${{ env.CODECOV_TOKEN != '' }}
      uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de #v5.5.2
      with:
        fail_ci_if_error: true
        files: ./prover/coverage.out
        flags: prover
        os: linux
        name: codecov-prover
        verbose: true
        token: ${{ secrets.CODECOV_TOKEN }}
    # disabled as it takes many hours to run on the runner
        # - name: Test (32 bits & race)
    #   working-directory: prover
    #   if: matrix.go-version == '1.25.7'
    #   run: |
    #       go test -p=1 -tags=nocorset,fuzzlight -timeout=120m -short -race  ./...
