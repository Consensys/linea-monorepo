name: Review Coordinator

on:
  schedule:
    - cron: '0 0 * * 1' # Every Monday at 12:00am UTC on main
  workflow_dispatch:
    inputs:
      save_review_file:
        description: 'save coordinator-review.md as a workflow artifact.'
        required: false
        type: boolean
        default: false

jobs:
  claude-coordinator-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Fetch previous review findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue list \
            --repo "${{ github.repository }}" \
            --label "coordinator" \
            --label "claude-review" \
            --state all \
            --limit 100 \
            --json body \
            --jq '.[].body' \
            | grep -oE '[a-zA-Z0-9/_.-]+\.(kt|java|scala|groovy):[0-9]+' \
            | sort -u > /tmp/previous-findings.txt || true
          echo "Previously reported locations: $(wc -l < /tmp/previous-findings.txt)"

      - name: Run Claude Coordinator Review
        id: review
        uses: anthropics/claude-code-action@38ec876110f9fbf8b950c79f534430740c3ac009 #v1.0.101
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: --model claude-opus-4-7
          prompt: |
            Before starting your analysis, read the file /tmp/previous-findings.txt.
            It contains file:line references (e.g. `coordinator/src/.../Foo.kt:42`) already
            reported in previous reviews. Skip any finding whose primary file:line location
            appears in that file — do not re-report it even if the issue is still present.

            You are reviewing the full Kotlin/JVM codebase in the `coordinator/` and
            `jvm-libs/` modules of the Linea monorepo.

            The coordinator is the central orchestration service for the Linea rollup — it
            conflates L2 blocks into batches, requests ZK proofs from the prover, submits
            EIP-4844 blobs to L1, and finalizes batches with aggregated proofs.
            The jvm-libs/ modules provide shared libraries used by the coordinator and other
            JVM services in this monorepo.

            Read and analyse the source files under `coordinator/` and `jvm-libs/` directly.

            Focus exclusively on the following categories. For each finding, cite the file
            and line number, explain the issue, and suggest a concrete fix.

            ## 1. Dead Code
            - Unused classes, functions, properties, or parameters
            - Unreachable branches or expressions (e.g. conditions that are always true/false)
            - Imports or dependencies that are never referenced

            ## 2. Duplicated / Similar Code
            - Copy-pasted logic that could be extracted into a shared function or class
            - Near-duplicate implementations across coordinators (e.g. BlobSubmission vs
              AggregationFinalization coordinators share structural patterns)
            - Repeated inline configuration or constant values that should be named constants

            ## 3. Anti-patterns and Code Smells
            - Kotlin-specific: Java-style null checks instead of `?.`/`?:`, mutable `var`
              where `val` suffices, raw platform types, using `!!` without justification
            - OOP: God classes, feature envy, inappropriate intimacy between components
            - Coordinator-specific: business logic leaking into config/mapper classes,
              side effects inside data classes or constructors
            - Exception handling: swallowing exceptions silently, catching `Throwable`/
              `Exception` too broadly, ignoring `SafeFuture` completion errors

            ## 4. Concurrency Issues
            - Race conditions on shared mutable state across coroutines or futures
            - Missing or incorrect use of `synchronized`, `@Volatile`, or atomic types
            - `SafeFuture` / `CompletableFuture` chains that lose errors (missing
              `whenException` / `exceptionally` handlers)
            - Blocking calls (`Thread.sleep`, `.get()`, `.join()`) on async threads
            - Incorrect assumption about which thread a callback executes on

            Do not report style nits, missing docs, or issues outside these four categories.
            If no issues are found in a category, write "No issues found." without a checkbox.

            ## Output Format

            Format your response as a GitHub issue body. Prefix EACH individual finding with
            a plain list marker `- ` (NO checkbox on the finding itself). Link the file
            citation as a markdown link using this exact format (the URL will be constructed
            from the commit SHA ${{ github.sha }} and the repo ${{ github.repository }}):

              [`path/to/File.kt:line`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/path/to/File.kt#Lline)

            The displayed text must be the relative file path and line number only — no
            hostname or repository prefix. Then append exactly these four triage sub-items,
            indented two spaces, all left unchecked:

              - [ ] ❌ won't fix
              - [ ] ❌ false positive
              - [ ] 🤖 to be fixed
              - [ ] ✅ addressed/fixed

            Reviewers will later tick exactly one of those sub-items to record the triage
            decision. Do NOT put `- [ ]` on the finding line itself.

            Example format:

            ## Dead Code
            - [`coordinator/src/.../Foo.kt:42`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/coordinator/src/.../Foo.kt#L42) — `unusedParam` is never read. Remove the parameter and update all call sites.
              - [ ] ❌ won't fix
              - [ ] ❌ false positive
              - [ ] 🤖 to be fixed
              - [ ] ✅ addressed/fixed

            ## Duplicated / Similar Code
            No issues found.

            ## Anti-patterns and Code Smells
            - [`coordinator/src/.../Bar.kt:17`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/coordinator/src/.../Bar.kt#L17) — Uses `!!` on a nullable result from `findOrNull` with no justification. Replace with `?: error("...")` or a safe alternative.
              - [ ] ❌ won't fix
              - [ ] ❌ false positive
              - [ ] 🤖 to be fixed
              - [ ] ✅ addressed/fixed

            ## Concurrency Issues
            - [`coordinator/src/.../Baz.kt:88`](${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/coordinator/src/.../Baz.kt#L88) — `.get()` called on a `CompletableFuture` on the event-loop thread, which will block it. Use `.thenApply` instead.
              - [ ] ❌ won't fix
              - [ ] ❌ false positive
              - [ ] 🤖 to be fixed
              - [ ] ✅ addressed/fixed

            Output ONLY the review content, nothing else.

      - name: Create GitHub Issue with findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_BRANCH: ${{ github.ref_name }}
          EXECUTION_FILE: ${{ steps.review.outputs.execution_file }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="${INPUT_BRANCH}"
          COMMIT=$(git rev-parse --short=7 HEAD)
          TITLE="Coordinator review ${DATE} ${BRANCH} ${COMMIT}"

          REVIEW_BODY=""
          if [ -n "${EXECUTION_FILE}" ] && [ -f "${EXECUTION_FILE}" ]; then
            REVIEW_BODY=$(jq -r '[.[] | select(.type=="result") | .result] | last // ""' "${EXECUTION_FILE}")
          fi

          if [ -z "${REVIEW_BODY}" ]; then
            REVIEW_BODY="No review output — Claude may not have produced output. See the \`claude-execution-output\` workflow artifact for debugging."
          fi

          printf '%s' "${REVIEW_BODY}" > /tmp/coordinator-review.md

          gh issue create \
            --title "${TITLE}" \
            --body-file /tmp/coordinator-review.md \
            --label "coordinator" \
            --label "claude-review" \
            --repo "${{ github.repository }}"

      - name: Upload review file
        if: ${{ github.event.inputs.save_review_file == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: coordinator-review
          path: /tmp/coordinator-review.md

      - name: Upload Claude execution log
        if: ${{ always() && steps.review.outputs.execution_file != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: claude-execution-output
          path: ${{ steps.review.outputs.execution_file }}
