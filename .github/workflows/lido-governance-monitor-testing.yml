name: lido-governance-monitor-testing

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      commit_tag:
        required: true
        type: string

concurrency:
  group: lido-governance-monitor-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run-tests:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-med
    name: lido-governance-monitor-testing
    env:
      COMMIT_TAG: ${{ inputs.commit_tag }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs

      - name: Build
        run: |
          pnpm --filter @consensys/linea-shared-utils build
          DATABASE_URL=postgresql://localhost:5432/dummy pnpm --filter @consensys/lido-governance-monitor db:generate
          pnpm --filter @consensys/lido-governance-monitor build

      - name: Run tests and generate coverage report
        run: |
          pnpm --filter @consensys/linea-shared-utils test
          pnpm --filter @consensys/lido-governance-monitor test

      - name: Stage TS coverage for artifact (fork PR uploads)
        run: |
          mkdir -p ci-lido-coverage
          cp ts-libs/linea-shared-utils/coverage/lcov.info ci-lido-coverage/shared-utils-lcov.info
          cp operations/native-yield/lido-governance-monitor/coverage/lcov.info ci-lido-coverage/lido-governance-monitor-lcov.info

      - name: Upload TS coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lido-ts-coverage-${{ env.COMMIT_TAG }}
          if-no-files-found: error
          path: ci-lido-coverage/

      - name: Upload linea-shared-utils coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          fail_ci_if_error: true
          files: ./ts-libs/linea-shared-utils/coverage/lcov.info
          flags: linea-shared-utils
          os: linux
          name: codecov-linea-shared-utils-lido
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload lido-governance-monitor coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          fail_ci_if_error: true
          files: ./operations/native-yield/lido-governance-monitor/coverage/lcov.info
          flags: lido-governance-monitor
          os: linux
          name: codecov-lido-governance-monitor
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
