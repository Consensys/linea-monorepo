name: "Coordinator Changelog (PR preview)"

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches:
      - main
    paths:
      - 'coordinator/**'
      - 'cliff.toml'
      - 'commitlint.config.mjs'
      - '.github/workflows/coordinator-changelog.yml'

concurrency:
  group: coordinator-changelog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-latest-commit-message:
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    name: Lint latest PR commit message
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Need enough history to resolve the latest PR commit
          fetch-depth: 0
          submodules: false

      - name: Lint latest PR commit with commitlint
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed #(v6.2.1)
        with:
          configFile: commitlint.config.mjs
          commitDepth: 1
          failOnWarnings: true
          helpURL: https://www.conventionalcommits.org

  generate-coordinator-changelog:
    needs: lint-latest-commit-message
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    name: Generate coordinator [Unreleased] changelog & next version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # git-cliff needs full history + tags to compute changelog/version
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Generate coordinator [Unreleased] changelog
        id: changelog
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 #(v4.7.1)
        with:
          config: cliff.toml
          args: >-
            --unreleased
            --include-path "coordinator/**"
            --tag-pattern "releases/coordinator/v*"

      - name: Compute next coordinator version (semver)
        id: version
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 #(v4.7.1)
        with:
          config: cliff.toml
          args: >-
            --bumped-version
            --include-path "coordinator/**"
            --tag-pattern "releases/coordinator/v*"

      - name: Post/update changelog preview comment on PR
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 #(v3.0.4)
        with:
          header: coordinator-changelog-preview
          message: |
            ## Coordinator Changelog Preview (informational)

            **Next proposed version:** `${{ steps.version.outputs.version }}`

            <details>
            <summary><strong>[Unreleased] diff</strong> (commits touching <code>coordinator/**</code> since latest <code>releases/coordinator/v*</code> tag)</summary>

            ${{ steps.changelog.outputs.content }}

            </details>

            <sub>Generated by <a href="https://github.com/orhun/git-cliff-action">git-cliff-action</a> using <code>cliff.toml</code>. This comment is informational and does not gate the PR.</sub>
