name: Arithmetization zkc interpreter benchmark (base vs optim)

# Benchmark of zkc interpreter for guest programs on
# two branches, the base branch and the optim branch.
# Guest programs are the Keccak and Blake programs in the arithmetization/src/test/examples 
# directory.

# Designed to give a reliable paired comparison on a
# single runner: one untimed warmup per branch, then N alternating (opt, base)
# timed iterations with a per-iteration cache reset + brief cool-down to keep
# the machine state similar across runs.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'arithmetization/**'
      - '.github/actions/setup-arithmetization-riscv/**'
      - '.github/workflows/arithmetization-*.yml'
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Baseline branch / commit ref'
        required: true
        type: string
      optim_ref:
        description: 'Optim-test branch / commit ref'
        required: true
        type: string
      iterations:
        description: 'Number of timed iterations per (workload, variant)'
        required: false
        type: number
        default: 5
      go_corset_ref:
        description: 'go-corset commit/branch/tag for zkc (defaults to main)'
        required: false
        type: string
        default: main
      n_vectors_keccak:
        description: 'Keccak vectors batched per zkc exec (one timed run per iteration)'
        required: false
        type: number
        default: 100
      n_vectors_blake:
        description: 'Blake vectors run sequentially (N timed runs per iteration, aggregated)'
        required: false
        type: number
        default: 3

permissions:
  contents: read
  actions: read

jobs:
  bench:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-large
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Environment
        uses: ./.github/actions/setup-arithmetization-riscv

      - name: Install zkc
        run: make -C arithmetization install-zkc
        env:
          GO_CORSET_REF_FOR_ZKC: ${{ inputs.go_corset_ref || 'main' }}

      - name: Add worktrees for base and optim branches
        run: |
          set -eux
          BASE_REF="${{ inputs.base_ref || github.base_ref }}"
          OPTIM_REF="${{ inputs.optim_ref || github.event.pull_request.head.sha || github.sha }}"
          git fetch origin "${BASE_REF}":refs/bench/base
          git fetch origin "${OPTIM_REF}":refs/bench/optim
          git worktree add /tmp/wt-base refs/bench/base
          git worktree add /tmp/wt-optim refs/bench/optim

      - name: Build ELFs, helpers, and per-vector JSONs once (on optim worktree)
        run: |
          set -eux
          mkdir -p /tmp/bench/logs /tmp/bench/json/blake
          cd /tmp/wt-optim/arithmetization/src/test/examples
          # Keccak: one batched JSON at a stable workflow-controlled path.
          make keccak-rust-json \
            KECCAK_N_VECTORS=${{ inputs.n_vectors_keccak || 100 }} \
            KECCAK_JSON=/tmp/keccak.json
          # Blake: N per-vector JSONs at a stable workflow-controlled directory.
          make blake-rust-json \
            BLAKE_ACCEPTS=rust/src/blake/blake.all \
            BLAKE_N_VECTORS=${{ inputs.n_vectors_blake || 3 }} \
            BLAKE_JSON_DIR=/tmp/bench/json/blake
          # Helper binaries used by the timing loop and the summary step.
          go build -o /tmp/bench/cache_thrasher       ./scripts/cache_thrasher/main.go
          go build -o /tmp/bench/render_bench_summary ./scripts/render_bench_summary/main.go

      - name: Run benchmark (warmup + alternating timed iterations with per-iter cache reset)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p /tmp/bench/logs

          reset_state() {
            sync || true
            sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            /tmp/bench/cache_thrasher 256 >/dev/null 2>&1 || true
            sleep 5
          }

          run_keccak() {  # $1=variant (opt|base)  $2=label (warmup|iter#)
            local zkc_main="/tmp/wt-${1}/arithmetization/src/main/riscv/main.zkc"
            /usr/bin/time -v zkc execute -v -q /tmp/keccak.json "$zkc_main" \
              > "/tmp/bench/logs/keccak_${1}_${2}.log" 2>&1
          }

          run_blake() {   # $1=variant  $2=label. Runs all N vectors, one log file per vector.
            local zkc_main="/tmp/wt-${1}/arithmetization/src/main/riscv/main.zkc"
            for json in /tmp/bench/json/blake/*.json; do
              local n
              n=$(basename "$json" .json)
              /usr/bin/time -v zkc execute -v -q "$json" "$zkc_main" \
                > "/tmp/bench/logs/blake_${1}_${2}_${n}.log" 2>&1
            done
          }

          for wl in keccak blake; do
            # Untimed warmup: optim then base. Primes the page cache and shared libs
            # so both branches face an already-warm filesystem on iteration 1.
            reset_state; run_${wl} opt  warmup || true
            reset_state; run_${wl} base warmup || true
            # Timed runs: opt_i, base_i alternating, starting with opt.
            for i in $(seq 1 ${{ inputs.iterations || 5 }}); do
              reset_state; run_${wl} opt  "$i"
              reset_state; run_${wl} base "$i"
            done
          done

      - name: Parse logs and emit summary
        run: |
          /tmp/bench/render_bench_summary \
            -logs /tmp/bench/logs \
            -iters ${{ inputs.iterations || 5 }} \
            -blake-n ${{ inputs.n_vectors_blake || 3 }} \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zkc-bench-logs
          path: /tmp/bench/logs
