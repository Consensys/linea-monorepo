name: Arithmetization zkc interpreter benchmark (base vs optim)

# Benchmark of zkc interpreter for guest programs on
# two branches, the base branch and the optim branch.
# Guest programs are the Keccak and Blake programs in the arithmetization/src/test/examples 
# directory.

# Designed to give a reliable paired comparison on a
# single runner: one untimed warmup per branch, then N alternating (opt, base)
# timed iterations with a per-iteration cache reset + brief cool-down to keep
# the machine state similar across runs.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'arithmetization/**'
      - '.github/actions/setup-arithmetization-riscv/**'
      - '.github/workflows/arithmetization-*.yml'
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Baseline branch / commit ref'
        required: true
        type: string
      optim_ref:
        description: 'Optim-test branch / commit ref'
        required: true
        type: string
      iterations:
        description: 'Number of timed iterations per (workload, variant)'
        required: false
        type: number
        default: 5
      go_corset_ref:
        description: 'go-corset commit/branch/tag for zkc (defaults to main)'
        required: false
        type: string
        default: main
      n_vectors_keccak:
        description: 'Keccak vectors batched per zkc exec (one timed run per iteration)'
        required: false
        type: number
        default: 10
      n_vectors_blake:
        description: 'Blake vectors run sequentially (N timed runs per iteration, aggregated)'
        required: false
        type: number
        default: 3

permissions:
  contents: read
  actions: read

env:
  BENCH_ROOT: ${{ runner.temp }}/zkc-bench
  WT_BASE: ${{ runner.temp }}/zkc-bench/wt-base
  WT_OPTIM: ${{ runner.temp }}/zkc-bench/wt-optim
  BENCH_LOGS: ${{ runner.temp }}/zkc-bench/logs
  KECCAK_JSON: ${{ runner.temp }}/zkc-bench/keccak.json
  BLAKE_JSON_DIR: ${{ runner.temp }}/zkc-bench/json/blake
  KECCAK_N_VECTORS: ${{ inputs.n_vectors_keccak || 10 }}
  BENCH_ITERS: ${{ inputs.iterations || 2 }}
  BLAKE_N_VECTORS: ${{ inputs.n_vectors_blake || 3 }}

jobs:
  bench:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-large
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Environment
        uses: ./.github/actions/setup-arithmetization-riscv

      - name: Install zkc
        run: make -C arithmetization install-zkc
        env:
          GO_CORSET_REF_FOR_ZKC: ${{ inputs.go_corset_ref || 'main' }}

      - name: Add worktrees for base and optim branches
        run: |
          set -eux
          mkdir -p "${BENCH_ROOT}"
          BASE_REF="${{ inputs.base_ref || github.base_ref }}"
          OPTIM_REF="${{ inputs.optim_ref || github.event.pull_request.head.sha || github.sha }}"
          git fetch origin "${BASE_REF}":refs/bench/base
          git fetch origin "${OPTIM_REF}":refs/bench/optim
          git worktree add "${WT_BASE}" refs/bench/base
          git worktree add "${WT_OPTIM}" refs/bench/optim

      - name: Build ELFs, helpers, and per-vector JSONs once (on optim worktree)
        run: |
          set -eux
          mkdir -p "${BENCH_LOGS}" "${BLAKE_JSON_DIR}"
          cd "${WT_OPTIM}/arithmetization/src/test/examples"
          # Keccak: one batched JSON; KECCAK_N_VECTORS must match the guest ELF build.
          make keccak-rust-json \
            KECCAK_N_VECTORS="${KECCAK_N_VECTORS}" \
            KECCAK_JSON="${KECCAK_JSON}"
          # Blake: N per-vector JSONs at a stable workflow-controlled directory.
          make blake-rust-json \
            BLAKE_ACCEPTS=rust/src/blake/blake.all \
            BLAKE_N_VECTORS="${BLAKE_N_VECTORS}" \
            BLAKE_JSON_DIR="${BLAKE_JSON_DIR}"
          # Helper binaries used by the timing loop and the summary step.
          go build -o "${BENCH_ROOT}/cache_thrasher"       ./scripts/cache_thrasher/main.go
          go build -o "${BENCH_ROOT}/render_bench_summary" ./scripts/render_bench_summary/main.go

      - name: Preflight benchmark dependencies
        shell: bash
        run: |
          set -euo pipefail
          failures=0

          log() {
            echo "$@" | tee -a "${GITHUB_STEP_SUMMARY}"
          }

          check_path() {
            local label="$1"
            local path="$2"
            if [ -e "$path" ]; then
              log "OK   ${label}: $path"
            else
              log "FAIL ${label}: missing path '$path'"
              failures=$((failures + 1))
            fi
          }

          smoke_zkc() {
            local label="$1"
            local zkc_main="$2"
            local log_file="${BENCH_LOGS}/preflight_smoke_${label}.log"
            set +e
            /usr/bin/time -v zkc execute -v -q "${KECCAK_JSON}" "${zkc_main}" \
              >"${log_file}" 2>&1
            local rc=$?
            set -e
            if [ "${rc}" -eq 0 ]; then
              log "OK   smoke ${label}: zkc execute (rc=${rc})"
            else
              log "FAIL smoke ${label}: zkc execute (rc=${rc})"
              if [ "${rc}" -eq 127 ]; then
                log "     rc=127 usually means /usr/bin/time or zkc was not found"
              elif [ "${rc}" -eq 3 ]; then
                log "     rc=3 usually means zkc could not read a .zkc source file"
              elif [ "${rc}" -eq 4 ]; then
                log "     rc=4 usually means zkc execution failed (guest exit / IR panic)"
              fi
              log "     zkc errors from ${log_file}:"
              grep -E 'level=error|machine panic|EXIT CODE|no such file' "${log_file}" \
                | tail -10 | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}" || true
              log "     last 20 lines of ${log_file}:"
              tail -20 "${log_file}" | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}"
              failures=$((failures + 1))
            fi
          }

          log "## Benchmark preflight"
          log ""
          log "Checking commands and files required by the timing loop."
          log ""
          log '```'
          log "BENCH_ROOT=${BENCH_ROOT}"
          log "KECCAK_N_VECTORS=${KECCAK_N_VECTORS}"
          log "BENCH_ITERS=${BENCH_ITERS}"
          log "PATH=${PATH}"
          log "GOPATH=$(go env GOPATH)"
          log "GOBIN=$(go env GOBIN)"
          log '```'
          log ""

          log "### Commands"
          if command -v zkc >/dev/null 2>&1; then
            zkc_path="$(command -v zkc)"
            log "OK   zkc: ${zkc_path}"
            go version -m "${zkc_path}" 2>&1 | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}"
          else
            log "FAIL zkc: not found on PATH"
            if [ -x "$(go env GOPATH)/bin/zkc" ]; then
              log "     hint: found at $(go env GOPATH)/bin/zkc but GOPATH/bin is not on PATH"
            fi
            failures=$((failures + 1))
          fi

          if [ -x /usr/bin/time ]; then
            log "OK   /usr/bin/time: $(/usr/bin/time --version 2>&1 | head -1)"
          else
            log "FAIL /usr/bin/time: not installed (try: sudo apt-get install -y time)"
            failures=$((failures + 1))
          fi

          if command -v seq >/dev/null 2>&1; then
            log "OK   seq: $(command -v seq)"
          else
            log "FAIL seq: not found on PATH"
            failures=$((failures + 1))
          fi
          log ""

          log "### Helper binaries and inputs"
          check_path cache_thrasher "${BENCH_ROOT}/cache_thrasher"
          check_path render_bench_summary "${BENCH_ROOT}/render_bench_summary"
          check_path keccak_json "${KECCAK_JSON}"
          check_path blake_json_dir "${BLAKE_JSON_DIR}"
          blake_count="$(find "${BLAKE_JSON_DIR}" -maxdepth 1 -name '*.json' | wc -l)"
          log "     blake JSON count: ${blake_count}"
          if [ "${blake_count}" -eq 0 ]; then
            log "FAIL blake JSONs: expected at least one file under ${BLAKE_JSON_DIR}"
            failures=$((failures + 1))
          fi
          log ""

          log "### Worktree zkc mains"
          check_path zkc_main_opt "${WT_OPTIM}/arithmetization/src/main/riscv/main.zkc"
          check_path zkc_main_base "${WT_BASE}/arithmetization/src/main/riscv/main.zkc"
          log ""

          if [ "${failures}" -eq 0 ] && command -v zkc >/dev/null 2>&1 && [ -x /usr/bin/time ]; then
            log "### Smoke tests (exact benchmark command, single timed run each)"
            smoke_zkc optim "${WT_OPTIM}/arithmetization/src/main/riscv/main.zkc"
            smoke_zkc base  "${WT_BASE}/arithmetization/src/main/riscv/main.zkc"
          fi

          log ""
          if [ "${failures}" -eq 0 ]; then
            log "Preflight passed."
          else
            log "Preflight failed with ${failures} issue(s)."
          fi

          exit "${failures}"

      - name: Run benchmark (warmup + alternating timed iterations with per-iter cache reset)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p "${BENCH_LOGS}"
          failures=0

          reset_state() {
            sync || true
            #sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            "${BENCH_ROOT}/cache_thrasher" 256 >/dev/null 2>&1 || true
            sleep 5
          }

          run_keccak() {  # $1=variant (opt|base)  $2=label (warmup|iter#)
            local zkc_main
            case "$1" in
              opt)  zkc_main="${WT_OPTIM}/arithmetization/src/main/riscv/main.zkc" ;;
              base) zkc_main="${WT_BASE}/arithmetization/src/main/riscv/main.zkc" ;;
            esac
            /usr/bin/time -v zkc execute -v -q "${KECCAK_JSON}" "${zkc_main}" \
              > "${BENCH_LOGS}/keccak_${1}_${2}.log" 2>&1
          }

          run_blake() {   # $1=variant  $2=label. Runs all N vectors, one log file per vector.
            local zkc_main
            case "$1" in
              opt)  zkc_main="${WT_OPTIM}/arithmetization/src/main/riscv/main.zkc" ;;
              base) zkc_main="${WT_BASE}/arithmetization/src/main/riscv/main.zkc" ;;
            esac
            local rc=0
            for json in "${BLAKE_JSON_DIR}"/*.json; do
              local n
              n=$(basename "$json" .json)
              /usr/bin/time -v zkc execute -v -q "$json" "${zkc_main}" \
                > "${BENCH_LOGS}/blake_${1}_${2}_${n}.log" 2>&1 || rc=$?
            done
            return "${rc}"
          }

          for wl in keccak blake; do
            # Untimed warmup: optim then base. Primes the page cache and shared libs
            # so both branches face an already-warm filesystem on iteration 1.
            reset_state; run_${wl} opt  warmup || true
            reset_state; run_${wl} base warmup || true
            # Timed runs: opt_i, base_i alternating, starting with opt.
            for i in $(seq 1 "${BENCH_ITERS}"); do
              reset_state
              run_${wl} opt "$i" || failures=$((failures + 1))
              reset_state
              run_${wl} base "$i" || failures=$((failures + 1))
            done
          done

          if [ "${failures}" -ne 0 ]; then
            echo "Benchmark failed: ${failures} timed run(s) returned non-zero" >&2
            echo "Check logs under ${BENCH_LOGS}" >&2
          fi
          exit "${failures}"

      - name: Parse logs and emit summary
        if: always()
        run: |
          "${BENCH_ROOT}/render_bench_summary" \
            -logs "${BENCH_LOGS}" \
            -iters "${BENCH_ITERS}" \
            -blake-n "${BLAKE_N_VECTORS}" \
            | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zkc-bench-logs
          path: ${{ env.BENCH_LOGS }}
