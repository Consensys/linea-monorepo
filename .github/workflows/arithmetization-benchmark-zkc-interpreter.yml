name: Arithmetization zkc interpreter benchmark (base vs optim)

# Benchmark of guest programs executed by the zkc interpreter of
# two branches, the base branch and the optim branch.
# Guest programs are the Keccak and Blake programs in the arithmetization/src/test/examples 
# directory.

# Benchmark methodology : 
# Designed to give a reliable paired comparison on a
# single runner: one untimed warmup per branch, then N alternating (opt, base)
# timed iterations with a per-iteration cache reset + brief cool-down to keep
# the machine state similar across runs.

# Benchmark data : 
# -- For Keccak
# In arithmetization/src/test/examples/rust/src/keccak/keccak.all
# There are 20k test vectors you can select from to run the benchmark.
# Each test vector has a raw message of 16 * 32 bytes, ie fits in 4 blocks of 1088 bits.
# 1 test vector = 4 blocks
# -- For Blake
# In the inputs, you can select the number of Blake compression rounds.
# Script ./scripts/blake_rounds_to_in_bytes/main.go will generate the test vector with the requested number of compression rounds.
# h, m, t, f are hard-coded to the standard Blake2b "abc" test vector.

on:
  pull_request:
    branches:
      - main
    paths:
      - 'arithmetization/**'
      - '.github/actions/setup-arithmetization-riscv/**'
      - '.github/workflows/arithmetization-*.yml'
  push:
    branches:
     - main
    paths:
     - 'arithmetization/**'
     - '.github/actions/setup-arithmetization-riscv/**'
     - '.github/workflows/arithmetization-*.yml'
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Baseline branch / commit ref'
        required: true
        type: string
      optim_ref:
        description: 'Optim-test branch / commit ref'
        required: true
        type: string
      iterations:
        description: 'Number of timed iterations per (program, variant)'
        required: false
        type: number
        default: 5
      zkc_ref:
        description: 'zkc commit/branch/tag (defaults to main)'
        required: false
        type: string
        default: main
      n_vectors_keccak:
        description: 'First N Keccak test vectors from keccak.all (x4 for number of blocks)'
        required: false
        type: number
        default: 10
      n_rounds_blake:
        description: 'N Blake compression rounds'
        required: false
        type: number
        default: 12

permissions:
  contents: read
  actions: read

jobs:
  bench:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-large
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          submodules: false

      - name: Setup Environment
        uses: ./.github/actions/setup-arithmetization-riscv

      - name: Install zkc
        run: make -C arithmetization install-zkc
        env:
          ZKC_REF: ${{ inputs.zkc_ref }}

      - name: Add worktrees for base and optim branches
        run: |
          set -eux
          BASE_REF="${{ inputs.base_ref || 'main' }}"
          OPTIM_REF="${{ inputs.optim_ref || github.event.pull_request.head.sha || github.sha }}"
          git fetch origin "${BASE_REF}":refs/bench/base
          git fetch origin "${OPTIM_REF}":refs/bench/opt
          git worktree add /tmp/wt-base refs/bench/base
          git worktree add /tmp/wt-opt  refs/bench/opt

      - name: Build ELFs, helpers, and per-vector JSONs (on opt worktree)
        run: |
          set -eux
          mkdir -p /tmp/bench/logs /tmp/bench/json/blake
          cd /tmp/wt-opt/arithmetization/src/test/examples
          # Keccak: one batched JSON.
          make keccak-rust-json \
            KECCAK_N_VECTORS=${{ inputs.n_vectors_keccak || 10 }} \
            KECCAK_JSON_FILE=/tmp/keccak.json
          # Blake: synthesize a single .all line at the requested rounds count
          go build -o /tmp/bench/blake_rounds_to_in_bytes ./scripts/blake_rounds_to_in_bytes/main.go
          /tmp/bench/blake_rounds_to_in_bytes ${{ inputs.n_rounds_blake || 12 }} > /tmp/blake_custom.all
          make blake-rust-json \
            BLAKE_ALL_FILE=/tmp/blake_custom.all \
            BLAKE_N_VECTORS=1 \
            BLAKE_JSON_DIR=/tmp/bench/json/blake
          # Helper binaries used by the timing loop and the summary step.
          go build -o /tmp/bench/cache_thrasher       ./scripts/cache_thrasher/main.go
          go build -o /tmp/bench/render_bench_summary ./scripts/render_bench_summary/main.go

      - name: Preflight benchmark dependencies
        shell: bash
        run: |
          set -euo pipefail
          failures=0

          log() {
            echo "$@" | tee -a "${GITHUB_STEP_SUMMARY}"
          }

          check_path() {
            local label="$1"
            local path="$2"
            if [ -e "$path" ]; then
              log "OK   ${label}: $path"
            else
              log "FAIL ${label}: missing path '$path'"
              failures=$((failures + 1))
            fi
          }

          log "## Benchmark preflight"
          log ""
          log "Checking commands and files required by the timing loop."
          log ""
          log '```'
          log "PATH=${PATH}"
          log "GOPATH=$(go env GOPATH)"
          log "GOBIN=$(go env GOBIN)"
          log '```'
          log ""

          log "### Commands"
          if command -v zkc >/dev/null 2>&1; then
            zkc_path="$(command -v zkc)"
            log "OK   zkc: ${zkc_path}"
            go version -m "${zkc_path}" 2>&1 | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}"
          else
            log "FAIL zkc: not found on PATH"
            if [ -x "$(go env GOPATH)/bin/zkc" ]; then
              log "     hint: found at $(go env GOPATH)/bin/zkc but GOPATH/bin is not on PATH"
            fi
            failures=$((failures + 1))
          fi

          if [ -x /usr/bin/time ]; then
            log "OK   /usr/bin/time: $(/usr/bin/time --version 2>&1 | head -1)"
          else
            log "FAIL /usr/bin/time: not installed (try: sudo apt-get install -y time)"
            failures=$((failures + 1))
          fi

          if command -v seq >/dev/null 2>&1; then
            log "OK   seq: $(command -v seq)"
          else
            log "FAIL seq: not found on PATH"
            failures=$((failures + 1))
          fi
          log ""

          log "### Helper binaries and inputs"
          check_path cache_thrasher /tmp/bench/cache_thrasher
          check_path render_bench_summary /tmp/bench/render_bench_summary
          check_path keccak_json /tmp/keccak.json
          check_path blake_json_dir /tmp/bench/json/blake
          blake_count="$(find /tmp/bench/json/blake -maxdepth 1 -name '*.json' | wc -l)"
          log "     blake JSON count: ${blake_count}"
          if [ "${blake_count}" -eq 0 ]; then
            log "FAIL blake JSONs: expected at least one file under /tmp/bench/json/blake"
            failures=$((failures + 1))
          fi
          log ""

          log "### Worktree zkc mains"
          check_path zkc_main_opt /tmp/wt-optim/arithmetization/src/main/riscv/main.zkc
          check_path zkc_main_base /tmp/wt-base/arithmetization/src/main/riscv/main.zkc
          log ""

          if [ "${failures}" -eq 0 ] && command -v zkc >/dev/null 2>&1 && [ -x /usr/bin/time ]; then
            log "### Smoke test (exact benchmark command, single timed run)"
            set +e
            /usr/bin/time -v zkc execute -v -q /tmp/keccak.json \
              /tmp/wt-optim/arithmetization/src/main/riscv/main.zkc \
              >/tmp/bench/logs/preflight_smoke.log 2>&1
            smoke_rc=$?
            set -e
            if [ "${smoke_rc}" -eq 0 ]; then
              log "OK   /usr/bin/time -v zkc execute ... (rc=${smoke_rc})"
            else
              log "FAIL /usr/bin/time -v zkc execute ... (rc=${smoke_rc})"
              if [ "${smoke_rc}" -eq 127 ]; then
                log "     rc=127 usually means /usr/bin/time or zkc was not found"
              elif [ "${smoke_rc}" -eq 4 ]; then
                log "     rc=4 usually means zkc execution failed (guest exit / IR panic)"
              fi
              log "     zkc errors from /tmp/bench/logs/preflight_smoke.log:"
              grep -E 'level=error|machine panic|EXIT CODE' /tmp/bench/logs/preflight_smoke.log \
                | tail -10 | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}" || true
              log "     last 20 lines of /tmp/bench/logs/preflight_smoke.log:"
              tail -20 /tmp/bench/logs/preflight_smoke.log | sed 's/^/     /' | tee -a "${GITHUB_STEP_SUMMARY}"
              failures=$((failures + 1))
            fi
          fi

          log ""
          if [ "${failures}" -eq 0 ]; then
            log "Preflight passed."
          else
            log "Preflight failed with ${failures} issue(s)."
          fi

          exit "${failures}"

      - name: Run benchmark (warmup + alternating timed iterations with per-iter cache reset)
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p /tmp/bench/logs
          ITERS=${{ inputs.iterations || 0 }}

          # progress prints
          log() { printf '[%s] %s\n' "$(date +'%H:%M:%S')" "$*"; }

          reset_state() {
            sync || true
            # sudo sh -c 'echo 3 > /proc/sys/vm/drop_caches' || true
            /tmp/bench/cache_thrasher 256 >/dev/null 2>&1 || true
            sleep 5
          }


          #run_keccak() {  # $1=variant (opt|base)  $2=label (warmup|iter#)
          #  local zkc_main="/tmp/wt-${1}/arithmetization/src/main/riscv/main.zkc"
          #  /usr/bin/time -v zkc execute -v -q /tmp/keccak.json "$zkc_main" \
          #    > "/tmp/bench/logs/keccak_${1}_${2}.log" 2>&1
          #}

          for wl in keccak blake; do
            log "=== workload: ${wl} ==="
            # Untimed warmup: opt then base. Primes the page cache and shared libs
            # so both branches face an already-warm filesystem on iteration 1.
            reset_state; log "${wl}: warmup opt  (untimed)"; run_${wl} opt  warmup
            reset_state; log "${wl}: warmup base (untimed)"; run_${wl} base warmup
            # Timed runs: opt_i, base_i alternating, starting with opt.
            for i in $(seq 1 "$ITERS"); do
              reset_state; log "${wl}: iter ${i}/${ITERS} opt";  run_${wl} opt  "$i"
              reset_state; log "${wl}: iter ${i}/${ITERS} base"; run_${wl} base "$i"
            done
          done
          log "all workloads done"

      - name: Parse logs and emit summary
        if: always()
        shell: bash
        run: |
          set -o pipefail
          mkdir -p /tmp/bench/logs
          /tmp/bench/render_bench_summary \
            -logs /tmp/bench/logs \
            -iters ${{ inputs.iterations || 0}} \
            -blake-n 1 \
            -base-ref "${{ inputs.base_ref || 'main' }}" \
            -optim-ref "${{ inputs.optim_ref || github.event.pull_request.head.sha || github.sha }}" \
            -zkc-version "${{ inputs.zkc_ref || 'main' }}" \
            -keccak-n-vectors ${{ inputs.n_vectors_keccak || 10 }} \
            -blake-rounds ${{ inputs.n_rounds_blake || 12 }} \
            | tee -a "$GITHUB_STEP_SUMMARY" \
            | tee /tmp/bench/logs/summary.md

      - name: Upload benchmark logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zkc-bench-logs
          path: /tmp/bench/logs
