name: native-yield-automation-service-testing

permissions:
  contents: read
  actions: read

on:
  workflow_call:
    inputs:
      commit_tag:
        required: true
        type: string

concurrency:
  group: native-yield-automation-service-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run-tests:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-med
    name: native-yield-automation-service-testing
    env:
      COMMIT_TAG: ${{ inputs.commit_tag }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs

      - name: Build
        run: |
          pnpm --filter @lfdt-lineth/shared-utils build
          pnpm --filter @lfdt-lineth/native-yield-automation-service build

      - name: Run tests and generate coverage report
        run: |
          pnpm --filter @lfdt-lineth/shared-utils test
          pnpm --filter @lfdt-lineth/native-yield-automation-service test

      - name: Stage TS coverage for artifact (fork PR uploads)
        run: |
          mkdir -p ci-native-yield-coverage
          cp ts-libs/linea-shared-utils/coverage/lcov.info ci-native-yield-coverage/shared-utils-lcov.info
          cp operations/native-yield/automation-service/coverage/lcov.info ci-native-yield-coverage/automation-service-lcov.info

      - name: Upload TS coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-yield-ts-coverage-${{ env.COMMIT_TAG }}
          if-no-files-found: error
          path: ci-native-yield-coverage/

      - name: Upload linea-shared-utils coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f #v7.0.0
        with:
          fail_ci_if_error: true
          files: ./ts-libs/linea-shared-utils/coverage/lcov.info
          flags: linea-shared-utils
          os: linux
          name: codecov-linea-shared-utils-native-yield
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload native-yield-automation-service coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f #v7.0.0
        with:
          fail_ci_if_error: true
          files: ./operations/native-yield/automation-service/coverage/lcov.info
          flags: native-yield-automation-service
          os: linux
          name: codecov-native-yield-automation-service
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
