name: prover-build-and-publish

permissions:
  contents: read
  actions: read
  packages: write

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string
      image_tag_with_suffix:
        required: false
        type: string
        default: ''
      develop_tag:
        required: true
        type: string
      image_name:
        required: true
        type: string
      push_image:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag without suffix'
        required: true
        type: string
      image_tag_with_suffix:
        description: 'Image tag with suffix'
        required: false
        type: string
        default: ''
      develop_tag:
        description: 'Image tag will be "develop" if target branch is main'
        required: true
        type: choice
        options:
          - develop
        default: 'develop'
      image_name:
        description: 'Image name'
        required: true
        type: string
        default: 'consensys/linea-prover'
      push_image:
        description: 'Toggle whether to push image to docker registry'
        required: false
        type: boolean
        default: true

concurrency:
  group: prover-build-and-publish-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GOPROXY: "https://proxy.golang.org"

jobs:
  build-and-publish:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    name: Prover build
    env:
      IMAGE_TAG: ${{ inputs.image_tag }}
      IMAGE_TAG_WITH_SUFFIX: ${{ inputs.image_tag_with_suffix }}
      DEVELOP_TAG: ${{ inputs.develop_tag }}
      IMAGE_NAME: ${{ inputs.image_name }}
      PUSH_IMAGE: ${{ inputs.push_image }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true

      - name: Login to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: ./.github/actions/docker-build-publish
        with:
          image_name: ${{ env.IMAGE_NAME }}
          image_tags: ${{ env.IMAGE_TAG_WITH_SUFFIX && format('{0},{1}', env.IMAGE_TAG, env.IMAGE_TAG_WITH_SUFFIX) || env.IMAGE_TAG }}
          develop_tag: ${{ env.DEVELOP_TAG }}
          push_image: ${{ env.PUSH_IMAGE }}
          dockerfile_path: ./prover/Dockerfile
          build_args: RUSTFLAGS="-C target-cpu=x86-64-v3"
          build_contexts: prover=prover/
          push_platforms: linux/amd64
          save_artifact: ${{ env.PUSH_IMAGE == 'false' }}
          artifact_name: linea-prover
