name: "Lint Commit Messages"

permissions:
  contents: read
  pull-requests: read

on:
  workflow_call:
    inputs:
      skip-lint-commit-msgs:
        description: "Skip linting commit messages"
        required: false
        type: boolean
        default: true

concurrency:
  group: lint-commit-messages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-commit-messages:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-small
    name: Lint PR title and commit messages
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need both PR head and base so we can list commits in the PR.
          fetch-depth: 0
          submodules: false

       # Check if PR title is in Conventional Commits format
       # It's important, as in a squash merge, the PR title becomes 
       # the single commit message on main.
      - name: Lint PR title
        if: github.event_name == 'pull_request'
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 #v6.1.1
        with:
          requireScope: true

      - name: Lint each commit in the PR with .husky/commit-msg
        if: github.event_name == 'pull_request' && !inputs.skip-lint-commit-msgs
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          # Number of most-recent PR commits to lint, if unset, defaults to "all".
          LINT_COMMIT_COUNT: 1
        run: |
          set -eu

          lint_count="${LINT_COMMIT_COUNT:-all}"

          # All commits introduced by this PR (exclusive of base), newest first.
          commits=$(git rev-list --no-merges "${BASE_SHA}..${HEAD_SHA}")
          if [ -z "${commits}" ]; then
            echo "No commits to lint."
            exit 0
          fi

          if [ "${lint_count}" != "all" ]; then
            case "${lint_count}" in
              ''|*[!0-9]*)
                echo "LINT_COMMIT_COUNT must be a positive integer or 'all' (got: '${lint_count}')." >&2
                exit 1
                ;;
            esac
            commits=$(printf '%s\n' "${commits}" | head -n "${lint_count}")
            echo "Linting the ${lint_count} most recent commit(s)."
          else
            echo "Linting all commits in the PR."
          fi

          failed=0
          tmpfile=$(mktemp)
          trap 'rm -f "${tmpfile}"' EXIT

          for sha in ${commits}; do
            git log -1 --pretty=%B "${sha}" > "${tmpfile}"
            subject=$(head -n 1 "${tmpfile}")
            printf '── %s  %s\n' "$(echo "${sha}" | cut -c1-8)" "${subject}"

            if ! .husky/commit-msg "${tmpfile}"; then
              failed=$((failed + 1))
            fi
            echo
          done

          if [ "${failed}" -gt 0 ]; then
            echo "✗ ${failed} commit message(s) failed validation." >&2
            exit 1
          fi
          echo "✓ All commit messages OK."
