name: "Reusable: Component Release Metadata"

on:
  workflow_call:
    inputs:
      component-name:
        description: "Component name — used to derive tag pattern, CHANGELOG path and commit scope (e.g. coordinator, postman)"
        required: true
        type: string
      folder-name:
        description: "Folder name — home folder name of the component (e.g. linea-besu's home folder is linea-besu-package)"
        required: true
        type: string
      include-path:
        description: "git-cliff --include-path filter — single path (e.g. coordinator/**) or JSON array string (e.g. '[\"tracer/**\",\"linea-besu/**\"]')"
        required: true
        type: string
      cliff-config:
        description: "Path to the cliff.toml config file"
        required: false
        type: string
        default: "cliff.toml"
      runner:
        description: "Runner label"
        required: false
        type: string
        default: "gha-runner-scale-set-ubuntu-24-amd64-med"
    outputs:
      release_tag:
        description: "Full release tag (e.g. releases/coordinator/v0.2.0)"
        value: ${{ jobs.release-component.outputs.release_tag }}
      release_version:
        description: "Bare semver (e.g. 0.2.0)"
        value: ${{ jobs.release-component.outputs.release_version }}
      docker_tag:
        description: "Docker image tag"
        value: ${{ jobs.release-component.outputs.docker_tag }}
      changelog:
        description: "Latest changelog section content"
        value: ${{ jobs.release-component.outputs.changelog }}

jobs:
  release-component:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
    name: Prepare ${{ inputs.component-name }} release (changelog + tag)
    outputs:
      release_tag: ${{ steps.version.outputs.tag }}
      release_version: ${{ steps.version.outputs.version }}
      docker_tag: ${{ steps.dockertag.outputs.dockertag }}
      changelog: ${{ steps.changelog.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install git-cliff
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 #(v2.75.19)
        with:
          tool: git-cliff

      # Normalize inputs.include-path (plain string or JSON array string) into
      # one path per line so downstream steps reconstruct a bash array safely.
      - name: Build include-path list
        id: paths
        shell: bash
        run: |
          set -euo pipefail
          {
            echo 'include_paths<<__PATHS_EOF__'
            echo '${{ inputs.include-path }}' \
              | jq -r 'if type == "array" then .[] else . end'
            echo '__PATHS_EOF__'
          } >> "$GITHUB_OUTPUT"

      # Compute the release version and tag up front, so the changelog entry
      # prepended in the next step is stamped with the version (not [unreleased]).
      - name: Compute next ${{ inputs.component-name }} version (semver)
        id: version
        shell: bash
        env:
          COMPONENT: ${{ inputs.component-name }}
          CLIFF_CONFIG: ${{ inputs.cliff-config }}
        run: |
          set -euo pipefail
          mapfile -t paths <<< "${{ steps.paths.outputs.include_paths }}"
          cliff_args=(--config "${CLIFF_CONFIG}" --bumped-version)
          for p in "${paths[@]}"; do
            cliff_args+=(--include-path "${p}")
          done
          cliff_args+=(--tag-pattern "releases/${COMPONENT}/v*")
          next_tag=$(git cliff "${cliff_args[@]}")
          if [ -z "${next_tag}" ]; then
            echo "git-cliff returned no version; nothing to release."
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          next_semver="${next_tag#releases/${COMPONENT}/v}"
          current_tag=$(git describe --tags --abbrev=0 --match "releases/${COMPONENT}/v*" 2>/dev/null || echo "") 
          echo "current ${COMPONENT} tag: ${current_tag}"
          echo "next ${COMPONENT} tag:    ${next_tag}"
          echo "next ${COMPONENT} semver: ${next_semver}"
          changed=false
          if [ "${current_tag}" != "${next_tag}" ]; then
            changed=true
          fi
          {
            echo "tag=${next_tag}"
            echo "version=${next_semver}"
            echo "changed=${changed}"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure ${{ inputs.folder-name }}/CHANGELOG.md exists
        if: steps.version.outputs.changed == 'true'
        env:
          COMPONENT: ${{ inputs.component-name }}
          FOLDER_NAME: ${{ inputs.folder-name }}
        run: |
          set -euo pipefail
          if [ ! -f "${FOLDER_NAME}/CHANGELOG.md" ]; then
            printf "# %s Changelog\n\n" "${COMPONENT^}" > "${FOLDER_NAME}/CHANGELOG.md"
          fi

      # Stamp the prepended entry with the bare semver (e.g. "## [0.2.0] - 2026-04-27"),
      # via --tag, so the body template renders {{ version }} instead of [unreleased].
      - name: Generate and prepend release changelog section
        if: steps.version.outputs.changed == 'true'
        env:
          COMPONENT: ${{ inputs.component-name }}
          FOLDER_NAME: ${{ inputs.folder-name }}
          CLIFF_CONFIG: ${{ inputs.cliff-config }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -t paths <<< "${{ steps.paths.outputs.include_paths }}"
          cliff_args=(--config "${CLIFF_CONFIG}" --unreleased --tag "${VERSION}")
          for p in "${paths[@]}"; do
            cliff_args+=(--include-path "${p}")
          done
          cliff_args+=(--tag-pattern "releases/${COMPONENT}/v*" --prepend "${FOLDER_NAME}/CHANGELOG.md")
          git cliff "${cliff_args[@]}"

      - name: Commit and push ${{ inputs.component-name }}/CHANGELOG.md
        if: steps.version.outputs.changed == 'true'
        env:
          COMPONENT: ${{ inputs.component-name }}
          FOLDER_NAME: ${{ inputs.folder-name }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git diff --quiet -- "${FOLDER_NAME}/CHANGELOG.md"; then
            echo "No unreleased ${COMPONENT} changes; nothing to do."
            exit 0
          fi
          git add "${FOLDER_NAME}/CHANGELOG.md"
          git commit -m "chore(${COMPONENT}): CHANGELOG.md update for ${TAG} release"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create and push ${{ inputs.component-name }} release tag
        if: steps.version.outputs.changed == 'true'
        env:
          COMPONENT: ${{ inputs.component-name }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if [ -z "${TAG}" ]; then
            echo "No tag computed; aborting."
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null; then
            echo "Tag ${TAG} already exists; aborting."
            exit 1
          fi
          git tag -a "${TAG}" -m "${COMPONENT^} release ${TAG}"
          git push origin "${TAG}"
          echo "Pushed ${TAG} pointing at $(git rev-parse HEAD)"

      - name: Generate ${{ inputs.component-name }} latest changelog
        if: steps.version.outputs.changed == 'true'
        id: changelog
        env:
          COMPONENT: ${{ inputs.component-name }}
          CLIFF_CONFIG: ${{ inputs.cliff-config }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t paths <<< "${{ steps.paths.outputs.include_paths }}"
          cliff_args=(--config "${CLIFF_CONFIG}" --latest)
          for p in "${paths[@]}"; do
            cliff_args+=(--include-path "${p}")
          done
          cliff_args+=(--tag-pattern "releases/${COMPONENT}/v*")
          {
            echo 'content<<__CLIFF_EOF__'
            git cliff "${cliff_args[@]}"
            echo '__CLIFF_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Compute version tags
        if: steps.version.outputs.changed == 'true'
        id: compute_version_tags
        uses: ./.github/actions/compute-version-tags

      - name: Set timestamp
        if: steps.version.outputs.changed == 'true'
        id: timestamp
        run: echo "TIMESTAMP=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Set docker tag
        if: steps.version.outputs.changed == 'true'
        id: dockertag
        run: |
          echo "dockertag=${{ steps.version.outputs.version }}-${{ steps.timestamp.outputs.TIMESTAMP }}-${{ steps.compute_version_tags.outputs.commit_tag }}" >> "$GITHUB_OUTPUT"
