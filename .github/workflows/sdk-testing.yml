name: sdk-testing

on:
  pull_request:
    paths:
      - "sdk/**"
      - ".github/workflows/sdk-testing.yml"
      - ".nvmrc"
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - ".github/workflows/sdk-testing.yml"
      - ".nvmrc"

permissions:
  contents: read
  actions: read

concurrency:
  group: sdk-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    name: SDK Build, Test, Lint
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build sdk-core
        run: pnpm -F @consensys/linea-sdk-core run build

      - name: Test sdk-core
        run: pnpm -F @consensys/linea-sdk-core run test

      - name: Lint sdk-core
        run: pnpm -F @consensys/linea-sdk-core run lint

      - name: Build sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run build

      - name: Test sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run test

      - name: Lint sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run lint

      - name: Build sdk-ethers (typechain + tsc)
        run: pnpm -F @consensys/linea-sdk run build

      - name: Test sdk-ethers
        run: pnpm -F @consensys/linea-sdk run test

      - name: Lint sdk-ethers
        run: pnpm -F @consensys/linea-sdk run lint

      - name: Compute coverage artifact tag
        id: cov-tag
        shell: bash
        env:
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "TAG=${PR_HEAD_SHA:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "TAG=$(git rev-parse --short=7 "$GITHUB_SHA")" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage TS coverage for artifact (fork PR uploads)
        run: |
          mkdir -p ci-sdk-coverage
          cp sdk/sdk-core/coverage/lcov.info ci-sdk-coverage/sdk-core-lcov.info
          cp sdk/sdk-viem/coverage/lcov.info ci-sdk-coverage/sdk-viem-lcov.info
          cp sdk/sdk-ethers/coverage/lcov.info ci-sdk-coverage/sdk-ethers-lcov.info

      - name: Upload TS coverage report
        uses: actions/upload-artifact@v7
        with:
          name: sdk-ts-coverage-${{ steps.cov-tag.outputs.TAG }}
          if-no-files-found: error
          path: ci-sdk-coverage/

      - name: Upload sdk-core coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          fail_ci_if_error: true
          files: ./sdk/sdk-core/coverage/lcov.info
          flags: sdk-core
          os: linux
          name: codecov-sdk-core
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload sdk-viem coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          fail_ci_if_error: true
          files: ./sdk/sdk-viem/coverage/lcov.info
          flags: sdk-viem
          os: linux
          name: codecov-sdk-viem-sdk-testing
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload sdk-ethers coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 #v6.0.0
        with:
          fail_ci_if_error: true
          files: ./sdk/sdk-ethers/coverage/lcov.info
          flags: sdk-ethers
          os: linux
          name: codecov-sdk-ethers
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
