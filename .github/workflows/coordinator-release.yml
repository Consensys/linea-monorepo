name: "Coordinator Release (still in testing phase)"

permissions:
  actions: read
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: 'Custom image tag suffix, i.e. docker image tag would be [semver]-[YYYYMMDDHHMMSS]-[commit]-[suffix], if not given, would be [semver]-[YYYYMMDDHHMMSS]-[commit]'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: coordinator-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compute-coordinator-release-metadata:
    uses: ./.github/workflows/reusable-component-release-metadata.yml
    with:
      component-name: coordinator
      folder-name: coordinator
      include-path: '"coordinator/**"'

  build-local-coordinator:
    needs: [compute-coordinator-release-metadata]
    if: ${{ needs.compute-coordinator-release-metadata.outputs.tag_changed == 'true' }}
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-coordinator
      push_image: false
    secrets: inherit

  run-e2e-tests:
    needs: [build-local-coordinator]
    uses: ./.github/workflows/reuse-run-e2e-tests.yml
    with:
      image_tag: local
      linea_besu_package_tag: ''
      e2e-tests-logs-dump: true
      has-changes-requiring-e2e-testing: "true"
    secrets: inherit

  release-coordinator-push-tag-changelog:
    needs: [run-e2e-tests]
    uses: ./.github/workflows/reusable-component-release-push-tag-changelog.yml
    with:
      component-name: coordinator
      folder-name: coordinator
      include-path: '"coordinator/**"'
    secrets: inherit

  compute-coordinator-docker-tag:
    needs: [compute-coordinator-release-metadata, release-coordinator-push-tag-changelog]
    uses: ./.github/workflows/reusable-component-docker-tag.yml
    with:
      version-prefix: ${{ needs.compute-coordinator-release-metadata.outputs.release_version }}
      image-tag-suffix: ${{ inputs.image_tag_suffix }}

  build-docker-image-coordinator:
    needs: [compute-coordinator-docker-tag]
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: ${{ needs.compute-coordinator-docker-tag.outputs.docker_tag }}
      develop_tag: "develop"
      image_name: consensys/linea-coordinator
      push_image: true
    secrets: inherit

  gh-release-coordinator:
    needs: [compute-coordinator-release-metadata, compute-coordinator-docker-tag, build-docker-image-coordinator]
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Append Changelog Action to release note
        id: append_change_log
        shell: bash
        env:
          # Pass via env to avoid shell injection: changelog content is derived
          # from commit messages (via git-cliff) and may contain backticks, $(...), etc.
          CHANGELOG: ${{ needs.compute-coordinator-release-metadata.outputs.changelog }}
          DOCKER_TAG: ${{ needs.compute-coordinator-docker-tag.outputs.docker_tag }}
        run: |
          mkdir release && cd release
          printf '%s\n' "$CHANGELOG" >> output.md
          echo "### Docker Image Details" >> output.md
          echo "" >> output.md
          echo "To pull the image, use the following command:" >> output.md
          echo "\`\`\`" >> output.md
          printf 'docker pull consensys/linea-coordinator:%s\n' "$DOCKER_TAG" >> output.md
          echo "\`\`\`" >> output.md

      - name: gh-release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b #v2.5.0
        with:
          name: Coordinator v${{ needs.compute-coordinator-release-metadata.outputs.release_version }}
          tag_name: ${{ needs.compute-coordinator-release-metadata.outputs.release_tag }}
          body_path: release/output.md
          draft: ${{ inputs.draft_release }}
          prerelease: ${{ inputs.pre_release }}
          generate_release_notes: false
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
