name: "Linea Milestone Release with dry run (branch from main)"

# Creates a fresh branch off the latest origin/main and dispatches
# linea-milestone-release.yml against that branch. Useful for testing the
# milestone release pipeline without running it directly on main.

permissions:
  actions: read
  id-token: write
  contents: write
  packages: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      dry_run_release_on_branch:
        description: 'Dry run release on a temporary branch forked from latest main'
        required: false
        type: boolean
        default: true
      image_tag_suffix:
        description: 'Custom docker image tag suffix (passed through to linea-milestone-release)'
        required: false
        type: string
        default: ''
      release_tag_suffix: # TODO: to be removed 
        description: 'Custom release tag suffix (required for non-main runs)'
        required: false
        type: string
        default: ''
      pre_release:
        description: 'Pre Release if checked; Draft release otherwise'
        required: false
        type: boolean
        default: false

concurrency:
  group: linea-milestone-release-with-dry-run-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-branch-check:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps:
      - name: Enforce main branch
        if: ${{ github.ref != 'refs/heads/main' }}
        run: |
          echo "ERROR: This workflow must be dispatched from main (got ${{ github.ref }})"
          exit 0 # TODO: set this back to 1

  create-temp-branch-and-dispatch-release:
    needs: [release-branch-check]
    if: ${{ inputs.dry_run_release_on_branch }}
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    permissions:
      actions: write
    outputs:
      branch: ${{ steps.mkbranch.outputs.branch }}
      run_id: ${{ steps.find-run.outputs.run_id }}
    steps:
      # The default GITHUB_TOKEN cannot trigger another workflow_dispatch run
      # (GitHub blocks token-initiated workflow chaining to prevent loops),
      # so we mint an App token that has actions:write + contents:write.
      - name: Mint App token (actions:write + contents:write)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
 
      # TODO: the following step can be removed, for debug purpose
      - name: Show installation permissions
        env:
          APP_ID: ${{ secrets.RELEASE_BOT_APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          INSTALLATION_ID: ${{ steps.app-token.outputs.installation-id }}
          # gh requires GH_TOKEN even when we override Authorization with -H below.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Build a short-lived (≤10 min) JWT for App-level auth.
          NOW=$(date +%s)
          b64url() { base64 -w0 | tr -d '=' | tr '/+' '_-'; }
          HEADER=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
          PAYLOAD=$(printf '{"iat":%d,"exp":%d,"iss":"%s"}' "$((NOW-60))" "$((NOW+540))" "$APP_ID" | b64url)
          SIG=$(printf '%s' "${HEADER}.${PAYLOAD}" \
            | openssl dgst -sha256 -sign <(printf '%s' "$APP_PRIVATE_KEY") | b64url)
          JWT="${HEADER}.${PAYLOAD}.${SIG}"

          # /app/installations/{id} requires JWT auth and returns the permissions map.
          gh api "/app/installations/${INSTALLATION_ID}" \
            -H "Authorization: Bearer ${JWT}" \
            --jq '{app_slug, target_type, permissions, events}'

      - name: Checkout current branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Create and push branch off latest tip of the current branch
        id: mkbranch
        env:
          SOURCE_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          BRANCH="ci/milestone-dry-run-${TIMESTAMP}"
          git fetch origin "${SOURCE_BRANCH}"
          git checkout -b "${BRANCH}" "origin/${SOURCE_BRANCH}"
          git push origin "${BRANCH}"
          echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Dispatch linea-milestone-release.yml on new branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.mkbranch.outputs.branch }}
          IMAGE_TAG_SUFFIX: 'dry_run'
          RELEASE_TAG_SUFFIX: 'dry-run'
          PRE_RELEASE: false
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          gh workflow run linea-milestone-release.yml \
            --ref "${BRANCH}" \
            -f image_tag_suffix="${IMAGE_TAG_SUFFIX}" \
            -f release_tag_suffix="${RELEASE_TAG_SUFFIX}-${TIMESTAMP}" \
            -f pre_release="${PRE_RELEASE}"

      - name: Find dispatched run and report URL
        id: find-run
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ steps.mkbranch.outputs.branch }}
        run: |
          set -euo pipefail
          # gh workflow run does not return the run ID; poll briefly for the
          # most recent run on the new branch and capture id + URL.
          for attempt in 1 2 3 4 5 6; do
            RUN_JSON=$(gh run list \
              --workflow=linea-milestone-release.yml \
              --branch "${BRANCH}" \
              --limit 1 \
              --json databaseId,url \
              --jq '.[0]' || true)
            if [ -n "${RUN_JSON:-}" ] && [ "${RUN_JSON}" != "null" ]; then
              RUN_ID=$(echo "${RUN_JSON}" | jq -r .databaseId)
              RUN_URL=$(echo "${RUN_JSON}" | jq -r .url)
              echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
              echo "Dispatched run: ${RUN_URL}"
              echo "Dispatched run: ${RUN_URL}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            sleep 5
          done
          echo "Could not resolve dispatched run ID within the timeout." >&2
          exit 1

  manual-run-release-on-main:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    needs: [create-temp-branch-and-dispatch-release]
    if: ${{ always() && !cancelled() && inputs.dry_run_release_on_branch }}
    environment: ${{ inputs.dry_run_release_on_branch && 'run-release-on-main' || '' }}
    concurrency:
      group: manual-run-release-on-main-${{ github.ref }}
    steps:
      - name: Run the milestone release on main
        run: |
          echo "Going to run the milestone release on main"

  dry-run-release-cleanup:
    needs: [create-temp-branch-and-dispatch-release, manual-run-release-on-main]
    if: ${{ always() && !cancelled() && inputs.dry_run_release_on_branch && needs.manual-run-release-on-main.result == 'success' }}
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    # Generous timeout — the milestone release workflow can run for a while
    # (build + e2e + per-component releases). Bump if you hit it in practice.
    timeout-minutes: 240
    steps:
      - name: Mint App token (actions:read + contents:write)
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Wait for dispatched milestone run to finish
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          RUN_ID: ${{ needs.create-temp-branch-and-dispatch-release.outputs.run_id }}
        run: |
          set -euo pipefail
          # Watch the dispatched run until terminal. We intentionally ignore
          # exit code: even a failed/cancelled run should still be cleaned up.
          gh run watch "${RUN_ID}" --interval 30 --exit-status || true
          STATE=$(gh run view "${RUN_ID}" --json status,conclusion --jq '.status + "/" + (.conclusion // "")')
          echo "Dispatched run terminal state: ${STATE}"
          echo "Dispatched run terminal state: ${STATE}" >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout (full history + tags)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Enumerate tags created on the temp branch
        id: list-tags
        env:
          BRANCH: ${{ needs.create-temp-branch-and-dispatch-release.outputs.branch }}
        run: |
          set -euo pipefail
          # Make sure we have the temp branch tip + every tag (including ones
          # pushed by the dispatched run after our initial checkout).
          git fetch origin main --tags --prune --prune-tags
          git fetch origin "${BRANCH}":"refs/remotes/origin/${BRANCH}"

          # A "new tag" is any tag whose commit is reachable from the temp
          # branch tip but NOT from origin/main. This catches every tag the
          # dispatched run created (component release tags + milestone tag).
          MAIN_TAGS=$(git tag --merged "origin/main" | sort -u)
          BRANCH_TAGS=$(git tag --merged "origin/${BRANCH}" | sort -u)
          NEW_TAGS=$(comm -23 <(echo "${BRANCH_TAGS}") <(echo "${MAIN_TAGS}") || true)

          echo "Tags created on ${BRANCH}:"
          echo "${NEW_TAGS:-<none>}"

          # Multiline output via heredoc delimiter.
          {
            echo "tags<<__TAGS_EOF__"
            echo "${NEW_TAGS}"
            echo "__TAGS_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Delete GitHub releases and tags
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          NEW_TAGS: ${{ steps.list-tags.outputs.tags }}
        run: |
          set -euo pipefail
          if [ -z "${NEW_TAGS//[[:space:]]/}" ]; then
            echo "No new tags to delete."
            exit 0
          fi
          while IFS= read -r tag; do
            [ -z "${tag}" ] && continue
            echo "→ Deleting release + tag: ${tag}"
            # --cleanup-tag deletes the underlying tag too. Tolerate missing
            # release (tag may exist without a GH release) and fall through
            # to an explicit tag delete just in case.
            gh release delete "${tag}" --yes --cleanup-tag || true
            git push origin ":refs/tags/${tag}" || true
          done <<< "${NEW_TAGS}"

      - name: Delete Docker Hub tags created by this dry run
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          # Must match the image_tag_suffix passed to linea-milestone-release.yml above.
          IMAGE_TAG_SUFFIX: branch_run
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub credentials not set; skipping image tag cleanup."
            exit 0
          fi

          # Exchange username/token for a short-lived JWT used by /v2/repositories/.../tags endpoints.
          JWT=$(curl -fsS -H 'Content-Type: application/json' \
            -d "$(jq -n --arg u "$DOCKERHUB_USERNAME" --arg p "$DOCKERHUB_TOKEN" '{username:$u, password:$p}')" \
            https://hub.docker.com/v2/users/login/ | jq -r .token)
          if [ -z "${JWT}" ] || [ "${JWT}" = "null" ]; then
            echo "Failed to obtain Docker Hub JWT; skipping image tag cleanup." >&2
            exit 0
          fi

          # Every image the milestone release publishes, including the maru special case.
          REPOS=(
            consensys/linea-coordinator
            consensys/linea-postman
            consensys/linea-prover
            consensys/linea-transaction-exclusion-api
            consensys/linea-besu-package
            consensys/maru
          )

          for repo in "${REPOS[@]}"; do
            echo "── Scanning ${repo} for tags ending in -${IMAGE_TAG_SUFFIX}"
            # page_size=100 is the Docker Hub max; for a single dry run this is more than enough.
            tags=$(curl -fsS "https://hub.docker.com/v2/repositories/${repo}/tags?page_size=100" \
              | jq -r --arg suffix "-${IMAGE_TAG_SUFFIX}" '.results[].name | select(endswith($suffix))' || true)

            if [ -z "${tags}" ]; then
              echo "  (no matching tags)"
              continue
            fi

            while IFS= read -r tag; do
              [ -z "${tag}" ] && continue
              echo "  → Deleting ${repo}:${tag}"
              http_code=$(curl -s -o /dev/null -w '%{http_code}' \
                -X DELETE \
                -H "Authorization: JWT ${JWT}" \
                "https://hub.docker.com/v2/repositories/${repo}/tags/${tag}/" || true)
              # 204 = deleted, 404 = already gone. Anything else, surface but don't fail the job.
              if [ "${http_code}" != "204" ] && [ "${http_code}" != "404" ]; then
                echo "    WARN: DELETE returned HTTP ${http_code} for ${repo}:${tag}" >&2
              fi
            done <<< "${tags}"
          done

      - name: Delete temp branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BRANCH: ${{ needs.create-temp-branch-and-dispatch-release.outputs.branch }}
        run: |
          set -euo pipefail
          if git push origin --delete "${BRANCH}"; then
            echo "Deleted branch ${BRANCH}"
          else
            echo "Branch ${BRANCH} could not be deleted (already gone or protected)." >&2
          fi
  
  milestone-release-on-main:
    needs: [manual-run-release-on-main]
    if: ${{ always() && !cancelled() && (!inputs.dry_run_release_on_branch || needs.manual-run-release-on-main.result == 'success') }}
    permissions:
      actions: read
      id-token: write
      contents: write
      packages: write
      pull-requests: write
    uses: ./.github/workflows/linea-milestone-release.yml
    with:
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: to be removed
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit
