name: Reusable Component Release

permissions:
  actions: read
  contents: write
  packages: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      component-name:
        description: "Component name — used to derive tag pattern (e.g. coordinator, postman)"
        required: true
        type: string
      folder-name:
        description: "Folder name of the component which hosts CHANGELOG.md (e.g. linea-besu's home folder is linea-besu/package)"
        required: true
        type: string
      include-path:
        description: "git-cliff --include-path filter, either single path (e.g. '\"coordinator/**\"') or JSON array string (e.g. '[\"tracer/**\",\"linea-besu/**\"]')"
        required: true
        type: string
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. docker image tag would be [semver]-[YYYYMMDD]-[commit]-[suffix], if not given, would be [semver]-[YYYYMMDD]-[commit]'
        required: false
        type: string
        default: ''
      release_tag_suffix:
        description: 'Custom release tag suffix, i.e. release tag would be releases/[component]/v[semver]-[suffix]'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean
    outputs:
      tag_changed:
        description: "Indicate whether the release tag of the component has changed"
        value: ${{ jobs.compute-release-metadata.outputs.tag_changed }}
      docker_tag:
        description: "Docker image tag associated with the release tag, empty if tag_changed is false"
        value: ${{ jobs.compute-docker-tag.outputs.docker_tag }}
      release_version:
        description: "Release semver associated with the release tag (e.g. 1.2.3), empty if tag_changed is false"
        value: ${{ jobs.compute-release-metadata.outputs.release_version }}
      release_tag:
        description: "Release tag (e.g. releases/coordinator/v1.2.3), empty if tag_changed is false"
        value: ${{ jobs.compute-release-metadata.outputs.release_tag }}

jobs:
  check-branch-and-release-tag-suffix:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps:
      - name: Enforce main branch cannot have custom tag suffix
        if: github.ref_name == 'main' && inputs.release_tag_suffix != ''
        run: |
          echo "❌ Main branch cannot have custom tag suffix: ${{ inputs.release_tag_suffix }}"
          exit 1

  compute-release-metadata:
    needs: [check-branch-and-release-tag-suffix]
    uses: ./.github/workflows/reusable-component-release-metadata.yml
    with:
      component-name: ${{ inputs.component-name }}
      include-path: ${{ inputs.include-path }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }}

  build-local-coordinator:
    needs: [compute-release-metadata]
    if: ${{ needs.compute-release-metadata.outputs.tag_changed == 'true' && inputs.component-name == 'coordinator' }}
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-coordinator
      push_image: false
    secrets: inherit

  build-local-postman:
    needs: [compute-release-metadata]
    if: ${{ needs.compute-release-metadata.outputs.tag_changed == 'true' && inputs.component-name == 'postman' }}
    uses: ./.github/workflows/postman-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-postman
      push_image: false
    secrets: inherit

  build-local-prover:
    needs: [compute-release-metadata]
    if: ${{ needs.compute-release-metadata.outputs.tag_changed == 'true' && inputs.component-name == 'prover' }}
    uses: ./.github/workflows/prover-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-prover
      push_image: false
    secrets: inherit

  build-local-tx-exclusion-api:
    needs: [compute-release-metadata]
    if: ${{ needs.compute-release-metadata.outputs.tag_changed == 'true' && inputs.component-name == 'tx-exclusion-api' }}
    uses: ./.github/workflows/transaction-exclusion-api-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-transaction-exclusion-api
      push_image: false
    secrets: inherit

  run-e2e-tests:
    needs: [compute-release-metadata, build-local-coordinator, build-local-postman, build-local-prover, build-local-tx-exclusion-api]
    if: >
      always() && !cancelled() &&
      needs.compute-release-metadata.outputs.tag_changed == 'true' &&
      (needs.build-local-coordinator.result   == 'success' ||
       needs.build-local-postman.result       == 'success' ||
       needs.build-local-prover.result        == 'success' ||
       needs.build-local-tx-exclusion-api.result == 'success')
    uses: ./.github/workflows/reuse-run-e2e-tests.yml
    with:
      image_tag: local
      linea_besu_package_tag: ''
      e2e-tests-logs-dump: true
      has-changes-requiring-e2e-testing: "true"
    secrets: inherit

  push-tag-update-changelog-and-gh-release:
    needs: [compute-release-metadata, run-e2e-tests]
    if: always() && !cancelled() && needs.run-e2e-tests.result == 'success'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: ${{ inputs.component-name }}
      folder-name: ${{ inputs.folder-name }}
      include-path: ${{ inputs.include-path }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }}
      release_version: ${{ needs.compute-release-metadata.outputs.release_version }}
      release_tag: ${{ needs.compute-release-metadata.outputs.release_tag }}
      changelog: ${{ needs.compute-release-metadata.outputs.changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit
