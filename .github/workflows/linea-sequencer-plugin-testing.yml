name: linea-sequencer-plugin-testing

permissions:
  contents: read
  actions: read

on:
  workflow_call:

concurrency:
  group: linea-sequencer-plugin-testing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run-linea-sequencer-plugins-unit-tests:
    name: "Sequencer Plugin Unit Tests"
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tracer Environment # configures Go, Java, and Gradle
        uses: ./.github/actions/setup-tracer-environment

      - name: spotless
        run: ./gradlew --parallel linea-besu:plugins:linea-sequencer:spotlessCheck

      - name: Build
        run: ./gradlew linea-besu:plugins:linea-sequencer:build

      - name: Run unit tests
        run: ./gradlew linea-besu:plugins:linea-sequencer:sequencer:test

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-report
          path: linea-besu/plugins/linea-sequencer/sequencer/build/reports/tests/test/
      - name: Upload Jacoco execution data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-linea-sequencer-unit-exec
          path: |
            **/build/jacoco/*.exec
          if-no-files-found: ignore

  run-linea-sequencer-plugins-acceptance-tests:
    name: "Sequencer Plugin Acceptance Tests"
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tracer Environment
        uses: ./.github/actions/setup-tracer-environment

      - name: Run acceptance tests
        run: ./gradlew linea-besu:plugins:linea-sequencer:acceptance-tests:acceptanceTests
        env:
          JAVA_OPTS: -Xmx10g -Xms2g

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: acceptance-test-report
          path: linea-besu/plugins/linea-sequencer/acceptance-tests/build/reports/tests/
      - name: Upload Jacoco execution data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-linea-sequencer-acceptance-exec
          path: |
            **/build/jacoco/*.exec
          if-no-files-found: ignore
