name: verifier-ray

on:
  pull_request:
    branches:
      - main
    paths:
      - 'verifier-ray/**'
      # Keep prover-ray off this trigger for now: verifier-ray uses a pinned
      # known-good prover-ray version and updates it manually to save CI runtime.
      # - 'prover-ray/**'
      # Keep arithmetization integration dependencies documented but non-blocking
      # while the RISC-V/zkc pipeline is still moving quickly.
      # - 'arithmetization/src/test/main.go'
      # - 'arithmetization/src/main/riscv/main.zkc'
      - '.github/workflows/verifier-ray.yml'
  push:
    branches:
      - main
    paths:
      - 'verifier-ray/**'
      # Keep prover-ray off this trigger for now: verifier-ray uses a pinned
      # known-good prover-ray version and updates it manually to save CI runtime.
      # - 'prover-ray/**'
      # Keep arithmetization integration dependencies documented but non-blocking
      # while the RISC-V/zkc pipeline is still moving quickly.
      # - 'arithmetization/src/test/main.go'
      # - 'arithmetization/src/main/riscv/main.zkc'
      - '.github/workflows/verifier-ray.yml'
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

env:
  GO_VERSION: '1.25.7'
  GO_CORSET_VERSION: 'v1.2.18'
  GO_CORSET_REF_FOR_ZKC: 'c7d95e35a4975bd32814ad46b079b16760f2475f'
  ZIG_VERSION: '0.17.0-dev.251+0db721ec2'

concurrency:
  group: verifier-ray-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-large
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      # Keep this aligned with .github/actions/setup-arithmetization-riscv, but use
      # newer Go because verifier-ray/prover-ray modules declare go 1.25.7.
      - name: Install Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: "**/*.sum"

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install native tools
        run: sudo apt-get update && sudo apt-get install -y binutils-riscv64-unknown-elf xxd

      - name: Install go-corset and zkc
        run: |
          go install github.com/consensys/go-corset/cmd/go-corset@${GO_CORSET_VERSION}
          go install github.com/consensys/go-corset/cmd/zkc@${GO_CORSET_REF_FOR_ZKC}
          go-corset --version
          go version -m "$(which zkc)"

      - name: Verifier-ray format check
        working-directory: verifier-ray
        run: make fmt

      - name: Verifier-ray generated testdata
        working-directory: verifier-ray
        run: make verify-testdata

      - name: Verifier-ray release build
        working-directory: verifier-ray
        run: make build-release

      - name: Verifier-ray tests
        working-directory: verifier-ray
        run: make test

      - name: Native verifier passing smoke test
        working-directory: verifier-ray
        run: make run-passing

      - name: Native verifier failing smoke test
        working-directory: verifier-ray
        run: make run-failing-expected

      - name: ZKC verifier passing smoke test
        working-directory: verifier-ray
        run: make zkc-verify-passing

      - name: ZKC verifier failing smoke test
        working-directory: verifier-ray
        run: make zkc-verify-failing-expected
