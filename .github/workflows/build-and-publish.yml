name: Docker build and publish

permissions:
  contents: read
  actions: read
  packages: write

on:
  workflow_call:
    inputs:
      commit_tag:
        required: true
        type: string
      develop_tag:
        required: true
        type: string
      coordinator_changed:
        required: true
        type: string
      native_yield_automation_service_changed:
        required: true
        type: string
      lido_governance_monitor_changed:
        required: true
        type: string
      postman_changed:
        required: true
        type: string
      prover_changed:
        required: true
        type: string
      transaction_exclusion_api_changed:
        required: true
        type: string
      maru_changed:
        required: true
        type: string
      build_linea_besu_package:
        required: true
        type: string
    outputs:
      linea_besu_package_tag:
        value: ${{ jobs.linea_besu_package_build_and_upload.outputs.linea_besu_package_tag }}
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

jobs:
  coordinator:
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    if: ${{ inputs.coordinator_changed == 'true' }}
    with:
      image_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      push_image: false
    secrets: inherit

  native_yield_automation_service:
    uses: ./.github/workflows/native-yield-automation-service-build-and-publish.yml
    if: ${{ inputs.native_yield_automation_service_changed == 'true' }}
    with:
      commit_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      image_name: consensys/linea-native-yield-automation-service
      push_image: false
    secrets: inherit

  lido_governance_monitor:
    uses: ./.github/workflows/lido-governance-monitor-build-and-publish.yml
    if: ${{ inputs.lido_governance_monitor_changed == 'true' }}
    with:
      commit_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      image_name: consensys/linea-lido-governance-monitor
      push_image: false
    secrets: inherit

  prover:
    uses: ./.github/workflows/prover-build-and-publish.yml
    if: ${{ inputs.prover_changed == 'true' }}
    with:
      image_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      push_image: false
    secrets: inherit

  postman:
    uses: ./.github/workflows/postman-build-and-publish.yml
    if: ${{ inputs.postman_changed == 'true' }}
    with:
      image_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      push_image: false
    secrets: inherit

  transaction_exclusion_api:
    uses: ./.github/workflows/transaction-exclusion-api-build-and-publish.yml
    if: ${{ inputs.transaction_exclusion_api_changed == 'true' }}
    with:
      image_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      push_image: false
    secrets: inherit

  maru:
    uses: ./.github/workflows/maru-build-and-publish.yml
    if: ${{ inputs.maru_changed == 'true' }}
    with:
      image_tag: ${{ inputs.commit_tag }}
      develop_tag: ${{ inputs.develop_tag }}
      push_image: false
    secrets: inherit

  linea_besu_package_build_and_upload:
    uses: ./.github/workflows/linea-besu-package-build-and-upload.yml
    if: ${{ inputs.build_linea_besu_package == 'true' }}
    with:
      release_version: 'dev'
      with_besu_fleet_plugin: false
    secrets: inherit
  
  # If all jobs are skipped, the workflow will still succeed.
  always_succeed:
    runs-on: ubuntu-24.04
    needs: [coordinator, postman, prover, transaction_exclusion_api, native_yield_automation_service, maru, linea_besu_package_build_and_upload]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'success') && !contains(needs.*.result, 'cancelled') }}
    steps:
      - name: Ensure Workflow Success
        run: echo "All jobs were skipped, but workflow succeeds."
