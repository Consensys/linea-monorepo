name: "Linea Besu Release (still in testing phase)"

permissions:
  actions: read
  id-token: write
  contents: write
  packages: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. docker image tag would be [semver]-[YYYYMMDD]-[commit]-[suffix], if not given, would be [semver]-[YYYYMMDD]-[commit]'
        required: false
        type: string
        default: ''
      release_tag_suffix:
        description: 'Custom release tag suffix, i.e. release tag would be releases/[component]/v[semver]-[suffix]'
        required: false
        type: string
        default: ''
      without_besu_fleet_plugin:
        description: 'Type "true" to exclude besu-fleet-plugin in the release'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean
    outputs:
      tag_changed:
        description: "Indicate whether the release tag of the component has changed"
        value: ${{ jobs.compute-linea-besu-release-metadata.outputs.tag_changed }}
      docker_tag:
        description: "Docker image tag associated with the release tag, empty if tag_changed is false"
        value: ${{ jobs.build-linea-besu-docker-image-and-gh-release.outputs.linea_besu_package_tag }}
      release_version:
        description: "Release semver associated with the release tag (e.g. 1.2.3), empty if tag_changed is false"
        value: ${{ jobs.compute-linea-besu-release-metadata.release_version }}
      release_tag:
        description: "Release tag (e.g. releases/linea-besu/v1.2.3), empty if tag_changed is false"
        value: ${{ jobs.compute-linea-besu-release-metadata.outputs.release_tag }}

  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. docker image tag would be [semver]-[YYYYMMDD]-[commit]-[suffix], if not given, would be [semver]-[YYYYMMDD]-[commit]'
        required: false
        type: string
        default: ''
      release_tag_suffix:
        description: 'Custom release tag suffix, i.e. release tag would be releases/[component]/v[semver]-[suffix]'
        required: false
        type: string
        default: ''
      without_besu_fleet_plugin:
        description: 'Type "true" to exclude besu-fleet-plugin in the release'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: linea-besu-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compute-linea-besu-release-metadata:
    uses: ./.github/workflows/reusable-component-release-metadata.yml
    with:
      component-name: linea-besu
      include-path: |
        tracer/**
        tracer-constraints/**
        linea-besu/plugins/linea-sequencer/**
        linea-besu/besu/**
        linea-besu/package/**
        gradle/libs.versions.toml
      release_tag_suffix: ${{ inputs.release_tag_suffix }}

  build-and-upload-artifact:
    needs: [compute-linea-besu-release-metadata]
    if: ${{ needs.compute-linea-besu-release-metadata.outputs.tag_changed == 'true' }}
    uses: ./.github/workflows/linea-besu-package-build-and-upload.yml
    with:
      release_tag_prefix: ${{ needs.compute-linea-besu-release-metadata.outputs.release_version }}
      with_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin != 'true' }}
    secrets: inherit

  run-test:
    needs: [ build-and-upload-artifact ]
    concurrency:
      group: run-test-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    uses: ./.github/workflows/reuse-linea-besu-package-run-test.yml
    with:
      dockerimage: ${{ needs.build-and-upload-artifact.outputs.dockerimage }}

  run-e2e-tests:
    needs: [ build-and-upload-artifact ]
    concurrency:
      group: run-e2e-tests-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    uses: ./.github/workflows/reuse-linea-besu-package-run-e2e-tests.yml
    with:
      linea_besu_package_tag: ${{ needs.build-and-upload-artifact.outputs.linea_besu_package_tag }}
      e2e-tests-logs-dump: true
      e2e-tests-with-besu-fleet: ${{ inputs.without_besu_fleet_plugin != 'true' }}
    secrets: inherit

  push-tag-update-changelog-and-gh-release:
    needs: [compute-linea-besu-release-metadata, run-test, run-e2e-tests]
    uses: ./.github/workflows/reusable-linea-besu-package-gh-release.yml
    with:
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }}
      without_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin }}
      release_version: ${{ needs.compute-linea-besu-release-metadata.outputs.release_version }}
      release_tag: ${{ needs.compute-linea-besu-release-metadata.outputs.release_tag }}
      changelog: ${{ needs.compute-linea-besu-release-metadata.outputs.changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit
