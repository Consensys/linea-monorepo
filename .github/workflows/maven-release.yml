name: Maven Release

permissions:
  contents: write
  actions: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      libToRelease:
        required: true
        type: string
        description: 'Library to release, e.g :jvm-libs:linea:blob-compressor'
      version:
        required: true
        type: string
        description: 'Release semantic version: e.g "1.0.0"'

jobs:
  release:
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-med
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'

      # Configure Gradle for optimal use in GiHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@8379f6a1328ee0e06e2bb424dadb7b159856a326 # 4.4.0

      - name: Clean
        # ./gradlew clean is necessary because the build is cached
        # and cause issues with JReleaser
        run: ./gradlew clean

      - name: Build
        # ./gradlew clean is necessary because the build is cached
        # and cause issues with JReleaser
        run: ./gradlew ${{github.event.inputs.libToRelease}}:build
        env:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN_RELEASE_ACCESS }}

      - name: Deploy to Local File System
        run: ./gradlew ${{github.event.inputs.libToRelease}}:publish -Pversion=${{github.event.inputs.version}}
        env:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN_RELEASE_ACCESS }}

      - name: Clear JReleaser tool cache
        # Self-hosted runners persist /home/runner between runs. JReleaser uses
        # Files.createDirectory (not createDirectories) when unpacking tools like
        # pomchecker, which fails if a partial extraction exists from a prior run.
        run: rm -rf ~/.jreleaser/caches

      - name: Deploy to Maven Central
        # TODO: Try reverting after Gradle 9
        # jreleaserDeploy handles GPG signing + Maven Central upload without
        # creating Git tags, which avoids a JGit classloader conflict:
        # Gradle bundles its own JGit (parent-first loading wins) that is missing
        # TagCommand.setGpgSigner(GpgObjectSigner) required by JReleaser 1.23.
        run: ./gradlew --stacktrace ${{github.event.inputs.libToRelease}}:jreleaserDeploy -Pversion=${{github.event.inputs.version}}
        env:
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.JRELEASER_GPG_PASSPHRASE }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.JRELEASER_GPG_SECRET_KEY }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.JRELEASER_GPG_PUBLIC_KEY }}
          JRELEASER_MAVENCENTRAL_USERNAME: ${{ secrets.JRELEASER_MAVENCENTRAL_USERNAME }}
          JRELEASER_MAVENCENTRAL_PASSWORD: ${{ secrets.JRELEASER_MAVENCENTRAL_PASSWORD }}

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets._GITHUB_TOKEN_RELEASE_ACCESS }}
        run: |
          ARTIFACT_ID=$(echo "${{ github.event.inputs.libToRelease }}" | awk -F: '{print $NF}')
          VERSION="${{ github.event.inputs.version }}"
          TAG_NAME="maven-${ARTIFACT_ID}-v${VERSION}"
          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "Maven package: ${ARTIFACT_ID} v${VERSION}" \
            --notes "Published to Maven Central" \
            --latest=false

      # Persist logs
      - name: JReleaser release output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jreleaser-release
          path: |
            build/jreleaser/trace.log
            build/jreleaser/output.properties
