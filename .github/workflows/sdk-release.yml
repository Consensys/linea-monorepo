name: sdk-release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - sdk-core
          - sdk-viem
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  create-release-pr:
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package directory
        id: pkg
        run: |
          case "${{ inputs.package }}" in
            sdk-core) echo "dir=sdk/sdk-core" >> "$GITHUB_OUTPUT" ;;
            sdk-viem) echo "dir=sdk/sdk-viem" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Compute next version
        id: version
        run: |
          PKG_DIR="${{ steps.pkg.outputs.dir }}"
          CURRENT=$(node -p "require('./$PKG_DIR/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping ${{ inputs.package }} from $CURRENT to $NEXT (${{ inputs.bump }})"

      - name: Check version is not already published
        run: |
          TAG="${{ inputs.package }}-v${{ steps.version.outputs.next }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Version ${{ steps.version.outputs.next }} has already been released."
            exit 1
          fi

      - name: Bump version in package.json
        run: |
          PKG_DIR="${{ steps.pkg.outputs.dir }}"
          node -e "
            const fs = require('fs');
            const path = './$PKG_DIR/package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = '${{ steps.version.outputs.next }}';
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog entry
        id: changelog
        run: |
          PKG_DIR="${{ steps.pkg.outputs.dir }}"
          PACKAGE="${{ inputs.package }}"
          NEXT="${{ steps.version.outputs.next }}"
          DATE=$(date +%Y-%m-%d)
          CHANGELOG="$PKG_DIR/CHANGELOG.md"

          PREV_TAG=$(git tag --list "${PACKAGE}-v*" --sort=-v:refname | head -n1)

          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" -- "$PKG_DIR")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- "$PKG_DIR")
          fi

          if [[ -z "$COMMITS" ]]; then
            COMMITS="- No notable changes"
          fi

          HEADER=$(head -n1 "$CHANGELOG" 2>/dev/null || echo "# @consensys/linea-${PACKAGE}")
          BODY=$(tail -n+2 "$CHANGELOG" 2>/dev/null || echo "")

          {
            echo "$HEADER"
            echo ""
            echo "## $NEXT ($DATE)"
            echo ""
            echo "$COMMITS"
            echo "$BODY"
          } > "$CHANGELOG"

          {
            echo "commits<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create release PR
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          branch: release/${{ inputs.package }}-v${{ steps.version.outputs.next }}
          commit-message: "release(${{ inputs.package }}): v${{ steps.version.outputs.next }}"
          title: "release(${{ inputs.package }}): v${{ steps.version.outputs.next }}"
          body: |
            ## Release `@consensys/linea-${{ inputs.package }}` v${{ steps.version.outputs.next }}

            **Bump type:** ${{ inputs.bump }}
            **Previous version:** ${{ steps.version.outputs.current }}

            ### Changes

            ${{ steps.changelog.outputs.commits }}

            ### After merging

            Go to **Actions → sdk-publish → Run workflow** and select `${{ inputs.package }}` to publish to npm.
          labels: release
