name: sdk-release

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to release"
        required: true
        type: choice
        options:
          - sdk-core
          - sdk-viem
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Ensure running on main
        if: github.ref != 'refs/heads/main'
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::error::sdk-release must be triggered from the main branch, got $REF"
          exit 1

  create-release-pr:
    needs: guard
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve package directory
        id: pkg
        env:
          PACKAGE: ${{ inputs.package }}
        run: |
          case "$PACKAGE" in
            sdk-core) echo "dir=sdk/sdk-core" >> "$GITHUB_OUTPUT" ;;
            sdk-viem) echo "dir=sdk/sdk-viem" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Compute next version
        id: version
        env:
          PKG_DIR: ${{ steps.pkg.outputs.dir }}
          BUMP: ${{ inputs.bump }}
          PACKAGE: ${{ inputs.package }}
        run: |
          CURRENT=$(node -p "require('./$PKG_DIR/package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEXT="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Bumping $PACKAGE from $CURRENT to $NEXT ($BUMP)"

      - name: Check version is not already released
        env:
          PACKAGE: ${{ inputs.package }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          TAG="${PACKAGE}-v${NEXT_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Version $NEXT_VERSION has already been released."
            exit 1
          fi

          NPM_NAME="@consensys/linea-${PACKAGE}"
          if npm view "${NPM_NAME}@${NEXT_VERSION}" version 2>/dev/null; then
            echo "::error::${NPM_NAME}@${NEXT_VERSION} is already published on npm."
            exit 1
          fi

      - name: Bump version in package.json
        env:
          PKG_DIR: ${{ steps.pkg.outputs.dir }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          node -e "
            const fs = require('fs');
            const p = './' + process.env.PKG_DIR + '/package.json';
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = process.env.NEXT_VERSION;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog entry
        id: changelog
        env:
          PKG_DIR: ${{ steps.pkg.outputs.dir }}
          PACKAGE: ${{ inputs.package }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
        run: |
          DATE=$(date +%Y-%m-%d)
          CHANGELOG="$PKG_DIR/CHANGELOG.md"

          PREV_TAG=$(git tag --list "${PACKAGE}-v*" --sort=-v:refname | head -n1)

          if [[ -n "$PREV_TAG" ]]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" -- "$PKG_DIR")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" -- "$PKG_DIR")
          fi

          if [[ -z "$COMMITS" ]]; then
            COMMITS="- No notable changes"
          fi

          HEADER=$(head -n1 "$CHANGELOG" 2>/dev/null || echo "# @consensys/linea-${PACKAGE}")
          BODY=$(tail -n+2 "$CHANGELOG" 2>/dev/null || echo "")

          {
            echo "$HEADER"
            echo ""
            echo "## $NEXT_VERSION ($DATE)"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "$BODY"
          } > "$CHANGELOG"

          DELIMITER="COMMITS_$(openssl rand -hex 8)"
          {
            echo "commits<<${DELIMITER}"
            echo "$COMMITS"
            echo "$DELIMITER"
          } >> "$GITHUB_OUTPUT"

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Lint
        env:
          PACKAGE: ${{ inputs.package }}
        run: pnpm -F "@consensys/linea-${PACKAGE}" run lint

      - name: Build
        env:
          PACKAGE: ${{ inputs.package }}
        run: pnpm -F "@consensys/linea-${PACKAGE}..." run build

      - name: Test
        env:
          PACKAGE: ${{ inputs.package }}
        run: pnpm -F "@consensys/linea-${PACKAGE}" run test

      - name: Write pull request body
        id: pr_body
        env:
          PACKAGE: ${{ inputs.package }}
          NEXT_VERSION: ${{ steps.version.outputs.next }}
          CURRENT_VERSION: ${{ steps.version.outputs.current }}
          BUMP: ${{ inputs.bump }}
          COMMITS: ${{ steps.changelog.outputs.commits }}
        run: |
          BODY_FILE="${RUNNER_TEMP}/sdk-release-pr-body.md"
          {
            echo "## Release @consensys/linea-${PACKAGE} v${NEXT_VERSION}"
            echo ""
            echo "**Bump type:** ${BUMP}"
            echo "**Previous version:** ${CURRENT_VERSION}"
            echo ""
            echo "### Changes"
            echo ""
            echo "${COMMITS}"
            echo ""
            echo "### After merging"
            echo ""
            echo "1. Note the **commit SHA** from this merged PR (visible on the merged PR page or via git log main -1)"
            echo "2. Go to **Actions → sdk-publish → Run workflow**"
            echo "3. Select ${PACKAGE}, paste the commit SHA, and run"
          } > "$BODY_FILE"
          echo "path=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app-token
        with:
          app-id: ${{ secrets.CREATE_GITHUB_PR_APP_ID }}
          private-key: ${{ secrets.CREATE_GITHUB_PR_PRIVATE_KEY }}

      - name: Create pull request
        id: cpr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "release(${{ inputs.package }}): v${{ steps.version.outputs.next }}"
          branch: release-${{ inputs.package }}-v${{ steps.version.outputs.next }}
          base: main
          title: "release(${{ inputs.package }}): v${{ steps.version.outputs.next }}"
          body-path: ${{ steps.pr_body.outputs.path }}
