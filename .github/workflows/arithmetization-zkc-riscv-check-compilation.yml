name: Tracer riscv-constraints check compilation

on:
  pull_request:
    branches:
      - main
    paths:
      - 'arithmetization/**'
      - '.github/actions/setup-arithmetization-riscv/**'
      - '.github/workflows/arithmetization-*.yml'
  push:
    branches:
     - main
    paths:
     - 'arithmetization/**'
     - '.github/actions/setup-arithmetization-riscv/**'
     - '.github/workflows/arithmetization-*.yml'
  workflow_call:
  workflow_dispatch:
    inputs:
      go-corset-ref:
        description: 'go-corset commit/branch/tag for zkc (defaults to main)'
        required: false
        type: string

permissions:
  contents: read
  actions: read

jobs:
  check-compilation:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup Environment
        uses: ./.github/actions/setup-arithmetization-riscv

      - name: Install zkc and check compilation of RISC-V in ZkC
        run: make -C arithmetization riscv-check-compilation
        # Pinned to the last known-good commit before go-corset#1813
        env:
          GO_CORSET_REF_FOR_ZKC: ${{ inputs.go-corset-ref || '5dc39754f5596b701231d6535c5973e3f8ec3889' }}

      - name: Linting Check
        run: make -C arithmetization riscv-check-lint
