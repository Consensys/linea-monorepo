name: Build and Publish Linea Besu

permissions:
  contents: write  # required to push update to the PR branch
  actions: read
  packages: write

on:
  workflow_call:
    secrets:
      CLOUDSMITH_USER:
        required: false
      CLOUDSMITH_API_KEY:
        required: false

jobs:
  build:
    environment: publish
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Check besuCommit change
        uses: ./.github/actions/check-lib-version-change
        id: check_besu_commit
        with:
          target_lib: besuCommit
          target_file_path: gradle/libs.versions.toml

      - name: Setup Java and Gradle
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' }}
        uses: ./.github/actions/setup-java-and-gradle

      - name: Build besu from source and publish to maven including Cloudsmith
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' }}
        run: ./gradlew linea-besu:build -PpublishToMaven=true
        env:
          JAVA_OPTS: -Xmx2g -Dorg.gradle.daemon=false
          ORG_GRADLE_PROJECT_cloudsmithUser: ${{ secrets.CLOUDSMITH_USER }}
          ORG_GRADLE_PROJECT_cloudsmithApiKey: ${{ secrets.CLOUDSMITH_API_KEY }}

      - name: Parse besu version from lib.versions.toml
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' }}
        id: release_versions
        uses: ./.github/actions/parse-release-versions

      - name: Check besu distribution exists
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' }}
        id: check_besu_dist
        run: |
          BESU_DIST="tmp/besu-eth/build/distributions/besu-${{ steps.release_versions.outputs.besu_version }}.tar.gz"
          if [ -f "$BESU_DIST" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Cloudsmith publish: $BESU_DIST not found"
          fi

      - name: Publish besu distribution artifact to Cloudsmith
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' && steps.check_besu_dist.outputs.exists == 'true'}}
        run: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv
          python3 -m venv tmp/cloudsmith-env
          source tmp/cloudsmith-env/bin/activate
          python3 -m pip install --upgrade cloudsmith-cli
          cloudsmith push raw consensys/linea-besu tmp/besu-eth/build/distributions/besu-${LINEA_BESU_VERSION}.tar.gz \
            --republish \
            --name 'linea-besu.tar.gz' \
            --version "${LINEA_BESU_VERSION}" \
            --summary "Linea Besu ${LINEA_BESU_VERSION} binary distribution" \
            --description "Binary distribution of Linea Besu ${LINEA_BESU_VERSION}." \
            --content-type 'application/tar+gzip'
        env:
          CLOUDSMITH_USER: ${{ secrets.CLOUDSMITH_USER }}
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
          LINEA_BESU_VERSION: ${{ steps.release_versions.outputs.besu_version }}

      # The linea-besu/.besu-resolved cache file is listed in .gitignore so local
      # developer regenerations don't get staged by `git add .`. CI uses `git add --force`
      # to bypass the ignore rule and push the refreshed cache to the PR branch.
      - name: Commit and push updated .besu-resolved cache file to PR
        if: ${{ steps.check_besu_commit.outputs.version_changed == 'true' && github.event_name == 'pull_request' }}
        run: |
          BRANCH="${{ github.head_ref }}"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --force linea-besu/.besu-resolved
          if git diff --cached --quiet; then
            echo "No cache updates to commit"
          else
            git commit -m "chore: refresh linea-besu/.besu-resolved after besuCommit bump"
            git push origin "$BRANCH"
          fi

