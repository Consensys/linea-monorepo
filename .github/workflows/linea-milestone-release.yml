name: "Linea Milestone Release"

permissions:
  actions: read
  id-token: write
  contents: write
  packages: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. All docker images would be retagged as [semver]-[YYYYMMDD]-[commit]-[suffix]'
        required: true
        type: string
      release_tag_suffix:
        description: 'Custom release tag suffix, i.e. release tag would be releases/[component]/v[semver]-[suffix]'
        required: false
        default: ''
      without_besu_fleet_plugin:
        description: 'Type "true" to exclude besu-fleet-plugin in the linea-besu-package release'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: linea-milestone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch-and-compute-tag:
    uses: ./.github/workflows/reusable-milestone-check-branch-and-compute-tag.yml
    with:
      release_tag_suffix: ${{ inputs.release_tag_suffix }}
    secrets: inherit

  component-release-metadata:
    needs: [check-branch-and-compute-tag]
    uses: ./.github/workflows/reusable-milestone-component-release-metadata.yml
    with:
      release_tag_suffix: ${{ inputs.release_tag_suffix }}
    secrets: inherit

  build-local-coordinator:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed == 'true' }}
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-coordinator
      push_image: false
    secrets: inherit

  build-local-postman:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag_changed == 'true' }}
    uses: ./.github/workflows/postman-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-postman
      push_image: false
    secrets: inherit

  build-local-prover:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag_changed == 'true' }}
    uses: ./.github/workflows/prover-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-prover
      push_image: false
    secrets: inherit

  build-local-tx-exclusion-api:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed == 'true' }}
    uses: ./.github/workflows/transaction-exclusion-api-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-transaction-exclusion-api
      push_image: false
    secrets: inherit

  build-local-linea-besu-package:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).tag_changed == 'true' }}
    uses: ./.github/workflows/linea-besu-package-build-and-upload.yml
    with:
      release_tag_prefix: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).release_version }}
      with_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin != 'true' }}
    secrets: inherit

  component-latest-docker-tags:
    needs:
      - component-release-metadata
      - build-local-coordinator
      - build-local-postman
      - build-local-prover
      - build-local-tx-exclusion-api
      - build-local-linea-besu-package
    if: >
      always() && !cancelled() &&
      ((fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed != 'true' || needs.build-local-coordinator.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.postman).tag_changed != 'true' || needs.build-local-postman.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.prover).tag_changed != 'true' || needs.build-local-prover.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed != 'true' || needs.build-local-tx-exclusion-api.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.linea-besu-package).tag_changed != 'true' || needs.build-local-linea-besu-package.result == 'success'))
    uses: ./.github/workflows/reusable-milestone-component-latest-docker-tags.yml
    with:
      coordinator_metadata: ${{ needs.component-release-metadata.outputs.coordinator }}
      prover_metadata: ${{ needs.component-release-metadata.outputs.prover }}
      postman_metadata: ${{ needs.component-release-metadata.outputs.postman }}
      tx_exclusion_api_metadata: ${{ needs.component-release-metadata.outputs.tx-exclusion-api }}
      linea_besu_package_metadata: ${{ needs.component-release-metadata.outputs.linea-besu-package }}
    secrets: inherit

  run-e2e-tests:
    needs: 
      - component-release-metadata
      - component-latest-docker-tags
      - build-local-linea-besu-package
    if: always() && !cancelled() && needs.component-latest-docker-tags.result == 'success'
    uses: ./.github/workflows/reuse-run-e2e-tests.yml
    with:
      image_tag: local
      coordinator_tag: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.coordinator || '' }}
      postman_tag: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.postman || '' }}
      prover_tag: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.prover || '' }}
      tx_exclusion_api_tag: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.tx-exclusion-api || '' }}
      linea_besu_package_tag: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.linea-besu-package || needs.build-local-linea-besu-package.outputs.linea_besu_package_tag }}
      e2e-tests-logs-dump: true
      has-changes-requiring-e2e-testing: 'true'
    secrets: inherit

  coordinator-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: coordinator
      folder-name: coordinator
      include-path: coordinator/**
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      upload_changelog: true
    secrets: inherit

  prover-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.prover).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: prover
      folder-name: prover
      include-path: prover/**
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.prover).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.prover).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.prover).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      upload_changelog: true
    secrets: inherit

  postman-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.postman).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: postman
      folder-name: postman
      include-path: postman/**
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.postman).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.postman).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.postman).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      upload_changelog: true
    secrets: inherit

  tx-exclusion-api-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: tx-exclusion-api
      folder-name: transaction-exclusion-api
      include-path: transaction-exclusion-api/**
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      upload_changelog: true
    secrets: inherit

  linea-besu-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.linea-besu-package).tag_changed == 'true'
    uses: ./.github/workflows/reusable-linea-besu-package-gh-release.yml
    with:
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      without_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin }}
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      upload_changelog: true
    secrets: inherit

  # retag docker image tags with image_tag_suffix for tag-unchanged components
  retag-latest-docker-tags:
    needs: [component-release-metadata, component-latest-docker-tags, run-e2e-tests]
    if: >
      always() && !cancelled() &&
      inputs.image_tag_suffix != '' &&
      needs.run-e2e-tests.result == 'success' &&
      needs.component-latest-docker-tags.result == 'success'
    uses: ./.github/workflows/reusable-milestone-retag-latest-docker-tags.yml
    with:
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      coordinator_metadata: ${{ needs.component-release-metadata.outputs.coordinator }}
      prover_metadata: ${{ needs.component-release-metadata.outputs.prover }}
      postman_metadata: ${{ needs.component-release-metadata.outputs.postman }}
      tx_exclusion_api_metadata: ${{ needs.component-release-metadata.outputs.tx-exclusion-api }}
      linea_besu_package_metadata: ${{ needs.component-release-metadata.outputs.linea-besu-package }}
      coordinator_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.coordinator }}
      prover_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.prover }}
      postman_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.postman }}
      tx_exclusion_api_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.tx-exclusion-api }}
      linea_besu_package_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.linea-besu-package }}
    secrets: inherit

  # prepend CHANGELOG for each component for linea release (and then create PR)
  linea-milestone-changelog-update:
    needs:
      - check-branch-and-compute-tag
      - component-release-metadata
      - component-latest-docker-tags
      - retag-latest-docker-tags
      - coordinator-gh-release
      - postman-gh-release
      - prover-gh-release
      - tx-exclusion-api-gh-release
      - linea-besu-gh-release
    if: >
      always() && !cancelled() &&
      (inputs.image_tag_suffix == '' || needs.retag-latest-docker-tags.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed != 'true' || needs.coordinator-gh-release.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.postman).tag_changed != 'true' || needs.postman-gh-release.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.prover).tag_changed != 'true' || needs.prover-gh-release.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed != 'true' || needs.tx-exclusion-api-gh-release.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.linea-besu-package).tag_changed != 'true' || needs.linea-besu-gh-release.result == 'success')
    uses: ./.github/workflows/reusable-milestone-release-push-tag-changelog.yml
    with:
      release_version: ${{ needs.check-branch-and-compute-tag.outputs.release_version }}
      release_tag: ${{ needs.check-branch-and-compute-tag.outputs.release_tag }}
      coordinator_release_version: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).release_version || needs.component-latest-docker-tags.outputs.coordinator-release-version }}
      postman_release_version: ${{ fromJson(needs.component-release-metadata.outputs.postman).release_version || needs.component-latest-docker-tags.outputs.postman-release-version }}
      prover_release_version: ${{ fromJson(needs.component-release-metadata.outputs.prover).release_version || needs.component-latest-docker-tags.outputs.prover-release-version }}
      tx_exclusion_api_release_version: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).release_version || needs.component-latest-docker-tags.outputs.tx-exclusion-api-release-version }}
      linea_besu_release_version: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu-package).release_version || needs.component-latest-docker-tags.outputs.linea-besu-package-release-version }}
      create_pull_request: true # TODO: remove this later
    secrets: inherit

  linea-milestone-gh-release:
    needs:
      - check-branch-and-compute-tag
      - component-release-metadata
      - component-latest-docker-tags
      - linea-milestone-changelog-update
      - coordinator-gh-release
      - postman-gh-release
      - prover-gh-release
      - tx-exclusion-api-gh-release
      - linea-besu-gh-release
    if: >
      always() && !cancelled() &&
      needs.linea-milestone-changelog-update.result == 'success'
    uses: ./.github/workflows/reusable-milestone-gh-release.yml
    with:
      release_version: ${{ needs.check-branch-and-compute-tag.outputs.release_version }}
      release_tag: ${{ needs.check-branch-and-compute-tag.outputs.release_tag }}
      changelog: ${{ needs.linea-milestone-changelog-update.outputs.changelog }}
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
      coordinator_metadata: ${{ needs.component-release-metadata.outputs.coordinator }}
      prover_metadata: ${{ needs.component-release-metadata.outputs.prover }}
      postman_metadata: ${{ needs.component-release-metadata.outputs.postman }}
      tx_exclusion_api_metadata: ${{ needs.component-release-metadata.outputs.tx-exclusion-api }}
      linea_besu_package_metadata: ${{ needs.component-release-metadata.outputs.linea-besu-package }}
      coordinator_docker_tag_with_suffix: ${{ needs.coordinator-gh-release.outputs.docker_tag_with_suffix }}
      prover_docker_tag_with_suffix: ${{ needs.prover-gh-release.outputs.docker_tag_with_suffix }}
      postman_docker_tag_with_suffix: ${{ needs.postman-gh-release.outputs.docker_tag_with_suffix }}
      tx_exclusion_api_docker_tag_with_suffix: ${{ needs.tx-exclusion-api-gh-release.outputs.docker_tag_with_suffix }}
      linea_besu_package_docker_tag_with_suffix: ${{ needs.linea-besu-gh-release.outputs.docker_tag_with_suffix }}
      coordinator_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.coordinator }}
      prover_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.prover }}
      postman_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.postman }}
      tx_exclusion_api_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.tx-exclusion-api }}
      linea_besu_package_latest_docker_tag: ${{ needs.component-latest-docker-tags.outputs.linea-besu-package }}
    secrets: inherit
