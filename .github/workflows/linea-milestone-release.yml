name: "Linea Milestone Release (still in testing phase)"

permissions:
  actions: read
  id-token: write
  contents: write
  packages: write

on:
  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. All docker images would be retagged as [semver]-[YYYYMMDDHHMMSS]-[commit]-[suffix]'
        required: true
        type: string
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: linea-milestone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps:
      - name: Enforce main branch
        if: github.ref_name != 'main'
        run: |
          echo "❌ This workflow can only be run on main (current: ${{ github.ref_name }})"
          exit 0

  component-release-metadata:
    needs: [check-branch]
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    strategy:
      fail-fast: false
      matrix:
        component: [ coordinator, prover, postman, tx-exclusion-api, linea-besu ]
        include:
          - component-name: coordinator
            include-path: '"coordinator/**"'
          - component-name: prover
            include-path: '"prover/**"'
          - component: postman
            include-path: '"postman/**"'
          - component: tx-exclusion-api
            include-path: '"transaction-exclusion-api/**"'
          - component: linea-besu
            include-path: '["tracer/**","tracer-constraints/**","linea-besu/plugins/linea-sequencer/**","linea-besu/**","gradle/libs.versions.toml"]'
    outputs:
      coordinator: ${{ steps.changelog-outputs.outputs.coordinator }}
      prover: ${{ steps.changelog-outputs.outputs.prover }}
      postman: ${{ steps.changelog-outputs.outputs.postman }}
      tx-exclusion-api: ${{ steps.changelog-outputs.outputs.tx-exclusion-api }}
      linea-besu: ${{ steps.changelog-outputs.outputs.linea-besu }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Install git-cliff
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 #(v2.75.19)
        with:
          tool: git-cliff

      - name: Generate ${{ matrix.component-name }} latest changelog
        id: changelog
        uses: ./.github/actions/run-git-cliff-commands
        with:
          component-name: ${{ matrix.component-name }}
          include-path: ${{ matrix.include-path }}
          generate-changelog-with-next-tag-version: 'true'
      
      - name: Changelog outputs
        id: changelog-outputs
        run: |
          JSON_OUTPUTS=$(jq -n \
            --arg changelog-content "${{ steps.changelog.outputs.changelog_content }}" \
            --arg next-version "${{ steps.changelog.outputs.next_version }}" \
            --arg next-tag "${{ steps.changelog.outputs.next_tag }}" \
            --arg tag-changed "${{ steps.changelog.outputs.tag_changed }}" \
            '{changelog-content : $changelog-content, next-version: $next-version, tag-changed: $tag-changed}')
          echo "${{ matrix.component-name }}=$JSON_OUTPUTS" >> $GITHUB_OUTPUT

  build-local-coordinator:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag-changed == 'true' }}
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-coordinator
      push_image: false
    secrets: inherit

  build-local-postman:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag-changed == 'true' }}
    uses: ./.github/workflows/postman-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-postman
      push_image: false
    secrets: inherit

  build-local-prover:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag-changed == 'true' }}
    uses: ./.github/workflows/prover-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-prover
      push_image: false
    secrets: inherit

  build-local-tx-exclusion-api:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag-changed == 'true' }}
    uses: ./.github/workflows/transaction-exclusion-api-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-transaction-exclusion-api
      push_image: false
    secrets: inherit

  build-local-linea-besu:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).tag-changed == 'true' }}
    uses: ./.github/workflows/linea-besu-package-build-and-upload.yml
    with:
      release_tag_prefix: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).next-version }}
      with_besu_fleet_plugin: 'true'
    secrets: inherit

  component-latest-docker-tags:
    needs:
      - build-local-coordinator
      - build-local-postman
      - build-local-prover
      - build-local-tx-exclusion-api
      - build-local-linea-besu
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    strategy:
      fail-fast: false
      matrix:
        component: [ coordinator, prover, postman, tx-exclusion-api, linea-besu ]
        include:
          - component: coordinator
            image-name: linea-coordinator
          - component: prover
            image-name: linea-prover
          - component: postman
            image-name: linea-postman
          - component: tx-exclusion-api
            image-name: linea-transaction-exclusion-api
          - component: linea-besu
            image-name: linea-besu-package
    outputs:
      coordinator-docker-tag: ${{ steps.latest-docker-tag.outputs.coordinator-latest-docker-tag }}
      prover-docker-tag: ${{ steps.latest-docker-tag.outputs.prover-latest-docker-tag }}
      postman-docker-tag: ${{ steps.latest-docker-tag.outputs.postman-latest-docker-tag }}
      tx-exclusion-api-docker-tag: ${{ steps.latest-docker-tag.outputs.tx-exclusion-api-latest-docker-tag }}
      linea-besu-docker-tag: ${{ steps.latest-docker-tag.outputs.linea-besu-latest-docker-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Component latest docker tag
        id: get-latest-docker-tag
        uses: ./.github/actions/get-latest-release-image-tag
        with:
          component-name: ${{ matrix.component }}
          image-name: ${{ matrix.image-name }}
      
      - name: Output latest docker tags
        id: latest-docker-tag
        run: |
          echo "${{ matrix.component }}-latest-docker-tag=${{ steps.get-latest-docker-tag.outputs.image_tag }}" >> $GITHUB_OUTPUT

  run-e2e-tests:
    needs: 
      - component-latest-docker-tags
      - build-local-coordinator
      - build-local-postman
      - build-local-prover
      - build-local-tx-exclusion-api
      - build-local-linea-besu
    uses: ./.github/workflows/reuse-run-e2e-tests.yml
    with:
      image_tag: local
      coordinator_tag: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag-changed != 'true' && needs.component-latest-docker-tags.outputs.coordinator-docker-tag || '' }}
      postman_tag: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag-changed != 'true' && needs.component-latest-docker-tags.outputs.postman-docker-tag || '' }}
      prover_tag: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag-changed != 'true' && needs.component-latest-docker-tags.outputs.prover-docker-tag || '' }}
      tx_exclusion_api_tag: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag-changed != 'true' && needs.component-latest-docker-tags.outputs.tx-exclusion-api-docker-tag || '' }}
      linea_besu_package_tag: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).tag-changed != 'true' && needs.component-latest-docker-tags.outputs.linea-besu-docker-tag || needs.build-local-linea-besu.outputs.linea_besu_package_tag }}
      e2e-tests-logs-dump: true
      has-changes-requiring-e2e-testing: 'true'
    secrets: inherit
