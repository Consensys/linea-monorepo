name: "Linea Milestone Release (still in testing phase)"

permissions:
  actions: read
  id-token: write
  contents: write
  packages: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      image_tag_suffix:
        description: 'Custom docker image tag suffix, i.e. All docker images would be retagged as [semver]-[YYYYMMDD]-[commit]-[suffix]'
        required: true
        type: string
      release_tag_suffix:
        description: 'Custom release tag suffix, i.e. release tag would be releases/[component/v[semver]-[suffix]'
        required: false
        default: ''
      without_besu_fleet_plugin:
        description: 'Type "true" to exclude besu-fleet-plugin in the linea-besu-package release'
        required: false
        type: string
        default: ''
      draft_release:
        description: 'Draft Release'
        required: false
        default: false
        type: boolean
      pre_release:
        description: 'Pre Release'
        required: false
        default: false
        type: boolean

concurrency:
  group: linea-milestone-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-branch:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-small
    steps: #TODO: set exit back to 1
      - name: Enforce main branch
        if: github.ref_name != 'main'
        run: |
          echo "❌ This workflow can only be run on main (current: ${{ github.ref_name }})"
          exit 0

  component-release-metadata:
    needs: [check-branch]
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    strategy:
      fail-fast: false
      matrix:
        component-name: [ coordinator, prover, postman, tx-exclusion-api, linea-besu ]
        include:
          - component-name: coordinator
            include-path: '"coordinator/**"'
          - component-name: prover
            include-path: '"prover/**"'
          - component-name: postman
            include-path: '"postman/**"'
          - component-name: tx-exclusion-api
            include-path: '"transaction-exclusion-api/**"'
          - component-name: linea-besu
            include-path: '["tracer/**","tracer-constraints/**","linea-besu/plugins/linea-sequencer/**","linea-besu/**","gradle/libs.versions.toml"]'
    outputs:
      coordinator: ${{ steps.changelog-outputs.outputs.coordinator }}
      prover: ${{ steps.changelog-outputs.outputs.prover }}
      postman: ${{ steps.changelog-outputs.outputs.postman }}
      tx-exclusion-api: ${{ steps.changelog-outputs.outputs.tx-exclusion-api }}
      linea-besu: ${{ steps.changelog-outputs.outputs.linea-besu }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Install git-cliff
        uses: taiki-e/install-action@5f57d6cb7cd20b14a8a27f522884c4bc8a187458 #(v2.75.19)
        with:
          tool: git-cliff

      - name: Generate ${{ matrix.component-name }} latest changelog
        id: changelog
        uses: ./.github/actions/run-git-cliff-commands
        with:
          component-name: ${{ matrix.component-name }}
          include-path: ${{ matrix.include-path }}
          release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later
          generate-changelog-with-next-tag-version: 'true'
      
      - name: Changelog outputs
        id: changelog-outputs
        env:
          COMPONENT_NAME: ${{ matrix.component-name }}
          CHANGELOG_CONTENT: ${{ steps.changelog.outputs.changelog_content }}
          NEXT_VERSION: ${{ steps.changelog.outputs.next_version }}
          NEXT_TAG: ${{ steps.changelog.outputs.next_tag }}
          TAG_CHANGED: ${{ steps.changelog.outputs.tag_changed }}
        run: |
          set -euo pipefail
          JSON_OUTPUTS=$(jq -c -n \
            --arg changelog_content "$CHANGELOG_CONTENT" \
            --arg next_version      "$NEXT_VERSION" \
            --arg next_tag          "$NEXT_TAG" \
            --arg tag_changed       "$TAG_CHANGED" \
            '{changelog: $changelog_content, release_version: $next_version, release_tag: $next_tag, tag_changed: $tag_changed}')
          {
            echo "${COMPONENT_NAME}<<__JSON_EOF__"
            printf '%s\n' "$JSON_OUTPUTS"
            echo "__JSON_EOF__"
          } >> "$GITHUB_OUTPUT"

  build-local-coordinator:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed == 'true' }}
    uses: ./.github/workflows/coordinator-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-coordinator
      push_image: false
    secrets: inherit

  build-local-postman:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag_changed == 'true' }}
    uses: ./.github/workflows/postman-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-postman
      push_image: false
    secrets: inherit

  build-local-prover:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag_changed == 'true' }}
    uses: ./.github/workflows/prover-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-prover
      push_image: false
    secrets: inherit

  build-local-tx-exclusion-api:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed == 'true' }}
    uses: ./.github/workflows/transaction-exclusion-api-build-and-publish.yml
    with:
      image_tag: local
      develop_tag: develop
      image_name: consensys/linea-transaction-exclusion-api
      push_image: false
    secrets: inherit

  build-local-linea-besu:
    needs: [component-release-metadata]
    if: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).tag_changed == 'true' }}
    uses: ./.github/workflows/linea-besu-package-build-and-upload.yml
    with:
      release_tag_prefix: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).next_version }}
      with_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin != 'true' }}
    secrets: inherit

  component-latest-docker-tags:
    needs:
      - build-local-coordinator
      - build-local-postman
      - build-local-prover
      - build-local-tx-exclusion-api
      - build-local-linea-besu
    if: >
      always() && !cancelled() &&
      ((fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed != 'true' || needs.build-local-coordinator.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.postman).tag_changed != 'true' || needs.build-local-postman.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.prover).tag_changed != 'true' || needs.build-local-prover.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed != 'true' || needs.build-local-tx-exclusion-api.result == 'success') &&
      (fromJson(needs.component-release-metadata.outputs.linea-besu).tag_changed != 'true' || needs.build-local-linea-besu.result == 'success'))
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    strategy:
      fail-fast: true
      matrix:
        component: [ coordinator, prover, postman, tx-exclusion-api, linea-besu ]
        include:
          - component: coordinator
            image-name: linea-coordinator
          - component: prover
            image-name: linea-prover
          - component: postman
            image-name: linea-postman
          - component: tx-exclusion-api
            image-name: linea-transaction-exclusion-api
          - component: linea-besu
            image-name: linea-besu-package
    outputs:
      coordinator: ${{ steps.latest-docker-tag.outputs.coordinator-latest-docker-tag }}
      prover: ${{ steps.latest-docker-tag.outputs.prover-latest-docker-tag }}
      postman: ${{ steps.latest-docker-tag.outputs.postman-latest-docker-tag }}
      tx-exclusion-api: ${{ steps.latest-docker-tag.outputs.tx-exclusion-api-latest-docker-tag }}
      linea-besu: ${{ steps.latest-docker-tag.outputs.linea-besu-latest-docker-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Component latest docker tag
        id: get-latest-docker-tag
        uses: ./.github/actions/get-latest-release-image-tag
        with:
          component-name: ${{ matrix.component }}
          image-name: ${{ matrix.image-name }}
      
      - name: Output latest docker tags
        id: latest-docker-tag
        run: |
          echo "${{ matrix.component }}-latest-docker-tag=${{ steps.get-latest-docker-tag.outputs.image_tag }}" >> $GITHUB_OUTPUT

  run-e2e-tests:
    needs: 
      - component-release-metadata
      - component-latest-docker-tags
      - build-local-linea-besu
    if: always() && !cancelled() && needs.component-latest-docker-tags.result == 'success'
    uses: ./.github/workflows/reuse-run-e2e-tests.yml
    with:
      image_tag: local
      coordinator_tag: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.coordinator || '' }}
      postman_tag: ${{ fromJson(needs.component-release-metadata.outputs.postman).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.postman || '' }}
      prover_tag: ${{ fromJson(needs.component-release-metadata.outputs.prover).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.prover || '' }}
      tx_exclusion_api_tag: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.tx-exclusion-api || '' }}
      linea_besu_package_tag: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).tag_changed != 'true' && needs.component-latest-docker-tags.outputs.linea-besu || needs.build-local-linea-besu.outputs.linea_besu_package_tag }}
      e2e-tests-logs-dump: true
      has-changes-requiring-e2e-testing: 'true'
    secrets: inherit

  coordinator-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.coordinator).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: coordinator
      folder-name: coordinator
      include-path: '"coordinator/**"'
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.coordinator).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit

  prover-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.prover).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: prover
      folder-name: prover
      include-path: '"prover/**"'
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.prover).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.prover).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.prover).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit

  postman-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.postman).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: postman
      folder-name: postman
      include-path: '"postman/**"'
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.postman).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.postman).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.postman).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit

  tx-exclusion-api-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).tag_changed == 'true'
    uses: ./.github/workflows/reusable-component-gh-release.yml
    with:
      component-name: tx-exclusion-api
      folder-name: transaction-exclusion-api
      include-path: '"transaction-exclusion-api/**"'
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.tx-exclusion-api).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit

  linea-besu-gh-release:
    needs: [component-release-metadata, run-e2e-tests]
    if: >
      always() && !cancelled() && 
      needs.run-e2e-tests.result == 'success' &&
      fromJson(needs.component-release-metadata.outputs.linea-besu).tag_changed == 'true'
    uses: ./.github/workflows/reusable-linea-besu-package-gh-release.yml
    with:
      image_tag_suffix: ${{ inputs.image_tag_suffix }}
      release_tag_suffix: ${{ inputs.release_tag_suffix }} # TODO: Remove later 
      without_besu_fleet_plugin: ${{ inputs.without_besu_fleet_plugin }}
      release_version: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).release_version }}
      release_tag: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).release_tag }}
      changelog: ${{ fromJson(needs.component-release-metadata.outputs.linea-besu).changelog }}
      draft_release: ${{ inputs.draft_release }}
      pre_release: ${{ inputs.pre_release }}
    secrets: inherit

  # retag docker image tags with image_tag_suffix for tag-unchanged components
  retag-latest-docker-tags:
    needs: [component-release-metadata, component-latest-docker-tags, run-e2e-tests]
    if: >
      always() && !cancelled() &&
      needs.run-e2e-tests.result == 'success' &&
      needs.component-latest-docker-tags.result == 'success'
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-med
    strategy:
      fail-fast: true
      matrix:
        component: [ coordinator, prover, postman, tx-exclusion-api, linea-besu ]
        include:
          - component: coordinator
            image-name: linea-coordinator
          - component: prover
            image-name: linea-prover
          - component: postman
            image-name: linea-postman
          - component: tx-exclusion-api
            image-name: linea-transaction-exclusion-api
          - component: linea-besu
            image-name: linea-besu-package
    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      
      - name: Retag latest docker tag
        id: retag-latest-docker-tag
        if: fromJson(needs.component-release-metadata.outputs[matrix.component]).tag_changed != 'true'
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.image-name }}
          IMAGE_TAG: ${{ needs.component-latest-docker-tags.outputs[matrix.component] }}
          IMAGE_TAG_SUFFIX: ${{ inputs.image_tag_suffix }}
        run: |
          SOURCE_IMAGE="consensys/${IMAGE_NAME}:${IMAGE_TAG}"
          TARGET_IMAGE="consensys/${IMAGE_NAME}:${IMAGE_TAG}-${IMAGE_TAG_SUFFIX}"

          docker buildx imagetools create --tag "${TARGET_IMAGE}" "${SOURCE_IMAGE}"

          # docker pull "${SOURCE_IMAGE}"
          # docker tag "${SOURCE_IMAGE}" "${TARGET_IMAGE}"
          # docker push "${TARGET_IMAGE}"
      
# prepend CHANGELOG for each component for linea release (and then create PR)
# tag linea release with aggregated included-path
