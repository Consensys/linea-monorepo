name: Tracer Hub-Shomei-Besu-Integration

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tests-with-ssh:
        description: Run tests with ability to ssh into environment
        required: false
        type: boolean
        default: false


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-with-besu-node:
    runs-on: gha-runner-scale-set-ubuntu-24-amd64-xxl
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: false

      - name: Setup Tracer Test Environment
        uses: ./.github/actions/setup-tracer-environment
        with:
          enable-ssh: ${{ inputs.tests-with-ssh }}

      - name: Run unit tests
        run: GOMEMLIMIT=26GiB ./gradlew :tracer:arithmetization:besuNodeTests
        env:
          JAVA_OPTS: -Dorg.gradle.daemon=false
          GOCORSET_FLAGS: -b1024 -v --ansi-escapes=false --report --air


      - name: Upload proof request and conflation files
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: traces-proof-requests-${{ github.sha }}
          path: tracer/arithmetization/build/besu/traces/**/*
          compression-level: 9
          if-no-files-found: 'error'
