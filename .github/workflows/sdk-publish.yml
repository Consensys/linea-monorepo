name: sdk-publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - sdk-core
          - sdk-viem
          - both
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: sdk-publish
  cancel-in-progress: false

jobs:
  guard:
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Ensure running on main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::sdk-publish must be triggered from the main branch, got ${{ github.ref }}"
          exit 1

  publish-sdk-core:
    needs: guard
    if: inputs.package == 'sdk-core' || inputs.package == 'both'
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build sdk-core
        run: pnpm -F @consensys/linea-sdk-core run build

      - name: Test sdk-core
        run: pnpm -F @consensys/linea-sdk-core run test

      - name: Lint sdk-core
        run: pnpm -F @consensys/linea-sdk-core run lint

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./sdk/sdk-core/package.json').version")
          if npm view @consensys/linea-sdk-core@"$VERSION" version 2>/dev/null; then
            echo "::notice::sdk-core@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm auth
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish sdk-core
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: pnpm -F @consensys/linea-sdk-core publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag sdk-core release
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./sdk/sdk-core/package.json').version")
          TAG="sdk-core-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG" 2>/dev/null || echo "::notice::Tag $TAG already exists"

  publish-sdk-viem:
    needs: [guard, publish-sdk-core]
    if: |
      always() &&
      needs.guard.result == 'success' &&
      (inputs.package == 'sdk-viem' || inputs.package == 'both') &&
      (needs.publish-sdk-core.result == 'success' || needs.publish-sdk-core.result == 'skipped')
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build sdk-core (dependency)
        run: pnpm -F @consensys/linea-sdk-core run build

      - name: Build sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run build

      - name: Test sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run test

      - name: Lint sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run lint

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./sdk/sdk-viem/package.json').version")
          if npm view @consensys/linea-sdk-viem@"$VERSION" version 2>/dev/null; then
            echo "::notice::sdk-viem@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm auth
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish sdk-viem
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: pnpm -F @consensys/linea-sdk-viem publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag sdk-viem release
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./sdk/sdk-viem/package.json').version")
          TAG="sdk-viem-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG" 2>/dev/null || echo "::notice::Tag $TAG already exists"

  notify:
    needs: [publish-sdk-core, publish-sdk-viem]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    uses: ./.github/workflows/slack-notify-failed-jobs.yml
    with:
      title: "SDK Publish workflow failed"
      run_id: ${{ github.run_id }}
    secrets:
      channel_id: ${{ secrets.SLACK_ENGINEERING_ALERTS_CHANNEL_ID }}
      slack_bot_token: ${{ secrets.SLACK_GITHUB_ACTIONS_ALERTS_BOT_TOKEN }}
