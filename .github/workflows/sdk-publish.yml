name: sdk-publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - sdk-core
          - sdk-viem
          - both
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  publish-sdk-core:
    if: inputs.package == 'sdk-core' || inputs.package == 'both'
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build sdk-core
        run: pnpm -F @consensys/linea-sdk-core run build

      - name: Test sdk-core
        run: pnpm -F @consensys/linea-sdk-core run test

      - name: Lint sdk-core
        run: pnpm -F @consensys/linea-sdk-core run lint

      - name: Publish sdk-core
        if: ${{ !inputs.dry_run }}
        run: pnpm -F @consensys/linea-sdk-core publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag sdk-core release
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./sdk/sdk-core/package.json').version")
          TAG="sdk-core-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"

  publish-sdk-viem:
    needs: publish-sdk-core
    if: |
      always() &&
      (inputs.package == 'sdk-viem' || inputs.package == 'both') &&
      (needs.publish-sdk-core.result == 'success' || needs.publish-sdk-core.result == 'skipped')
    runs-on: gha-runner-scale-set-ubuntu-22.04-amd64-small
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline"

      - name: Build sdk-core (dependency)
        run: pnpm -F @consensys/linea-sdk-core run build

      - name: Build sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run build

      - name: Test sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run test

      - name: Lint sdk-viem
        run: pnpm -F @consensys/linea-sdk-viem run lint

      - name: Publish sdk-viem
        if: ${{ !inputs.dry_run }}
        run: pnpm -F @consensys/linea-sdk-viem publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Tag sdk-viem release
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=$(node -p "require('./sdk/sdk-viem/package.json').version")
          TAG="sdk-viem-v${VERSION}"
          git tag "$TAG"
          git push origin "$TAG"

  notify:
    needs: [publish-sdk-core, publish-sdk-viem]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    uses: ./.github/workflows/slack-notify-failed-jobs.yml
    with:
      title: "SDK Publish workflow failed"
      run_id: ${{ github.run_id }}
    secrets:
      channel_id: ${{ secrets.SLACK_ENGINEERING_ALERTS_CHANNEL_ID }}
      slack_bot_token: ${{ secrets.SLACK_GITHUB_ACTIONS_ALERTS_BOT_TOKEN }}
