name: sdk-publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: "Package to publish"
        required: true
        type: choice
        options:
          - sdk-core
          - sdk-viem
      release_commit_sha:
        description: "Commit SHA from the merged release PR (must be on main)"
        required: true
        type: string
      dry_run:
        description: "Dry run (skip actual publish)"
        required: false
        type: boolean
        default: false
      dual_publish_legacy:
        description: "Also publish the legacy @consensys/linea-sdk-* package"
        required: false
        type: boolean
        default: false

permissions:
  actions: read
  contents: write

concurrency:
  group: sdk-publish
  cancel-in-progress: false

jobs:
  guard:
    runs-on: gha-lfdt-lineth-ss-ubuntu-24-amd64-small
    steps:
      - name: Ensure running on main
        if: github.ref != 'refs/heads/main'
        env:
          REF: ${{ github.ref }}
        run: |
          echo "::error::sdk-publish must be triggered from the main branch, got $REF"
          exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify release commit is on main
        env:
          RELEASE_SHA: ${{ inputs.release_commit_sha }}
        run: |
          if ! git cat-file -e "${RELEASE_SHA}^{commit}" 2>/dev/null; then
            echo "::error::Commit $RELEASE_SHA does not exist in this repository"
            exit 1
          fi
          if ! git merge-base --is-ancestor "$RELEASE_SHA" HEAD; then
            echo "::error::Commit $RELEASE_SHA is not an ancestor of main. Only release commits merged to main can be published."
            exit 1
          fi

  publish-sdk-core:
    needs: guard
    if: inputs.package == 'sdk-core'
    # GitHub-hosted runner required: npm trusted publishing (OIDC) does not support self-hosted runners.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_commit_sha }}

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline --ignore-scripts"
  
      - name: Build sdk-core
        run: pnpm -F @lfdt-lineth/sdk-core run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          if npm view @lfdt-lineth/sdk-core@"$VERSION" version 2>/dev/null; then
            echo "::notice::sdk-core@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish sdk-core
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: pnpm -F @lfdt-lineth/sdk-core publish --no-git-checks --provenance

      - name: Check if legacy sdk-core version already published
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy }}
        id: legacy_check
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          if npm view @consensys/linea-sdk-core@"$VERSION" version 2>/dev/null; then
            echo "::notice::@consensys/linea-sdk-core@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm auth for legacy publish
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy && steps.legacy_check.outputs.skip != 'true' }}
        run: echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish legacy sdk-core
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy && steps.legacy_check.outputs.skip != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LEGACY_DIR="${RUNNER_TEMP}/legacy-sdk-core"
          rm -rf "$LEGACY_DIR"
          mkdir -p "$LEGACY_DIR"
          cp -R \
            ts-libs/sdk/sdk-core/CHANGELOG.md \
            ts-libs/sdk/sdk-core/dist \
            ts-libs/sdk/sdk-core/LICENSE-APACHE \
            ts-libs/sdk/sdk-core/LICENSE-MIT \
            ts-libs/sdk/sdk-core/package.json \
            ts-libs/sdk/sdk-core/README.md \
            "$LEGACY_DIR"
          node -e '
            const fs = require("fs");
            const packageJsonPath = process.argv[1];
            const pkg = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            pkg.name = "@consensys/linea-sdk-core";
            pkg.files = [...new Set([...(pkg.files ?? []), "CHANGELOG.md"])];
            fs.writeFileSync(packageJsonPath, JSON.stringify(pkg, null, 2) + "\n");
          ' "$LEGACY_DIR/package.json"
          npm publish "$LEGACY_DIR" --access public

      - name: Tag sdk-core release
        if: ${{ !inputs.dry_run }}
        env:
          RELEASE_SHA: ${{ inputs.release_commit_sha }}
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          TAG="@lfdt-lineth/sdk-core@${VERSION}"

          REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}')
          if [[ -n "$REMOTE_SHA" ]]; then
            if [[ "$REMOTE_SHA" == "$RELEASE_SHA" ]]; then
              echo "::notice::Tag $TAG already exists at $RELEASE_SHA, skipping"
              exit 0
            else
              echo "::error::Tag $TAG already exists but points at $REMOTE_SHA, expected $RELEASE_SHA. Resolve this tag collision manually."
              exit 1
            fi
          fi

          git tag "$TAG" "$RELEASE_SHA"
          git push origin "$TAG"

      - name: Extract release notes
        if: ${{ !inputs.dry_run }}
        id: release_notes
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          CHANGELOG="ts-libs/sdk/sdk-core/CHANGELOG.md"
          if [[ -f "$CHANGELOG" ]]; then
            awk '/^## /{if(found)exit; found=1} found' "$CHANGELOG" > release-notes.md
          else
            echo "Release @lfdt-lineth/sdk-core@${VERSION}" > release-notes.md
          fi

      - name: Package source archive
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=${{ steps.release_notes.outputs.version }}
          tar -czf "linea-sdk-core-${VERSION}.tar.gz" -C ts-libs/sdk/sdk-core .
          cd ts-libs/sdk/sdk-core && zip -rq "../../../linea-sdk-core-${VERSION}.zip" .

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b #v2.5.0
        with:
          tag_name: "@lfdt-lineth/sdk-core@${{ steps.release_notes.outputs.version }}"
          name: "@lfdt-lineth/sdk-core@${{ steps.release_notes.outputs.version }}"
          body_path: release-notes.md
          target_commitish: ${{ inputs.release_commit_sha }}
          files: |
            linea-sdk-core-${{ steps.release_notes.outputs.version }}.tar.gz
            linea-sdk-core-${{ steps.release_notes.outputs.version }}.zip

  publish-sdk-viem:
    needs: guard
    if: inputs.package == 'sdk-viem'
    # GitHub-hosted runner required: npm trusted publishing (OIDC) does not support self-hosted runners.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout release commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.release_commit_sha }}

      - name: Setup nodejs environment
        uses: ./.github/actions/setup-nodejs
        with:
          pnpm-install-options: "--frozen-lockfile --prefer-offline --ignore-scripts"

      - name: Verify sdk-core dependency is published on npm
        run: |
          CORE_VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          echo "Resolved @lfdt-lineth/sdk-core dependency version: $CORE_VERSION"
          if ! npm view "@lfdt-lineth/sdk-core@${CORE_VERSION}" version 2>/dev/null; then
            echo "::error::@lfdt-lineth/sdk-core@${CORE_VERSION} is not published on npm. Run this workflow for sdk-core first."
            exit 1
          fi

      - name: Verify legacy sdk-core dependency is published on npm
        if: ${{ inputs.dual_publish_legacy }}
        run: |
          CORE_VERSION=$(node -p "require('./ts-libs/sdk/sdk-core/package.json').version")
          echo "Resolved @consensys/linea-sdk-core dependency version: $CORE_VERSION"
          if ! npm view "@consensys/linea-sdk-core@${CORE_VERSION}" version 2>/dev/null; then
            echo "::error::@consensys/linea-sdk-core@${CORE_VERSION} is not published on npm. Run this workflow for sdk-core with dual_publish_legacy enabled first."
            exit 1
          fi
      
      - name: Build sdk-viem
        run: pnpm -F "@lfdt-lineth/sdk-viem..." run build

      - name: Check if version already published
        id: check
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-viem/package.json').version")
          if npm view @lfdt-lineth/sdk-viem@"$VERSION" version 2>/dev/null; then
            echo "::notice::sdk-viem@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish sdk-viem
        if: ${{ !inputs.dry_run && steps.check.outputs.skip != 'true' }}
        run: pnpm -F @lfdt-lineth/sdk-viem publish --no-git-checks --provenance

      - name: Check if legacy sdk-viem version already published
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy }}
        id: legacy_check
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-viem/package.json').version")
          if npm view @consensys/linea-sdk-viem@"$VERSION" version 2>/dev/null; then
            echo "::notice::@consensys/linea-sdk-viem@$VERSION already published, skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure npm auth for legacy publish
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy && steps.legacy_check.outputs.skip != 'true' }}
        run: echo "//registry.npmjs.org/:_authToken=\${NODE_AUTH_TOKEN}" >> .npmrc

      - name: Publish legacy sdk-viem
        if: ${{ !inputs.dry_run && inputs.dual_publish_legacy && steps.legacy_check.outputs.skip != 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          LEGACY_DIR="${RUNNER_TEMP}/legacy-sdk-viem"
          rm -rf "$LEGACY_DIR"
          mkdir -p "$LEGACY_DIR"
          cp -R \
            ts-libs/sdk/sdk-viem/CHANGELOG.md \
            ts-libs/sdk/sdk-viem/dist \
            ts-libs/sdk/sdk-viem/LICENSE-APACHE \
            ts-libs/sdk/sdk-viem/LICENSE-MIT \
            ts-libs/sdk/sdk-viem/package.json \
            ts-libs/sdk/sdk-viem/README.md \
            "$LEGACY_DIR"
          node -e '
            const fs = require("fs");
            const packageJsonPath = process.argv[1];
            const pkg = JSON.parse(fs.readFileSync(packageJsonPath, "utf8"));
            pkg.name = "@consensys/linea-sdk-viem";
            pkg.dependencies = {
              ...pkg.dependencies,
              "@consensys/linea-sdk-core": pkg.version,
            };
            delete pkg.dependencies["@lfdt-lineth/sdk-core"];
            pkg.files = [...new Set([...(pkg.files ?? []), "CHANGELOG.md"])];
            fs.writeFileSync(packageJsonPath, JSON.stringify(pkg, null, 2) + "\n");
          ' "$LEGACY_DIR/package.json"
          npm publish "$LEGACY_DIR" --access public

      - name: Tag sdk-viem release
        if: ${{ !inputs.dry_run }}
        env:
          RELEASE_SHA: ${{ inputs.release_commit_sha }}
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-viem/package.json').version")
          TAG="@lfdt-lineth/sdk-viem@${VERSION}"

          REMOTE_SHA=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}')
          if [[ -n "$REMOTE_SHA" ]]; then
            if [[ "$REMOTE_SHA" == "$RELEASE_SHA" ]]; then
              echo "::notice::Tag $TAG already exists at $RELEASE_SHA, skipping"
              exit 0
            else
              echo "::error::Tag $TAG already exists but points at $REMOTE_SHA, expected $RELEASE_SHA. Resolve this tag collision manually."
              exit 1
            fi
          fi

          git tag "$TAG" "$RELEASE_SHA"
          git push origin "$TAG"

      - name: Extract release notes
        if: ${{ !inputs.dry_run }}
        id: release_notes
        run: |
          VERSION=$(node -p "require('./ts-libs/sdk/sdk-viem/package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          CHANGELOG="ts-libs/sdk/sdk-viem/CHANGELOG.md"
          if [[ -f "$CHANGELOG" ]]; then
            awk '/^## /{if(found)exit; found=1} found' "$CHANGELOG" > release-notes.md
          else
            echo "Release @lfdt-lineth/sdk-viem@${VERSION}" > release-notes.md
          fi

      - name: Package source archive
        if: ${{ !inputs.dry_run }}
        run: |
          VERSION=${{ steps.release_notes.outputs.version }}
          tar -czf "linea-sdk-viem-${VERSION}.tar.gz" -C ts-libs/sdk/sdk-viem .
          cd ts-libs/sdk/sdk-viem && zip -rq "../../../linea-sdk-viem-${VERSION}.zip" .

      - name: Create GitHub Release
        if: ${{ !inputs.dry_run }}
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b #v2.5.0
        with:
          tag_name: "@lfdt-lineth/sdk-viem@${{ steps.release_notes.outputs.version }}"
          name: "@lfdt-lineth/sdk-viem@${{ steps.release_notes.outputs.version }}"
          body_path: release-notes.md
          target_commitish: ${{ inputs.release_commit_sha }}
          files: |
            linea-sdk-viem-${{ steps.release_notes.outputs.version }}.tar.gz
            linea-sdk-viem-${{ steps.release_notes.outputs.version }}.zip

  notify:
    needs: [publish-sdk-core, publish-sdk-viem]
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    uses: ./.github/workflows/slack-notify-failed-jobs.yml
    with:
      title: "SDK Publish workflow failed"
      run_id: ${{ github.run_id }}
    secrets:
      channel_id: ${{ secrets.SLACK_ENGINEERING_ALERTS_CHANNEL_ID }}
      slack_bot_token: ${{ secrets.SLACK_GITHUB_ACTIONS_ALERTS_BOT_TOKEN }}
