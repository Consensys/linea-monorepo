# =============================================================================
# Linea Stack — v0 standalone public quickstart (Sepolia L1).
#
# L2 stack (Linea Besu sequencer + Maru consensus + l2-node-besu + coordinator
# + postman + shomei + web3signer + prover) pointed at user-supplied Sepolia L1
# RPC. Plus an L2 Blockscout API backend and frontend explorer UI.
#
# See README.md in this directory for the full operator guide.
# Image tags are pinned in versions.env. User-supplied Sepolia RPC config is in .env.
#
# Profile: `stack-partial-prover` — the only profile. The profile name is kept
# for continuity, but quickstart defaults to prover dev mode so normal laptops
# can complete a boot. Set PROVER_DEV_OVERRIDE=false plus a high Docker memory
# cap for production-shaped partial proving.
#
# Sepolia deployer and runtime L1/L2 role keys are generated by account-setup
# and stored in gitignored host artifacts, exposed to containers through
# compatibility mounts. Advanced deployer keystore overrides are setup/deploy
# job inputs only.
# =============================================================================

x-profiles: &default-profiles ["stack-partial-prover"]
x-bootstrap-profiles: &bootstrap-profiles ["bootstrap"]

networks:
  linea:
    driver: bridge
    ipam:
      config:
        # Fixed subnet so we can pin a stable IP for the sequencer. Besu's enode
        # URL parser rejects hostnames; the l2-node-besu bootnode reference
        # therefore needs an IP literal. Only the sequencer is pinned — every
        # other service uses Docker DNS via container hostnames.
        - subnet: 11.11.11.0/24
  l1network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.10.10.0/24

volumes:
  linea-local-dev:
    name: "linea-stack-local-dev"
  linea-stack-local-l1-data:
    name: "linea-stack-local-l1-data"
  linea-logs:
    name: "linea-stack-logs"
  coordinator-pg-data:
  postman-pg-data:
  blockscout-l2-pg-data:
  linea-contracts-pnpm-store:
    name: "linea-stack-contracts-pnpm-store"
  linea-contracts-root-node-modules:
    name: "linea-stack-contracts-root-node-modules"
  linea-contracts-package-node-modules:
    name: "linea-stack-contracts-package-node-modules"
  linea-eslint-config-node-modules:
    name: "linea-stack-eslint-config-node-modules"
  linea-contracts-artifacts:
    name: "linea-stack-contracts-artifacts"
  linea-contracts-cache:
    name: "linea-stack-contracts-cache"
  linea-foundry-home:
    name: "linea-stack-foundry-home"

services:

  # ============================================================================
  # Optional local L1 — Besu execution + Teku consensus, enabled by L1_MODE=local
  # ============================================================================

  l1-node-genesis-generator:
    image: ethpandaops/ethereum-genesis-generator:${ETH_GENESIS_GENERATOR_TAG:-5.1.0}
    container_name: l1-node-genesis-generator
    profiles: ["local-l1"]
    entrypoint: ["bash", "/scripts/services/generate-local-l1-genesis.sh"]
    volumes:
      - ./scripts/services:/scripts/services:ro
      - ../../../docker/config/l1-node/cl/mnemonics.yaml:/config/mnemonics.yaml:ro
      - ../../../docker/config/l1-node/cl/network-config.yml:/config/network-config.yml:ro
      - ../../../docker/config/l1-node/el/genesis.json:/config/genesis.json
      - ../../../docker/config/l1-node/generate-genesis.sh:/generate-genesis.sh
      - linea-stack-local-l1-data:/data
    networks: [l1network]

  l1-el-node:
    container_name: l1-el-node
    hostname: l1-el-node
    image: consensys/linea-besu-package:${LINEA_BESU_PACKAGE_TAG}
    profiles: ["local-l1"]
    depends_on:
      l1-node-genesis-generator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c '[ -f /tmp/pid ]'"]
      interval: 1s
      timeout: 1s
      retries: 120
    environment:
      LOG4J_CONFIGURATION_FILE: /var/lib/besu/log4j.xml
      JAVA_OPTS: -Xmx1536m
    entrypoint: ["bash", "/scripts/services/start-local-l1-el.sh"]
    volumes:
      - ./scripts/services:/scripts/services:ro
      - ../../../docker/config/l1-node/el/besu.key:/config/keys/besu.key:ro
      - ../../../docker/config/l1-node/el/config.toml:/config/config.toml:ro
      - ../../../docker/config/l1-node/jwtsecret.txt:/config/jwtsecret.txt:ro
      - ../../../docker/config/l1-node/el/log4j.xml:/var/lib/besu/log4j.xml:ro
      - linea-stack-local-l1-data:/data
    ports:
      - "${HOST_PORT_L1_RPC:-8445}:8545"
      - "${HOST_PORT_L1_WS:-8446}:8546"
      - "${HOST_PORT_L1_ENGINE:-8551}:8551/tcp"
      - "${HOST_PORT_L1_P2P:-30303}:30303"
      - "${HOST_PORT_L1_DISCOVERY:-9001}:9001/tcp"
    networks:
      linea: {}
      l1network:
        ipv4_address: 10.10.10.201

  l1-cl-node:
    container_name: l1-cl-node
    hostname: l1-cl-node
    image: consensys/teku:${TEKU_TAG:-25.11.0-jdk24}
    profiles: ["local-l1"]
    depends_on:
      l1-el-node:
        condition: service_started
      l1-node-genesis-generator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/eth/v1/node/health || exit 1"]
      interval: 1s
      timeout: 1s
      retries: 120
    environment:
      LOG4J_CONFIGURATION_FILE: /config/log4j.xml
    command: ["--config-file=/config/config-file.yaml"]
    volumes:
      - ../../../docker/config/l1-node/cl/teku.key:/config/keys/teku.key:ro
      - ../../../docker/config/l1-node/cl/teku-keys:/config/keys/teku-keys:ro
      - ../../../docker/config/l1-node/cl/teku-secrets:/config/keys/teku-secrets:ro
      - ../../../docker/config/l1-node/jwtsecret.txt:/config/jwtsecret.txt:ro
      - ../../../docker/config/l1-node/cl/config.yaml:/config/config-file.yaml:ro
      - ../../../docker/config/l1-node/cl/log4j.xml:/config/log4j.xml:ro
      - linea-stack-local-l1-data:/data
    ports:
      - "${HOST_PORT_L1_CL_P2P:-9002}:9000"
      - "${HOST_PORT_L1_CL_METRICS:-8008}:8008/tcp"
      - "${HOST_PORT_L1_CL_REST:-4003}:4000/tcp"
    networks:
      l1network:
        ipv4_address: 10.10.10.202

  # ============================================================================
  # Init layer — pre-boot account derivation, config rendering, L2 genesis
  # ============================================================================

  account-setup:
    # Runs FIRST. Resolves the L1 deployer from local mode, generated/provided
    # Sepolia keystore, or deprecated raw-key compatibility; generates encrypted
    # ethers runtime keystores; checks Sepolia balance/gas; and precomputes the
    # addresses needed by genesis/config/deploy.
    #
    # Outputs land in ./artifacts/accounts:
    #   /accounts/addresses-precomputed.json     (address map for later init steps)
    #   /accounts/deployer-keystore/*.json       (generated Sepolia deployer, if used)
    #   /accounts/runtime-keystores/*.json       (ethers encrypted runtime keys)
    #   /accounts/runtime-keystores/password.txt (Web3Signer keystore password)
    #   /accounts/runtime-keys.env               (generated private keys, host artifact)
    #   /accounts/web3signer-keys/*.yaml         (Web3Signer file-keystore configs)
    #
    # Idempotent on host artifacts: retry cycles reuse the same generated keys
    # + precomputed addresses. Use ./scripts/reset.sh for a completely fresh
    # derivation.
    image: node:${NODE_IMAGE_TAG}
    container_name: account-setup
    profiles: *bootstrap-profiles
    environment:
      L1_MODE: ${L1_MODE:-sepolia}
      L1_RPC_URL: ${L1_RPC_URL:-}
      L1_DEPLOYER_PRIVATE_KEY: ${L1_DEPLOYER_PRIVATE_KEY:-}
      L1_DEPLOYER_KEYSTORE_PATH: ${L1_DEPLOYER_KEYSTORE_PATH:-}
      L1_DEPLOYER_KEYSTORE_PASSWORD: ${L1_DEPLOYER_KEYSTORE_PASSWORD:-}
      L1_DEPLOYER_KEYSTORE_PASSWORD_FILE: ${L1_DEPLOYER_KEYSTORE_PASSWORD_FILE:-}
      LINEA_COORDINATOR_DATA_AVAILABILITY: ${LINEA_COORDINATOR_DATA_AVAILABILITY:-ROLLUP}
      L1_DEPLOYER_MIN_BALANCE_WEI: ${L1_DEPLOYER_MIN_BALANCE_WEI:-2000000000000000000}
      L1_DEPLOY_GAS_PRICE_WEI: ${L1_DEPLOY_GAS_PRICE_WEI:-5000000000}
      L1_ROLE_MIN_BALANCE_WEI: ${L1_ROLE_MIN_BALANCE_WEI:-400000000000000000}
      L1_ROLE_TOP_UP_WEI: ${L1_ROLE_TOP_UP_WEI:-500000000000000000}
      L1_POSTMAN_MIN_BALANCE_WEI: ${L1_POSTMAN_MIN_BALANCE_WEI:-50000000000000000}
      L1_POSTMAN_TOP_UP_WEI: ${L1_POSTMAN_TOP_UP_WEI:-100000000000000000}
      L1_DYNAMIC_GAS_PRICE_CAP_DISABLED: ${L1_DYNAMIC_GAS_PRICE_CAP_DISABLED:-true}
      L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-20000000000}
      L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI:-200000000000}
      L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-40000000000}
      L2_RUNTIME_MIN_BALANCE_WEI: ${L2_RUNTIME_MIN_BALANCE_WEI:-1000000000000000000}
      L2_RUNTIME_TOP_UP_WEI: ${L2_RUNTIME_TOP_UP_WEI:-10000000000000000000}
      L2_GAS_PRICE_WEI: ${L2_GAS_PRICE_WEI:-100000000}
      LINETH_KEYSTORE_PASSWORD: ${LINETH_KEYSTORE_PASSWORD:-}
      LINETH_KEYSTORE_PASSWORD_FILE: ${LINETH_KEYSTORE_PASSWORD_FILE:-}
      LINETH_STACK_DIR: /workspace/docs/getting-started/linea-stack
      LINETH_ACCOUNTS_DIR: /accounts
    volumes:
      - ../../..:/workspace
      - linea-contracts-pnpm-store:/workspace/.pnpm-store
      - linea-contracts-root-node-modules:/workspace/node_modules
      - linea-contracts-package-node-modules:/workspace/contracts/node_modules
      - linea-eslint-config-node-modules:/workspace/ts-libs/eslint-config/node_modules
      - ./scripts/internal:/scripts/internal:ro
      - ./scripts/lib:/scripts/lib:ro
      - ./scripts/phases:/scripts/phases:ro
      - ./artifacts/accounts:/accounts:rw
    entrypoint: ["sh", "/scripts/phases/01-generate-accounts.sh"]
    networks: [linea]

  foundry-tools:
    # Seeds pinned Foundry binaries into a Docker volume consumed by
    # deploy-contracts. This avoids live foundryup/curl during contract deploy.
    image: ghcr.io/foundry-rs/foundry:${FOUNDRY_TAG}
    container_name: foundry-tools
    profiles: *default-profiles
    user: "0:0"
    environment:
      FOUNDRY_TAG: ${FOUNDRY_TAG:?FOUNDRY_TAG must be set in versions.env}
    entrypoint: ["sh", "/scripts/phases/00-prepare-deploy-tools.sh"]
    volumes:
      - ./scripts/phases:/scripts/phases:ro
      - linea-foundry-home:/foundry:rw

  l2-genesis-init:
    image: busybox:${BUSYBOX_TAG}
    container_name: l2-genesis-init
    profiles: *default-profiles
    environment:
      L2_CHAIN_ID: ${L2_CHAIN_ID:-1337}
    # render-l2-genesis.sh reads /accounts/addresses-precomputed.json (written by
    # account-setup) to substitute __L2_DEPLOYER_ADDRESS__ and
    # __L2_MESSAGE_SERVICE_ADDRESS__ into genesis-besu.json.
    # Idempotent inside the generated-genesis artifact directory: skips generation if the
    # L2 genesis files have already been rendered. Re-running with mismatching
    # fork-timestamp would diverge from any existing on-disk chaindata. Run
    # `./scripts/reset.sh` to force a re-render — also required if
    # account-setup wrote a new precomputed JSON (e.g., L1 deployer nonce
    # advanced between runs).
    entrypoint: ["sh", "/scripts/phases/02-generate-l2-genesis.sh"]
    volumes:
      - ./scripts/phases:/scripts/phases:ro
      - ./scripts/services:/scripts/services:ro
      - ./config/genesis:/templates:ro
      - ./artifacts/genesis:/initialization:rw
      - ./artifacts/accounts:/accounts:ro

  config-render:
    # Renders 5 service config templates (coordinator, maru, sequencer,
    # l2-node-besu, prover) by substituting:
    #
    #   - __L1_RPC_URL__              ← from .env (compose env)
    #   - __LINEA_ROLLUP_ADDRESS__    ← /accounts/addresses-precomputed.json.l1.LineaRollupV8
    #   - __L2_MESSAGE_SERVICE_ADDRESS__ ← /accounts/addresses-precomputed.json.l2.L2MessageService
    #   - __GENESIS_STATE_ROOT_HASH__ ← seeded zero-default in the predeploy
    #     render; runtime-config-finalize writes the final coordinator config
    #     after deploy-contracts writes deploy-runtime.env.
    #   - __GENESIS_SHNARF__          ← seeded zero-default; same as above.
    #   - __LINEA_ROLLUP_DEPLOY_BLOCK__ ← seeded 0; finalized post-deploy.
    #
    # Output lands in service-specific folders under ./artifacts/config.
    # Runtime-config-finalize turns the
    # coordinator predeploy render plus /deployments/deploy-runtime.env into the final
    # coordinator config after deploy exits.
    #
    # NOT idempotent — re-renders every boot so .env / precomputed JSON changes
    # always propagate to /rendered/.
    image: busybox:${BUSYBOX_TAG}
    container_name: config-render
    profiles: *default-profiles
    environment:
      L1_MODE: ${L1_MODE:-sepolia}
      L1_RPC_URL: ${L1_RPC_URL:-}
      L2_CHAIN_ID: ${L2_CHAIN_ID:-1337}
      # Defaults to all-dev prover mode for quickstart/laptop usability. Set
      # PROVER_DEV_OVERRIDE=false in .env for partial proving; that needs a much
      # higher Docker memory cap and is intended for validation, not first boot.
      PROVER_DEV_OVERRIDE: ${PROVER_DEV_OVERRIDE:-true}
      PROVER_GOMEMLIMIT: ${PROVER_GOMEMLIMIT:-}
      L1_DYNAMIC_GAS_PRICE_CAP_DISABLED: ${L1_DYNAMIC_GAS_PRICE_CAP_DISABLED:-true}
      L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-20000000000}
      L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI:-200000000000}
      L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-40000000000}
      LINEA_COORDINATOR_DATA_AVAILABILITY: ${LINEA_COORDINATOR_DATA_AVAILABILITY:-ROLLUP}
    entrypoint: ["sh", "/scripts/phases/03-render-service-configs.sh"]
    volumes:
      - ./scripts/phases:/scripts/phases:ro
      - ./scripts/services:/scripts/services:ro
      - ./config/services/coordinator/coordinator-config.toml.template:/templates/coordinator-config.toml.template:ro
      - ./config/services/maru/config.toml.template:/templates/maru-config.toml.template:ro
      - ./config/services/sequencer/sequencer.config.toml.template:/templates/sequencer.config.toml.template:ro
      - ./config/services/l2-node-besu/l2-node-besu.config.toml.template:/templates/l2-node-besu.config.toml.template:ro
      - ./config/services/prover/prover-config-partial.toml.template:/templates/prover-config-partial.toml.template:ro
      - ./artifacts/accounts:/accounts:ro
      - ./artifacts/config:/rendered:rw

  sequencer:
    image: consensys/linea-besu-package:${LINEA_BESU_PACKAGE_TAG}
    container_name: sequencer
    hostname: sequencer
    profiles: *default-profiles
    depends_on:
      l2-genesis-init:
        condition: service_completed_successfully
      config-render:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "bash -c '[ -f /tmp/pid ]'"]
      interval: 1s
      timeout: 1s
      retries: 120
    restart: "no"
    environment:
      LOG4J_CONFIGURATION_FILE: /var/lib/besu/log4j.xml
    entrypoint: besu-untuned
    command:
      - --config-file=/rendered/sequencer.config.toml
      - --node-private-key-file=/var/lib/besu/key
      - --plugin-linea-node-type=SEQUENCER
      # NOTE: --plugin-linea-rejected-tx-endpoint intentionally omitted (v0 has no
      # transaction-exclusion-api service; flag defaults to null and is optional —
      # see besu-plugins/linea-sequencer/docs/plugins.md).
    volumes:
      # Rendered TOML from config-render: __L2_MESSAGE_SERVICE_ADDRESS__ filled
      # in from /accounts/addresses-precomputed.json.
      - ./artifacts/config/sequencer:/rendered:ro
      - ./config/services/sequencer/deny-list.txt:/var/lib/besu/deny-list.txt:ro
      - ./config/services/sequencer/key:/var/lib/besu/key:ro
      - ./config/services/sequencer/log4j.xml:/var/lib/besu/log4j.xml:ro
      - ./config/services/sequencer/tls-files:/var/lib/besu/tls-files:ro
      - ./config/services/coordinator/traces-limits-v5.toml:/var/lib/besu/traces-limits.toml:ro
      - ./artifacts/genesis:/initialization:ro
    ports:
      # Sequencer RPC is internal-only by convention. Not user-facing.
      # Use l2-node-besu (HOST_PORT_L2_RPC) for end-user RPC.
      - "${HOST_PORT_L2_SEQUENCER_RPC:-8645}:8545"
    networks:
      linea:
        # Pinned IP — the l2-node-besu bootnode enode URL references this.
        # Must match the IP literal in the --bootnodes flag below.
        ipv4_address: 11.11.11.101

  maru:
    image: consensys/maru:${MARU_TAG}
    container_name: maru
    hostname: maru
    profiles: *default-profiles
    depends_on:
      sequencer:
        condition: service_healthy
      config-render:
        condition: service_completed_successfully
    command:
      - java
      - -Dlog4j2.configurationFile=/opt/consensys/maru/configs/log4j.xml
      - -jar
      - /opt/consensys/maru/maru.jar
      - --genesis-file=/initialization/genesis-maru.json
      - --config=/rendered/config.toml
    volumes:
      # Rendered TOML from config-render: ${L1_RPC_URL} substituted at boot
      # (Phase 2 will add ${LINEA_ROLLUP_ADDRESS}).
      - ./artifacts/config/maru:/rendered:ro
      - ./config/services/maru/log4j.xml:/opt/consensys/maru/configs/log4j.xml:ro
      - ./config/services/maru/private-key:/tmp/maru-db/private-key:ro
      - ./artifacts/genesis:/initialization:ro
    ports:
      - "${HOST_PORT_MARU:-8080}:8080"
    networks: [linea]

  l2-node-besu:
    image: consensys/linea-besu-package:${LINEA_BESU_PACKAGE_TAG}
    container_name: l2-node-besu
    hostname: l2-node-besu
    profiles: *default-profiles
    depends_on:
      sequencer:
        condition: service_healthy
      config-render:
        condition: service_completed_successfully
    privileged: true   # required by shomei plugin in this image
    user: root
    healthcheck:
      test: ["CMD-SHELL", "bash -c '[ -f /tmp/pid ]'"]
      interval: 1s
      timeout: 1s
      retries: 120
    restart: "no"
    environment:
      LOG4J_CONFIGURATION_FILE: /var/lib/besu/log4j.xml
      JAVA_OPTS: -Xmx1g
    entrypoint: besu-untuned
    command:
      - --config-file=/rendered/l2-node-besu.config.toml
      - --genesis-file=/initialization/genesis-besu.json
      - --plugin-linea-node-type=RPC
      # The enode pubkey below (14408801a444…) is the SECP256K1 public key
      # corresponding to the sequencer node-private-key file at
      # `config/services/sequencer/key`. They are checked-in dev keys and must
      # stay in sync — if you regenerate `config/services/sequencer/key` you must
      # also recompute this enode pubkey (e.g. with `besu public-key
      # --to-address /var/lib/besu/key`) and update this line.
      # The IP (11.11.11.101) must match the sequencer service's pinned IP
      # in the `networks.linea.ipv4_address` block — Besu's enode URL parser
      # rejects hostnames.
      # See config/DEV-KEYS-INVENTORY.md for the regeneration checklist.
      - --bootnodes=enode://14408801a444dafc44afbccce2eb755f902aed3b5743fed787b3c790e021fef28b8c827ed896aa4e8fb46e22bd67c39f994a73768b4b382f8597b0d44370e15d@11.11.11.101:30303
    volumes:
      # Rendered TOML from config-render: __L2_MESSAGE_SERVICE_ADDRESS__ filled
      # in from /accounts/addresses-precomputed.json.
      - ./artifacts/config/l2-node-besu:/rendered:ro
      - ./config/services/sequencer/deny-list.txt:/var/lib/besu/deny-list.txt:ro
      - ./config/services/l2-node-besu/log4j.xml:/var/lib/besu/log4j.xml:ro
      - ./config/services/coordinator/traces-limits-v5.toml:/var/lib/besu/traces-limits.toml:ro
      - ./artifacts/genesis:/initialization:ro
      - linea-local-dev:/data
    ports:
      - "${HOST_PORT_L2_RPC:-8745}:8545"
      - "${HOST_PORT_L2_WS:-8746}:8546"
      - "${HOST_PORT_L2_ENGINE:-8748}:8550"
    networks: [linea]

  shomei:
    image: consensys/linea-shomei:${LINEA_SHOMEI_TAG}
    container_name: shomei
    hostname: shomei
    profiles: *default-profiles
    depends_on:
      l2-node-besu:
        condition: service_started
    privileged: true
    user: root
    healthcheck:
      test: ["CMD-SHELL", "bash -c '[ -f /data/shomei/LOCK ]'"]
      interval: 1s
      timeout: 1s
      retries: 120
    environment:
      LOG4J_CONFIGURATION_FILE: /log4j.xml
    command:
      - --besu-rpc-http-host=l2-node-besu
      - --besu-rpc-http-port=8545
      - --rpc-http-host=0.0.0.0
      - --rpc-http-host-allow-list=*
      - --rpc-http-port=8888
      - --min-confirmations-before-importing=0
      - --trace-start-block-number=0
      - --data-path=/data/shomei
    volumes:
      - ./config/services/shomei/log4j.xml:/log4j.xml:ro
    ports:
      - "${HOST_PORT_SHOMEI:-8998}:8888"
    networks: [linea]

  # ============================================================================
  # Signing
  # ============================================================================

  web3signer:
    image: consensys/web3signer:${WEB3SIGNER_TAG}
    container_name: web3signer
    hostname: web3signer
    profiles: *default-profiles
    # Web3signer runs in mTLS mode (--tls-known-clients-file enables client
    # cert verification). There is no plain healthcheck endpoint a healthcheck
    # script can hit without a valid client cert. Dependents use
    # `condition: service_started` instead — web3signer boots in ~2s and is
    # reliable; the SSL/handshake error from a wrong-cert client is the
    # confirmation the service is up.
    #
    # Encrypted signer keystores are generated before boot by
    # `./scripts/bootstrap-artifacts.sh`.
    # Web3Signer loads those keystores via YAML files in
    # /accounts/web3signer-keys. Liveness is disabled for the quickstart.
    command:
      - --key-store-path=/accounts/web3signer-keys/
      - --tls-keystore-file=/tls-files/web3signer-keystore.p12
      - --tls-keystore-password-file=/tls-files/web3signer-keystore-password.txt
      - --tls-known-clients-file=/tls-files/known-clients.txt
      - --http-host-allowlist=*
      - eth1
      - --chain-id=1   # only used for proxying eth_sendTransaction; we don't proxy
    volumes:
      - ./artifacts/accounts:/accounts:ro
      - ./config/web3signer/tls-files/:/tls-files/:ro
    ports:
      - "${HOST_PORT_WEB3SIGNER:-9000}:9000"
    networks: [linea]

  # ============================================================================
  # Postgres — one isolated instance per consumer
  # ============================================================================

  coordinator-pg:
    image: postgres:${POSTGRES_TAG}
    container_name: coordinator-pg
    profiles: *default-profiles
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # Database name matches the coordinator config's [database].schema field
      # (the coordinator app uses that field as the JDBC database name, not the
      # PG schema). Internal stack relies on PG's default DB == username; we
      # name it explicitly so the isolated PG instance still satisfies the app.
      POSTGRES_DB: linea_coordinator
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 1s
      timeout: 1s
      retries: 60
    restart: unless-stopped
    volumes:
      - coordinator-pg-data:/var/lib/postgresql/data
    ports:
      - "${HOST_PORT_COORDINATOR_PG:-5432}:5432"
    networks: [linea]

  postman-pg:
    image: postgres:${POSTGRES_TAG}
    container_name: postman-pg
    profiles: *default-profiles
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postman
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 1s
      timeout: 1s
      retries: 60
    restart: unless-stopped
    volumes:
      - postman-pg-data:/var/lib/postgresql/data
    ports:
      - "${HOST_PORT_POSTMAN_PG:-5433}:5432"
    networks: [linea]

  blockscout-l2-pg:
    image: postgres:${POSTGRES_TAG}
    container_name: blockscout-l2-pg
    profiles: *default-profiles
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: l2_blockscout
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 1s
      timeout: 1s
      retries: 60
    restart: unless-stopped
    volumes:
      - blockscout-l2-pg-data:/var/lib/postgresql/data
    ports:
      - "${HOST_PORT_BLOCKSCOUT_L2_PG:-5435}:5432"
    networks: [linea]

  # ============================================================================
  # Init one-shots — contract deployment, fund seeding
  # ============================================================================

  deploy-contracts:
    image: node:${NODE_IMAGE_TAG}
    container_name: deploy-contracts
    profiles: *default-profiles
    depends_on:
      sequencer:
        condition: service_healthy
      web3signer:
        condition: service_started
      config-render:
        condition: service_completed_successfully
      foundry-tools:
        condition: service_completed_successfully
      # Phase 2.4: deploy-contracts queries Shomei for the L2 genesis ZK state
      # root before deploying L1 contracts (rollup_getZkEVMStateMerkleProofV0).
      shomei:
        condition: service_healthy
    working_dir: /workspace/contracts
    environment:
      L1_MODE: ${L1_MODE:-sepolia}
      L1_RPC_URL: ${L1_RPC_URL:-}
      L1_DEPLOYER_PRIVATE_KEY: ${L1_DEPLOYER_PRIVATE_KEY:-}
      L1_DEPLOYER_KEYSTORE_PATH: ${L1_DEPLOYER_KEYSTORE_PATH:-}
      L1_DEPLOYER_KEYSTORE_PASSWORD: ${L1_DEPLOYER_KEYSTORE_PASSWORD:-}
      L1_DEPLOYER_KEYSTORE_PASSWORD_FILE: ${L1_DEPLOYER_KEYSTORE_PASSWORD_FILE:-}
      L2_RPC_URL: http://l2-node-besu:8545
      L2_CHAIN_ID: ${L2_CHAIN_ID:-1337}
      ADDRESSES_OUTPUT_PATH: /deployments/addresses.json
      LINEA_COORDINATOR_DATA_AVAILABILITY: ${LINEA_COORDINATOR_DATA_AVAILABILITY:-ROLLUP}
      L1_DEPLOY_GAS_PRICE_WEI: ${L1_DEPLOY_GAS_PRICE_WEI:-5000000000}
      L1_DEPLOYER_MIN_BALANCE_WEI: ${L1_DEPLOYER_MIN_BALANCE_WEI:-2000000000000000000}
      L1_ROLE_MIN_BALANCE_WEI: ${L1_ROLE_MIN_BALANCE_WEI:-400000000000000000}
      L1_ROLE_TOP_UP_WEI: ${L1_ROLE_TOP_UP_WEI:-500000000000000000}
      L1_POSTMAN_MIN_BALANCE_WEI: ${L1_POSTMAN_MIN_BALANCE_WEI:-50000000000000000}
      L1_POSTMAN_TOP_UP_WEI: ${L1_POSTMAN_TOP_UP_WEI:-100000000000000000}
      L1_DYNAMIC_GAS_PRICE_CAP_DISABLED: ${L1_DYNAMIC_GAS_PRICE_CAP_DISABLED:-true}
      L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI: ${L1_BLOB_MAX_FEE_PER_BLOB_GAS_CAP_WEI:-100000000000}
      L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_BLOB_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-20000000000}
      L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_FEE_PER_GAS_CAP_WEI:-200000000000}
      L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI: ${L1_FINALIZATION_MAX_PRIORITY_FEE_PER_GAS_CAP_WEI:-40000000000}
      L2_RUNTIME_MIN_BALANCE_WEI: ${L2_RUNTIME_MIN_BALANCE_WEI:-1000000000000000000}
      L2_RUNTIME_TOP_UP_WEI: ${L2_RUNTIME_TOP_UP_WEI:-10000000000000000000}
      L2_GAS_PRICE_WEI: ${L2_GAS_PRICE_WEI:-100000000}
      DEPLOY_FORCED_TRANSACTION_GATEWAY: ${DEPLOY_FORCED_TRANSACTION_GATEWAY:-false}
      HOST_PORT_L2_RPC: ${HOST_PORT_L2_RPC:-8745}
      HOST_PORT_L2_BLOCKSCOUT: ${HOST_PORT_L2_BLOCKSCOUT:-4000}
      HOST_PORT_L2_BLOCKSCOUT_FRONTEND: ${HOST_PORT_L2_BLOCKSCOUT_FRONTEND:-4001}
      HOST_PORT_POSTMAN: ${HOST_PORT_POSTMAN:-9090}
      HOST_PORT_COORDINATOR: ${HOST_PORT_COORDINATOR:-9545}
      FOUNDRY_TAG: ${FOUNDRY_TAG:?FOUNDRY_TAG must be set in versions.env}
      LINETH_STACK_DIR: /workspace/docs/getting-started/linea-stack
      LINETH_ACCOUNTS_DIR: /accounts
    volumes:
      # Mount the whole linea-monorepo at /workspace because contracts/ is a
      # pnpm workspace member that depends on pnpm-workspace.yaml + pnpm-lock.yaml
      # at the repo root. Mounting just contracts/ breaks pnpm catalog resolution.
      - ../../..:/workspace
      # Keep deploy tooling dependencies Linux-native and Docker-scoped.
      - linea-contracts-pnpm-store:/workspace/.pnpm-store
      - linea-contracts-root-node-modules:/workspace/node_modules
      - linea-contracts-package-node-modules:/workspace/contracts/node_modules
      - linea-eslint-config-node-modules:/workspace/ts-libs/eslint-config/node_modules
      - linea-contracts-artifacts:/workspace/contracts/artifacts
      - linea-contracts-cache:/workspace/contracts/cache
      - linea-foundry-home:/root/.foundry
      - ./scripts/internal:/scripts/internal:ro
      - ./scripts/lib:/scripts/lib:ro
      - ./scripts/phases:/scripts/phases:ro
      # Forked deploy script — bind-mounted OVER the upstream path. Fixes the
      # stale ORDERED_NONCE_POST_LINEAROLLUP=7 offset (step 1 actually consumes
      # 8 nonces) and serializes the 3 parallel deploys. See
      # scripts/internal/deployBridgedTokenAndTokenBridgeV1_1.ts header for details.
      - ./scripts/internal/deployBridgedTokenAndTokenBridgeV1_1.ts:/workspace/contracts/local-deployments-artifacts/deployBridgedTokenAndTokenBridgeV1_1.ts:ro
      - ./artifacts/accounts:/accounts:ro
      - ./artifacts/deployments:/deployments:rw
      - ./artifacts/genesis:/generated-genesis:ro
    # Keep secrets out of process args. deploy-contracts.sh reads L1_RPC_URL,
    # L2_RPC_URL, and ADDRESSES_OUTPUT_PATH from the environment above.
    entrypoint: ["bash", "/scripts/phases/04-deploy-contracts.sh"]
    networks: [linea]

  # ============================================================================
  # Early Postman runtime config
  # ============================================================================

  postman-config-render:
    image: busybox:${BUSYBOX_TAG}
    container_name: postman-config-render
    profiles: *bootstrap-profiles
    environment:
      L1_MODE: ${L1_MODE:-sepolia}
      L1_RPC_URL: ${L1_RPC_URL:-}
    entrypoint: ["sh", "/scripts/services/render-postman-config.sh"]
    volumes:
      - ./scripts/services:/scripts/services:ro
      - ./artifacts/accounts:/accounts:ro
      - ./artifacts/config/postman:/postman-runtime:rw
    networks: [linea]

  # ============================================================================
  # Post-deploy coordinator config finalization
  # ============================================================================

  runtime-config-finalize:
    image: busybox:${BUSYBOX_TAG}
    container_name: runtime-config-finalize
    profiles: *default-profiles
    depends_on:
      deploy-contracts:
        condition: service_completed_successfully
      config-render:
        condition: service_completed_successfully
    entrypoint: ["sh", "/scripts/phases/05-render-postdeploy-configs.sh"]
    volumes:
      - ./scripts/phases:/scripts/phases:ro
      - ./scripts/services:/scripts/services:ro
      - ./artifacts/deployments:/deployments:ro
      - ./artifacts/config/coordinator:/rendered:rw
    networks: [linea]

  # ============================================================================
  # L2 services that consume rendered runtime config
  # ============================================================================

  coordinator:
    image: consensys/linea-coordinator:${LINEA_COORDINATOR_TAG}
    container_name: coordinator
    hostname: coordinator
    profiles: *default-profiles
    depends_on:
      runtime-config-finalize:
        condition: service_completed_successfully
      coordinator-pg:
        condition: service_healthy
      sequencer:
        condition: service_healthy
      web3signer:
        condition: service_started
      shomei:
        condition: service_started
      config-render:
        condition: service_completed_successfully
    restart: on-failure
    environment:
      config__override__type2_state_proof_provider__disabled: "true"
      config__override__l1_submission__blob__signer__type: web3signer
      config__override__l1_submission__aggregation__signer__type: web3signer
      config__override__message_anchoring__signer__type: web3signer
      config__override__l1_submission__data_availability: ${LINEA_COORDINATOR_DATA_AVAILABILITY:-ROLLUP}
    entrypoint: ["sh", "/scripts/init/coordinator-entrypoint.sh"]
    volumes:
      - ./scripts/init:/scripts/init:ro
      # Final TOML from runtime-config-finalize.
      - ./artifacts/config/coordinator:/rendered:ro
      - ./config/services/coordinator/traces-limits-v5.toml:/opt/consensys/linea/coordinator/config/traces-limits-v5.toml:ro
      - ./config/services/coordinator/smart-contract-errors.toml:/opt/consensys/linea/coordinator/config/smart-contract-errors.toml:ro
      - ./config/services/coordinator/gas-price-cap-time-of-day-multipliers.toml:/opt/consensys/linea/coordinator/config/gas-price-cap-time-of-day-multipliers.toml:ro
      - ./config/services/coordinator/vertx-options.json:/var/lib/coordinator/vertx-options.json:ro
      - ./config/services/coordinator/log4j2-dev.xml:/var/lib/coordinator/log4j2-dev.xml:ro
      - ./config/services/coordinator/tls-files/:/tls-files/:ro
      - linea-local-dev:/data
    ports:
      - "${HOST_PORT_COORDINATOR:-9545}:9545"
    networks: [linea]

  postman:
    image: consensys/linea-postman:${LINEA_POSTMAN_TAG}
    container_name: postman
    hostname: postman
    profiles: *default-profiles
    restart: on-failure
    depends_on:
      deploy-contracts:
        condition: service_completed_successfully
      l2-node-besu:
        condition: service_healthy
      postman-pg:
        condition: service_healthy
      web3signer:
        condition: service_started
    env_file:
      - ./config/services/postman/postman.env
      - path: ./artifacts/config/postman/postman.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postman-pg:5432/postman
    volumes:
      - ./config/services/postman/tls-files:/tls-files:ro
    ports:
      - "${HOST_PORT_POSTMAN:-9090}:3000"
    networks: [linea]

  prover:
    image: consensys/linea-prover:${LINEA_PROVER_TAG}
    container_name: prover
    hostname: prover
    platform: linux/amd64
    profiles: *default-profiles
    depends_on:
      coordinator:
        condition: service_started
      config-render:
        condition: service_completed_successfully
    environment:
      GOMAXPROCS: 16
      CONFIG_FILE: "/rendered/prover-config-partial.toml"
      # Dev prover mode is the default and fits ordinary Docker Desktop limits.
      # For PROVER_DEV_OVERRIDE=false partial-mode validation, raise Docker
      # Desktop memory substantially and override PROVER_GOMEMLIMIT as needed.
      GOMEMLIMIT: ${PROVER_GOMEMLIMIT:-4GiB}
      WORKER_ID: prover-i1
    volumes:
      # Rendered TOML from config-render (replaces the static
      # ./config/services/prover/prover-config-partial.toml bind-mount).
      - ./artifacts/config/prover:/rendered:ro
      # KZG SRS assets (required even in dev mode — the binary checks for
      # the directory at startup). Sourced from the monorepo's prover/
      # tree, same path the upstream compose-spec-l2-services.yml uses.
      - ../../../prover/prover-assets:/opt/linea/prover/prover-assets:ro
      - linea-local-dev:/data
      - linea-logs:/logs
    networks: [linea]

  # ============================================================================
  # Explorer — L2 only. For L1 (Sepolia), use https://sepolia.etherscan.io.
  # ============================================================================

  l2-blockscout:
    image: blockscout/blockscout:${BLOCKSCOUT_TAG}
    container_name: l2-blockscout
    hostname: l2-blockscout
    profiles: *default-profiles
    depends_on:
      blockscout-l2-pg:
        condition: service_healthy
      l2-node-besu:
        condition: service_healthy
    entrypoint: ["sh", "/scripts/init/blockscout-entrypoint.sh"]
    env_file: ./config/explorer/l2-blockscout.env
    environment:
      ETHEREUM_JSONRPC_HTTP_URL: http://l2-node-besu:8545/
      ETHEREUM_JSONRPC_TRACE_URL: http://l2-node-besu:8545/
      ETHEREUM_JSONRPC_WS_URL: ws://l2-node-besu:8546/
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@blockscout-l2-pg:5432/l2_blockscout?ssl=false
      ECTO_USE_SSL: "false"
      CHAIN_ID: ${L2_CHAIN_ID:-1337}
      CHAIN_SPEC_PATH: /app/genesis-init/genesis-besu.json
    volumes:
      - ./scripts/init:/scripts/init:ro
      - ./artifacts/genesis:/app/genesis-init:ro
    ports:
      - "${HOST_PORT_L2_BLOCKSCOUT:-4000}:4000"
    networks: [linea]

  l2-blockscout-frontend:
    image: ${BLOCKSCOUT_FRONTEND_IMAGE}
    container_name: l2-blockscout-frontend
    hostname: l2-blockscout-frontend
    profiles: *default-profiles
    depends_on:
      l2-blockscout:
        condition: service_started
    environment:
      NEXT_PUBLIC_APP_PROTOCOL: http
      FAVICON_MASTER_URL: "data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22%3E%3Crect width=%2264%22 height=%2264%22 rx=%2212%22 fill=%22%23121422%22/%3E%3Cpath d=%22M18 16h28v9H28v8h15v8H28v7H18z%22 fill=%22%2361DFFF%22/%3E%3C/svg%3E"
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: ${HOST_PORT_L2_BLOCKSCOUT_FRONTEND:-4001}
      NEXT_PUBLIC_APP_ENV: development
      NEXT_PUBLIC_APP_INSTANCE: linea-stack-local
      NEXT_PUBLIC_NETWORK_NAME: "Local Linea"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: Linea
      NEXT_PUBLIC_NETWORK_ID: ${L2_CHAIN_ID:-1337}
      NEXT_PUBLIC_NETWORK_RPC_URL: http://localhost:${HOST_PORT_L2_RPC:-8745}
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: Ether
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ETH
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_NETWORK_VERIFICATION_TYPE: validation
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: l2-blockscout
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_USE_NEXT_JS_PROXY: "true"
      NEXT_PUBLIC_HOMEPAGE_STATS: '["total_blocks","total_txs","wallet_addresses"]'
      NEXT_PUBLIC_HOMEPAGE_CHARTS: '[]'
      NEXT_PUBLIC_ADVANCED_FILTER_ENABLED: "false"
      NEXT_PUBLIC_MARKETPLACE_ENABLED: "false"
      NEXT_PUBLIC_AD_BANNER_PROVIDER: none
      NEXT_PUBLIC_AD_TEXT_PROVIDER: none
      NEXT_PUBLIC_GAS_TRACKER_ENABLED: "false"
      NEXT_PUBLIC_HIDE_INDEXING_ALERT_INT_TXS: "true"
      NEXT_PUBLIC_WEB3_WALLETS: none
    ports:
      - "${HOST_PORT_L2_BLOCKSCOUT_FRONTEND:-4001}:3000"
    networks: [linea]
