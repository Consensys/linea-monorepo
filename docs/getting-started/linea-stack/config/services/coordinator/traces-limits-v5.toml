[traces-limits]
# Module limits of the beta-v4.4 release (Osaka)
#
# LOCAL DEV PROFILE: these ceilings are raised well above mainnet defaults so the
# local stack can execute very trace-heavy transactions (e.g. on-chain ZK-verifier
# calls and large-contract deployments) that would otherwise be rejected by the
# tx-pool trace-line-limit validator. Arithmetization modules are scaled ~16x;
# EC/precompile limits are flattened to a large power of two. Intended for local
# dev/PoC against the dev-prover only — DO NOT use these values for a real prover.
#
# Arithmetization module limits
#
ADD                 = 4194304
BLAKE_MODEXP_DATA   = 262144
BLOCK_DATA          = 65536
BLOCK_HASH          = 40960
BLS_DATA            = 1048576
EC_DATA             = 1048576
EUC                 = 1048576
EXP                 = 1048576
EXT                 = 8388608
GAS                 = 1048576
HUB                 = 33554432
LOG_DATA            = 1048576
LOG_INFO            = 65536
MMIO                = 33554432
MMU                 = 16777216
MOD                 = 2097152
MUL                 = 1048576
MXP                 = 8388608
OOB                 = 4194304
RLP_ADDR            = 65536
RLP_AUTH            = 262144
RLP_TXN             = 2097152
RLP_TXN_RCPT        = 1048576
RLP_UTILS           = 2097152
ROM                 = 134217728
ROM_LEX             = 16384
SHAKIRA_DATA        = 1048576
SHF                 = 4194304
STP                 = 262144
TRM                 = 524288
TXN_DATA            = 131072
WCP                 = 4194304
#
# Precompiles limits
#
PRECOMPILE_ECRECOVER_EFFECTIVE_CALLS        = 2048
PRECOMPILE_SHA2_BLOCKS                      = 3200
PRECOMPILE_RIPEMD_BLOCKS                    = 0
PRECOMPILE_MODEXP_EFFECTIVE_CALLS           = 65536
PRECOMPILE_LARGE_MODEXP_EFFECTIVE_CALLS     = 4096
PRECOMPILE_ECADD_EFFECTIVE_CALLS            = 262144
PRECOMPILE_ECMUL_EFFECTIVE_CALLS            = 262144
PRECOMPILE_ECPAIRING_FINAL_EXPONENTIATIONS  = 65536
PRECOMPILE_ECPAIRING_G2_MEMBERSHIP_CALLS    = 262144
PRECOMPILE_ECPAIRING_MILLER_LOOPS           = 262144
PRECOMPILE_BLAKE_EFFECTIVE_CALLS            = 0
PRECOMPILE_BLAKE_ROUNDS                     = 0
# Precompiles introduced from beta-v4.0-rc6-CANCUN
PRECOMPILE_BLS_POINT_EVALUATION_EFFECTIVE_CALLS     = 16
PRECOMPILE_POINT_EVALUATION_FAILURE_EFFECTIVE_CALLS = 32
PRECOMPILE_BLS_G1_ADD_EFFECTIVE_CALLS               = 128
PRECOMPILE_BLS_G1_MSM_EFFECTIVE_CALLS               = 64
PRECOMPILE_BLS_G2_ADD_EFFECTIVE_CALLS               = 128
PRECOMPILE_BLS_G2_MSM_EFFECTIVE_CALLS               = 64
PRECOMPILE_BLS_PAIRING_CHECK_MILLER_LOOPS           = 128
PRECOMPILE_BLS_FINAL_EXPONENTIATIONS                = 32
PRECOMPILE_BLS_MAP_FP_TO_G1_EFFECTIVE_CALLS         = 64
PRECOMPILE_BLS_MAP_FP2_TO_G2_EFFECTIVE_CALLS        = 64
PRECOMPILE_BLS_C1_MEMBERSHIP_CALLS                  = 128
PRECOMPILE_BLS_C2_MEMBERSHIP_CALLS                  = 128
PRECOMPILE_BLS_G1_MEMBERSHIP_CALLS                  = 128
PRECOMPILE_BLS_G2_MEMBERSHIP_CALLS                  = 128
# Precompiles introduced from beta-v4.4
PRECOMPILE_P256_VERIFY_EFFECTIVE_CALLS              = 2048
