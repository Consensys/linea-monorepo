import net.ltgt.gradle.errorprone.CheckSeverity
import org.gradle.api.tasks.testing.logging.TestExceptionFormat
import org.jetbrains.kotlin.gradle.tasks.KotlinCompilationTask

plugins {
  alias(libs.plugins.errorprone)
  alias(libs.plugins.dependencyManagement)
  id "jacoco"
  id 'net.consensys.zkevm.kotlin-common-minimal-conventions'
}

subprojects.each {

  if (!it.project.plugins.hasPlugin("org.jetbrains.kotlin.jvm")) {
    it.project.apply plugin: libs.plugins.errorprone.get().getPluginId()

    it.project.dependencies {
      errorprone 'com.google.errorprone:error_prone_core'
    }
  }
}

allprojects {
  apply plugin: libs.plugins.dependencyManagement.get().getPluginId()
  dependencyManagement {
    dependencies {
      applyMavenExclusions = false

      dependencySet(group: 'com.fasterxml.jackson.core', version: libs.versions.jackson.get()) {
        entry 'jackson-databind'
        entry 'jackson-datatype'
        entry 'jackson-datatype-jdk8'
      }
      dependency "com.fasterxml.jackson.module:jackson-module-kotlin:${libs.versions.jackson.get()}"
      dependency "com.google.errorprone:error_prone_core:${libs.versions.errorproneCore.get()}"
      dependency "com.google.guava:guava:${libs.versions.guava.get()}-jre"
      dependency "com.squareup.okhttp3:okhttp:${libs.versions.okhttp.get()}"
      dependency "io.javalin:javalin:${libs.versions.javalin.get()}"
      dependencySet(group: 'info.picocli', version: libs.versions.picoli.get()) {
        entry 'picocli'
      }
      dependencySet(group: 'com.sksamuel.hoplite', version: libs.versions.hoplite.get()) {
        entry 'hoplite-core'
        entry 'hoplite-toml'
        entry 'hoplite-json'
      }
      dependency group: 'io.libp2p', name: 'jvm-libp2p', version: libs.versions.jvmLibp2p.get()
      dependency(
          group: 'io.netty',
          name: 'netty-transport-native-epoll',
          version: libs.versions.netty.get(),
          classifier: 'linux-x86_64',
          )
      dependency(
          group: 'io.netty',
          name: 'netty-transport-native-kqueue',
          version: libs.versions.netty.get(),
          classifier: 'osx-x86_64',
          )
      dependency "io.pkts:pkts-core:${libs.versions.pkts.get()}"
      dependencySet(group: 'io.consensys.tuweni', version: libs.versions.tuweni.get()) {
        entry 'tuweni-bytes'
        entry 'tuweni-config'
        entry 'tuweni-concurrent'
        entry 'tuweni-crypto'
        entry 'tuweni-devp2p'
        entry 'tuweni-io'
        entry 'tuweni-net'
        entry 'tuweni-rlp'
        entry 'tuweni-toml'
        entry 'tuweni-units'
      }
      dependencySet(group: 'org.http4k', version: libs.versions.http4k.get()) {
        entry 'http4k-core'
        entry 'http4k-client-okhttp'
        entry 'http4k-format-jackson'
        entry 'http4k-openapi'
      }
      imports {
        mavenBom("io.vertx:vertx-stack-depchain:${libs.versions.vertx.get()}")
      }
      dependency "org.assertj:assertj-core:${libs.versions.assertj.get()}"
      dependency "org.awaitility:awaitility-kotlin:${libs.versions.awaitility.get()}"
      dependencySet(group: 'org.bouncycastle', version: libs.versions.bouncycastle.get()) {
        entry 'bcpkix-jdk18on'
        entry 'bcprov-jdk18on'
      }
      dependencySet(group: 'org.mockito', version: libs.versions.mockito.get()) {
        entry 'mockito-core'
        entry 'mockito-junit-jupiter'
      }
      dependency "org.junit:junit-bom:${libs.versions.junit.get()}"
      dependency "org.mockito.kotlin:mockito-kotlin:${libs.versions.mockitoKotlin.get()}"
      dependency "org.rocksdb:rocksdbjni:${libs.versions.rocksdb.get()}"
      dependency "org.web3j:core:${libs.versions.web3j.get()}"
      dependencySet(group: 'com.palantir.docker.compose', version: libs.versions.dockerComposeRule.get()) {
        entry 'docker-compose-rule-junit4'
        entry 'docker-compose-junit-jupiter'
      }
      dependencySet(group: 'org.wiremock', version: libs.versions.wiremock.get()) {
        entry 'wiremock'
      }
      dependency("io.consensys.protocols:discovery:${libs.versions.discovery.get()}") {
        exclude group: 'io.consensys.tuweni', name: 'tuweni-bytes'
        exclude group: 'io.consensys.tuweni', name: 'tuweni-crypto'
        exclude group: 'io.consensys.tuweni', name: 'tuweni-units'
        exclude group: 'io.consensys.tuweni', name: 'tuweni-rlp'
      }
      dependencySet(group: 'tech.pegasys.teku.internal', version: libs.versions.teku.get()) {
        entry 'async'
        entry 'time'
        entry 'bytes'
        entry 'ethereum-events'
        entry 'infrastructure-events'
        entry 'spec'
        entry 'executionclient'
        entry 'unsigned'
        entry 'ssz'
        entry 'storage'
        entry 'p2p'
        entry 'eth2'
        entry 'logging'
      }
      dependencySet(group: 'org.apache.logging.log4j', version: libs.versions.log4j.get()) {
        entry 'log4j-api'
        entry 'log4j-core'
        entry 'log4j-slf4j-impl'
        entry 'log4j-slf4j2-impl'
      }
      def besuResolved = rootProject.file("linea-besu/besu/.besu-resolved")
      def besuVersion = besuResolved
          .readLines()
          .find { it.startsWith("besuVersion=") }
          .replace("besuVersion=", "")
      imports {
        mavenBom "org.hyperledger.besu:bom:$besuVersion"
        mavenBom "org.slf4j:slf4j-bom:${libs.versions.slf4j.get()}"
      }
      dependency "org.hyperledger.besu.internal:besu-plugins-rocksdb:$besuVersion"
      dependency "com.michael-bull.kotlin-result:kotlin-result:${libs.versions.kotlinResult.get()}"
      dependency "org.jetbrains.kotlinx:kotlinx-datetime:${libs.versions.kotlinxDatetime.get()}"
    }
  }
  apply plugin: 'java-library'

  tasks.withType(KotlinCompilationTask) {
    compilerOptions {
      freeCompilerArgs.add("-Xannotation-default-target=param-property")
    }
  }

  tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += [
      '-Xlint:unchecked',
      '-Xlint:cast',
      '-Xlint:rawtypes',
      '-Xlint:overloads',
      '-Xlint:divzero',
      '-Xlint:finally',
      '-Xlint:static',
      '-Werror',
    ]

    options.errorprone {
      excludedPaths = '.*/generated/*.*'
      disableWarningsInGeneratedCode = true
      // Our equals need to be symmetric, this checker doesn't respect that.
      check('EqualsGetClass', CheckSeverity.OFF)
      // We like to use futures with no return values.
      check('FutureReturnValueIgnored', CheckSeverity.OFF)
      // We use the JSR-305 annotations instead of the Google annotations.
      check('ImmutableEnumChecker', CheckSeverity.OFF)
      // This is a style check instead of an error-prone pattern.
      check('UnnecessaryParentheses', CheckSeverity.OFF)

      // This check is broken in Java 12.  See https://github.com/google/error-prone/issues/1257
      if (JavaVersion.current() == JavaVersion.VERSION_12) {
        check('Finally', CheckSeverity.OFF)
      }
      // This check is broken after Java 12.  See https://github.com/google/error-prone/issues/1352
      if (JavaVersion.current() > JavaVersion.VERSION_12) {
        check('TypeParameterUnusedInFormals', CheckSeverity.OFF)
      }

      check('FieldCanBeFinal', CheckSeverity.WARN)
      check('InsecureCryptoUsage', CheckSeverity.WARN)
      check('WildcardImport', CheckSeverity.WARN)
    }

    options.encoding = 'UTF-8'
  }

  // IntelliJ workaround to allow repeated debugging of unchanged code
  tasks.withType(JavaExec).configureEach {
    if (it.name.contains(".")) {
      outputs.upToDateWhen { false }
    }
  }

  test {
    jvmArgs += [
      // JDK 22+: Netty (Vert.x 5) loads native libs from the unnamed module; this opts in so tests do not fail on restricted native access.
      '--enable-native-access=ALL-UNNAMED',
      '-Xmx4g',
      '-XX:-UseGCOverheadLimit',
      // Mockito and jackson-databind do some strange reflection during tests.
      // This suppresses an illegal access warning.
      '--add-opens',
      'java.base/java.util=ALL-UNNAMED',
      '--add-opens',
      'java.base/java.util.concurrent=ALL-UNNAMED',
      '--add-opens',
      'java.base/java.util.concurrent.atomic=ALL-UNNAMED',
      // errorprone tests need access to the javac compiler
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.comp=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.main=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
      '--add-exports',
      'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    ]
    Set toImport = [
      'test.ethereum.include',
      'test.ethereum.state.eip',
      'root.log.level',
      'evm.log.level',
      'acctests.keepLogsOfPassingTests'
    ]
    for (String name : toImport) {
      if (System.getProperty(name) != null) {
        systemProperty name, System.getProperty(name)
      }
    }
    useJUnitPlatform {}
    testLogging {
      exceptionFormat TestExceptionFormat.FULL
      events 'skipped', 'failed'
      showStandardStreams = false
    }
  }

  tasks.withType(Test).configureEach {
    // Same as test.jvmArgs above: Vert.x / Netty native access on modern JDKs (also applies to other Test task types).
    jvmArgs("--enable-native-access=ALL-UNNAMED")
    // Java 25: Byte Buddy (pulled in by Mockito inline mocks) may not list 25 as supported yet;
    // this flag opts in so tests run until Byte Buddy catches up.
    jvmArgs("-Dnet.bytebuddy.experimental=true")
    systemProperties["junit.jupiter.execution.parallel.enabled"] = true
    systemProperties["junit.jupiter.execution.parallel.mode.default"] = "concurrent"
    systemProperties["junit.jupiter.execution.parallel.mode.classes.default"] = "concurrent"
    maxParallelForks = 1
  }
}

subprojects {
  apply plugin: "jacoco"

  tasks.withType(JavaCompile) {
    options.fork = true
    options.incremental = true
  }

  configurations {
    testSupportImplementation.extendsFrom implementation
    testSupportArtifacts
  }

  // Gradle 9: do not declare `integrationTestImplementation` in the `configurations { }` block above.
  // Defining it before `sourceSets { integrationTest { } }` (e.g. in :app) causes a duplicate name error.
  // After evaluation, extend the configuration only if the integrationTest source set created it.
  afterEvaluate { subproject ->
    def integrationTestImpl = subproject.configurations.findByName("integrationTestImplementation")
    if (integrationTestImpl != null) {
      integrationTestImpl.extendsFrom(subproject.configurations.implementation)
    }

    // making sure assemble task invokes integration test compile
    project.tasks.jacocoTestReport {
      if (project.tasks.findByName('acceptanceTest')) {
        executionData(tasks.named("acceptanceTest").get())
        sourceSets(sourceSets.named("acceptanceTest").get())
      }
    }

    if (subproject.tasks.findByName('compileIntegrationTestJava')) {
      subproject.tasks.assemble.dependsOn compileIntegrationTestJava
    }
  }
}

task jacocoAggregatedReport(type: JacocoReport) {
  group = "verification"

  additionalSourceDirs.from files(subprojects.sourceSets.main.allSource.srcDirs)
  sourceDirectories.from files(subprojects.sourceSets.main.allSource.srcDirs)
  classDirectories.from files(subprojects.sourceSets.main.output)

  executionData.from fileTree(dir: '.', includes: ['**/jacoco/*.exec'])
  reports {
    xml.required = true
    html.required = true
    // Gradle 9: `html.destination` was removed from the reporting API; use `outputLocation` instead.
    html.outputLocation.set(layout.buildDirectory.dir("reports/jacocoHtml"))
  }
}

apply plugin: 'application'

