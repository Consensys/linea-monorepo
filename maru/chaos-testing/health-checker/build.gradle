import org.gradle.api.tasks.testing.logging.TestExceptionFormat
import org.gradle.api.tasks.testing.logging.TestLogEvent

plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
}

dependencies {
  implementation(project(':maru:jvm-libs:extensions'))
  implementation project(':maru:jvm-libs:test-utils')
  implementation project(':maru:api')
  implementation(project(':jvm-libs:linea:testing:file-system'))
  implementation(project(':jvm-libs:linea:web3j-extensions')) {
    exclude group: "build.linea", module: "besu-libs"
  }

  implementation("org.http4k:http4k-core:${libs.versions.http4k.get()}")
  implementation("org.http4k:http4k-client-okhttp:${libs.versions.http4k.get()}")
  implementation("org.http4k:http4k-format-jackson:${libs.versions.http4k.get()}")
}

sourceSets {
  acceptanceTest {
    kotlin {
      compileClasspath += main.output
      runtimeClasspath += main.output
    }
    compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath + sourceSets.test.compileClasspath
    runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath + sourceSets.test.runtimeClasspath
  }
}

dependencies {
  acceptanceTestImplementation "org.awaitility:awaitility-kotlin:${libs.versions.awaitility.get()}"
}

build.dependsOn compileAcceptanceTestKotlin

tasks.register('acceptanceTest', Test) { test ->
  description = "Runs acceptance tests."
  group = "verification"
  useJUnitPlatform()
  outputs.upToDateWhen { false }

  classpath = sourceSets.acceptanceTest.runtimeClasspath
  testClassesDirs = sourceSets.acceptanceTest.output.classesDirs

  // Forward any -Dexperiment.* flags from the Gradle command line into the test JVM.
  // Example: ./gradlew acceptanceTest -Dexperiment.latency=100ms
  System.properties.each { key, value ->
    if (key.toString().startsWith("experiment.")) {
      systemProperty key, value
    }
  }

  testLogging {
    events TestLogEvent.FAILED,
        TestLogEvent.SKIPPED,
        TestLogEvent.STANDARD_ERROR
    exceptionFormat TestExceptionFormat.FULL
    showCauses true
    showExceptions true
    showStackTraces true
    // set showStandardStreams if you need to see test logs
    showStandardStreams true
  }
}
