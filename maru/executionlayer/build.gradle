plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
}

dependencies {
  implementation(project(':maru:core'))
  implementation(project(':maru:config'))

  implementation(project(':maru:jvm-libs:mappers'))
  implementation(project(':maru:jvm-libs:extensions'))

  api "tech.pegasys.teku.internal:executionclient:${libs.versions.teku.get()}"

  api("tech.pegasys.teku.internal:time:${libs.versions.teku.get()}")
  api("tech.pegasys.teku.internal:ethereum-events:${libs.versions.teku.get()}")
  implementation "tech.pegasys.teku.internal:unsigned:${libs.versions.teku.get()}"
  implementation "tech.pegasys.teku.internal:bytes:${libs.versions.teku.get()}"
  implementation "tech.pegasys.teku.internal:spec:${libs.versions.teku.get()}"
  implementation project(':jvm-libs:linea:core:metrics')

  testImplementation (group: 'tech.pegasys.teku.internal', name: 'spec', version: libs.versions.teku.get(), classifier: 'test-fixtures')
  testImplementation(project(':maru:test-fixtures'))
  testImplementation(testFixtures(project(':jvm-libs:generic:extensions:kotlin')))
}
