plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
  alias(libs.plugins.dependencyManagement)
}

apply from: "${rootProject.projectDir}/maru/gradle/versions.gradle"

dependencies {
  implementation "build.linea.internal:metrics"
  implementation "build.linea.internal:long-running-service"
  implementation "com.fasterxml.jackson.module:jackson-module-kotlin"
  implementation "io.javalin:javalin"
  implementation project(':maru:core')
  implementation project(':maru:p2p')
  implementation project(':maru:jvm-libs:extensions')

  testImplementation(testFixtures(project(':maru:core')))
  testImplementation(project(':maru:syncing'))
  testImplementation("com.squareup.okhttp3:okhttp")
}
