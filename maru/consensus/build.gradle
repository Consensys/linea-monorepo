plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
}

dependencies {
  implementation(project(':maru:core'))
  implementation(project(':maru:serialization'))
  implementation(project(':maru:config'))
  implementation(project(':maru:p2p'))
  implementation(project(':maru:crypto'))
  implementation(project(':maru:jvm-libs:extensions'))
  implementation(project(':maru:jvm-libs:mappers'))
  implementation(project(':maru:executionlayer')) {
    because "because of protocol builders"
  }

  api("org.hyperledger.besu.internal:besu-consensus-common") {
    because("API of the BftEventHandler interface")
  }
  implementation("org.hyperledger.besu.internal:besu-ethereum-core")
  implementation("org.hyperledger.besu.internal:besu-ethereum-rlp")
  implementation("org.hyperledger.besu.internal:besu-crypto-algorithms")
  implementation("org.hyperledger.besu.internal:besu-crypto-services")
  implementation("org.hyperledger.besu.internal:besu-ethereum-p2p")
  implementation("org.hyperledger.besu.internal:besu-config")
  api("org.hyperledger.besu.internal:besu-ethereum-blockcreation") {
    because("of the BlockCreator")
  }
  implementation "org.hyperledger.besu.internal:besu-consensus-qbft-core"
  implementation("org.hyperledger.besu.internal:besu-util")
  implementation("org.hyperledger.besu:besu-datatypes")
  implementation("org.hyperledger.besu:besu-evm")

  implementation "tech.pegasys.teku.internal:executionclient:${libs.versions.teku.get()}"
  implementation "tech.pegasys.teku.internal:spec:${libs.versions.teku.get()}"

  implementation project(':jvm-libs:linea:core:long-running-service')


  testImplementation(testFixtures(project(':maru:core')))
  testImplementation(testFixtures(project(':maru:crypto')))
  testImplementation(project(':maru:jvm-libs:test-utils'))
  testImplementation "org.jetbrains.kotlin:kotlin-test:2.1.0"
  testImplementation "tech.pegasys.teku.internal:executionclient:${libs.versions.teku.get()}"
  testImplementation "tech.pegasys.teku.internal:spec:${libs.versions.teku.get()}"
  testImplementation project(':jvm-libs:linea:core:metrics')
}
