import org.gradle.api.tasks.testing.logging.TestExceptionFormat
import org.gradle.api.tasks.testing.logging.TestLogEvent

plugins {
  id 'net.consensys.zkevm.kotlin-application-conventions'
  alias(libs.plugins.dependencyManagement)
}

apply from: "${rootProject.projectDir}/maru/gradle/versions.gradle"

sourceSets {
  integrationTest {
    kotlin {
      compileClasspath += main.output
      runtimeClasspath += main.output
    }
    compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath + sourceSets.test.compileClasspath
    runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath + sourceSets.test.runtimeClasspath
  }
}

dependencies {
  implementation(project(':maru:api'))
  implementation(project(':maru:config'))
  implementation(project(':maru:consensus'))
  implementation(project(':maru:core'))
  implementation(project(':maru:executionlayer'))
  implementation(project(':maru:p2p'))
  implementation(project(':maru:storage'))
  implementation(project(':maru:syncing'))
  implementation(project(':maru:crypto'))
  implementation(project(':maru:serialization'))
  implementation(project(':maru:observability'))
  implementation(project(':maru:syncing'))
  implementation(project(':maru:jvm-libs:teku-web3j'))
  api(project(':maru:linea-finalization-provider')) {
    exclude group: "build.linea", module: "besu-libs"
  }
  implementation(project(':jvm-libs:linea:web3j-extensions')) {
    exclude group: "build.linea", module: "besu-libs"
  }
  implementation(project(':maru:jvm-libs:extensions'))
  implementation(project(':maru:jvm-libs:mappers'))

  implementation project(':jvm-libs:generic:extensions:futures')
  implementation project(':jvm-libs:linea:core:long-running-service')

  // Previously inherited from maru's `maru.kotlin-application-conventions` plugin (which the
  // import dropped in favor of zkevm's lighter `net.consensys.zkevm.kotlin-application-conventions`).
  // Resolved via maru/gradle/versions.gradle until the catalog fold replaces these with project
  // references / catalog accessors.
  implementation project(':jvm-libs:linea:core:metrics')
  implementation project(':jvm-libs:linea:metrics:micrometer')
  implementation project(':jvm-libs:generic:vertx-helper')
  implementation "io.vertx:vertx-micrometer-metrics"

  implementation "info.picocli:picocli"
  implementation "com.sksamuel.hoplite:hoplite-core"

  implementation("org.hyperledger.besu.internal:besu-consensus-qbft-core")
  implementation("org.hyperledger.besu.internal:besu-metrics-core")
  implementation("org.hyperledger.besu.internal:besu-crypto-algorithms")
  implementation("tech.pegasys.teku.internal:p2p")
  implementation("tech.pegasys.teku.internal:eth2")
  implementation ("io.consensys.protocols:discovery")

  integrationTestRuntimeOnly("org.junit.platform:junit-platform-launcher")
  integrationTestImplementation 'org.jetbrains.kotlinx:kotlinx-datetime'
  integrationTestImplementation(project(':maru:jvm-libs:test-utils'))
  integrationTestImplementation(testFixtures(project(':maru:p2p')))
  integrationTestImplementation(testFixtures(project(':maru:crypto')))
  integrationTestImplementation("org.hyperledger.besu.internal:besu-crypto-services")
  integrationTestImplementation "org.hyperledger.besu.internal:besu-ethereum-api"
  integrationTestImplementation(group: 'org.hyperledger.besu.internal', name: 'besu-ethereum-core', classifier: 'test-support')
  integrationTestImplementation("org.hyperledger.besu.internal:besu-ethereum-p2p")
  integrationTestImplementation("org.hyperledger.besu.internal:besu-consensus-qbft-core")
  integrationTestImplementation("com.squareup.okhttp3:okhttp")
  integrationTestImplementation("io.javalin:javalin")
  testImplementation(testFixtures(project(':maru:core')))
}

// Besu and Teku have similar versioning and some modules are also named the same. This creates conflicts when
// dependencies are collected
tasks.named("distTar").configure {
  enabled = false // disable from build, not used
  duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

tasks.named("distZip").configure {
  enabled = false // disable from build, not used
  duplicatesStrategy = DuplicatesStrategy.INCLUDE
}

application {
  mainClass = 'maru.app.CliEntrypoint'
}

jar {
  archiveBaseName = 'maru'
  manifest {
    attributes(
        'Class-Path': project.configurations.runtimeClasspath
        .collect {
          it.getName()
        }
        .findAll {
          it.endsWith('jar')
        }
        .join(' '),
        'Main-Class': 'maru.app.CliEntrypoint',
        'Multi-Release': 'true'
        )
  }
}

task integrationTest(type: Test) {
  description = "Runs integration tests."
  group = "verification"
  useJUnitPlatform()

  classpath = sourceSets.integrationTest.runtimeClasspath
  testClassesDirs = sourceSets.integrationTest.output.classesDirs

  // To make room for Besu threads
  systemProperties["junit.jupiter.execution.parallel.config.strategy"] = "fixed"
  int maxThreads = Runtime.runtime.availableProcessors().intdiv(2) ?: 1
  systemProperties["junit.jupiter.execution.parallel.config.fixed.max-pool-size"] = maxThreads
  systemProperties["junit.jupiter.execution.parallel.config.fixed.parallelism"] = maxThreads

  testLogging {
    events TestLogEvent.FAILED,
        TestLogEvent.SKIPPED,
        TestLogEvent.STANDARD_ERROR
    // TestLogEvent.STARTED,
    // TestLogEvent.PASSED
    exceptionFormat TestExceptionFormat.FULL
    showCauses true
    showExceptions true
    showStackTraces true
    // set showStandardStreams if you need to see test logs
    showStandardStreams false
  }
}

afterEvaluate {
  // Integration tests are getting unstable when running concurrently with other tests
  tasks.named('integrationTest') {
    mustRunAfter rootProject.subprojects.collect {
      it.tasks.matching {
        it.name == 'test'
      }
    }.flatten()
  }
}

check.dependsOn(integrationTest)
