plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
  id 'java-test-fixtures'
}

dependencies {
  implementation project(":maru:config")
  implementation project(":maru:serialization")
  implementation project(":maru:crypto")
  implementation project(":maru:core")
  implementation project(":maru:observability")

  api "io.libp2p:jvm-libp2p"

  implementation "tech.pegasys.teku.internal:p2p"
  implementation "tech.pegasys.teku.internal:eth2"
  implementation "tech.pegasys.teku.internal:spec"
  implementation "tech.pegasys.teku.internal:storage"
  implementation "tech.pegasys.teku.internal:unsigned"
  implementation "tech.pegasys.teku.internal:time"

  implementation "org.hyperledger.besu:besu-plugin-api"
  implementation "org.hyperledger.besu.internal:besu-metrics-core"
  implementation "org.hyperledger.besu.internal:besu-ethereum-rlp"
  implementation "org.hyperledger.besu.internal:besu-ethereum-p2p"
  implementation "org.hyperledger.besu.internal:besu-consensus-qbft-core"

  implementation "io.consensys.tuweni:tuweni-crypto"
  implementation "io.consensys.tuweni:tuweni-rlp"

  implementation project(":jvm-libs:linea:core:metrics")
  implementation project(":jvm-libs:generic:extensions:futures")
  implementation project(":jvm-libs:linea:core:long-running-service")

  implementation 'io.consensys.protocols:discovery'
  implementation 'org.jetbrains.kotlinx:kotlinx-datetime'

  implementation(project(":maru:core"))

  testImplementation(testFixtures(project(":maru:core")))

  testFixturesImplementation(project(":maru:serialization"))
  testFixturesImplementation(project(":maru:crypto"))
  testFixturesImplementation(testFixtures(project(":maru:core")))
}
