codecov:
  max_report_age: off
  notify:
    wait_for_ci: false
  require_ci_to_pass: false

comment:
  behavior: default
  hide_project_coverage: false
  layout: "diff, flags, files"
  require_base: false
  require_changes: false
  require_head: true
  show_carryforward_flags: true

coverage:
  precision: 2
  range: 60..80
  round: down
  status:
    changes: false
    default_rules:
      flag_coverage_not_uploaded_behavior: include
    patch: true
    project: true

flags:
  hardhat:
    paths:
      - contracts/
    carryforward: true
  kotlin:
    paths:
      - coordinator/
      - jvm-libs/
    carryforward: true
  postman:
    paths:
      - postman/
    carryforward: true
  sdk-viem:
    paths:
      - sdk/sdk-viem/
    carryforward: true
  sdk-core:
    paths:
      - sdk/sdk-core/
    carryforward: true
  linea-shared-utils:
    paths:
      - ts-libs/linea-shared-utils/
    carryforward: true
  native-yield-automation-service:
    paths:
      - native-yield-operations/automation-service/
    carryforward: true
  lido-governance-monitor:
    paths:
      - native-yield-operations/lido-governance-monitor/
    carryforward: true
  linea-native-libs:
    paths:
      - ts-libs/linea-native-libs/
    carryforward: true
  sdk-ethers:
    paths:
      - sdk/sdk-ethers/
    carryforward: true
  tracer:
    paths:
      - tracer/
    carryforward: true
  prover:
    paths:
      - prover/
    carryforward: true

github_checks:
  annotations: false
slack_app: false