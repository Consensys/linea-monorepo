# git-cliff configuration
# Shared across monorepo sub-projects. Filters (--include-path, --tag-pattern)
# are supplied per-project on the CLI / in the workflow.
# NOTE: adjust sections/parsers to match the changelog format in the Notion
# SDLC Release Process doc.

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
  {% if commit.breaking %}[**breaking**] {% endif %}\
  {{ commit.message | upper_first }}\
  {% if commit.id %} ({{ commit.id | truncate(length=7, end="") }}){% endif %}
{% endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = false
filter_commits = true
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs?", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^chore\\(deps\\)", group = "Dependencies" },
  { message = "^deps", group = "Dependencies" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore", group = "Miscellaneous" },
  { body = ".*security", group = "Security" },
]
# tag_pattern can be overridden per-project via `--tag-pattern` on the CLI.
