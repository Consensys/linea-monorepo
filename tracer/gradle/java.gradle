import org.gradle.jvm.toolchain.JavaLanguageVersion

apply plugin: 'java-library'

java {
    // Keep Gradle runtime JVM flexible (e.g. JDK 21 in CI) while enforcing
    // Java 25 for compilation via toolchains.
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
    sourceCompatibility = 25
    targetCompatibility = 25

    consistentResolution {
        useCompileClasspathVersions()
    }
}

tasks.withType(JavaCompile) {
  options.compilerArgs += [
    '-Xlint:unchecked',
    '-Xlint:cast',
    '-Xlint:rawtypes',
    '-Xlint:overloads',
    '-Xlint:divzero',
    '-Xlint:finally',
    '-Xlint:static',
  ]
  options.compilerArgs.remove('-Werror')
  options.encoding = 'UTF-8'
}

// Takes the version, and if it equals "SNAPSHOT" or the suffix is "-SNAPSHOT" replaces SNAPSHOT
// with the git commit version.
ext.calculateVersion = { ->
  def lineaTracerProject = project(lineaTracerProjectPath)
  String version = lineaTracerProject.version
  if (version.equals("SNAPSHOT") || version.endsWith("-SNAPSHOT")) {
    def lastSnapshot = version.lastIndexOf("SNAPSHOT")
    version = version.substring(0, lastSnapshot) + "dev-${getCheckedOutGitCommitHash()}"
  }

  return version
}

static def getCheckedOutGitCommitHash() {
  def hashLength = 7
  "git rev-parse HEAD".execute().text.take(hashLength)
}
