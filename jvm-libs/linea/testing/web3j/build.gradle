plugins {
  id 'net.consensys.zkevm.kotlin-library-conventions'
}

description = "Linea test utilities for Web3j"

dependencies {
  implementation "org.web3j:core:${libs.versions.web3j.get()}"
  implementation "org.assertj:assertj-core:${libs.versions.assertj.get()}"
  implementation "org.awaitility:awaitility-kotlin:${libs.versions.awaitility.get()}"
}
