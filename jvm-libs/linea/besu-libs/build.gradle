plugins {
  id 'net.consensys.zkevm.kotlin-library-minimal-conventions'
  id 'java-library'
}

dependencies {
  api("${besuArtifactGroup}:besu-datatypes") {
    transitive = false
  }
  api("${besuArtifactGroup}:besu-evm") {
    transitive = false
  }
  api("${besuArtifactGroup}.internal:besu-ethereum-core") {
    transitive = false
  }
  api("${besuArtifactGroup}.internal:besu-crypto-algorithms") {
    transitive = false
  }

  api("${besuArtifactGroup}:besu-plugin-api") {
    transitive = false
  }

  api("${besuArtifactGroup}.internal:besu-ethereum-rlp") {
    transitive = false
  }

  api("io.consensys.tuweni:tuweni-bytes:${libs.versions.tuweni.get()}") {
    transitive = false
  }

  api("io.consensys.tuweni:tuweni-units:${libs.versions.tuweni.get()}") {
    transitive = false
  }

  implementation("org.bouncycastle:bcpkix-jdk18on:${libs.versions.bouncycastle.get()}") {
    because "necessary for besu Transaction object that verifies signatures"
  }
  implementation("org.bouncycastle:bcprov-jdk18on:${libs.versions.bouncycastle.get()}") {
    because "necessary for besu Transaction object that verifies signatures"
  }
}
