project:
  name: linea
  description: Linea Java libraries
  authors:
    - Linea team
  license: Apache-2.0
  links:
    homepage: https://linea.build/
  languages:
    java:
      groupId: build.linea

release:
  github:
    overwrite: true
    tagName: "{{env.JRELEASER_TAG_NAME}}"
    releaseName: "{{env.JRELEASER_RELEASE_NAME}}"
    files: false
    artifacts: false
    changelog:
      enabled: false
    commitAuthor:
      name: Linea automations
      email: linea-automations@consensys.net

signing:
  active: ALWAYS
  pgp:
    armored: true

deploy:
  maven:
    mavenCentral:
      sonatype:
        active: ALWAYS
        url: https://central.sonatype.com/api/v1/publisher
        # namespace is set per-run via JRELEASER_MAVENCENTRAL_NAMESPACE env var:
        #   - public libs  -> build.linea
        #   - internal libs -> build.linea.internal
        #   - all-libs release -> build.linea (covers build.linea.internal sub-namespace)
        stagingRepositories:
          - build/staging-deploy
