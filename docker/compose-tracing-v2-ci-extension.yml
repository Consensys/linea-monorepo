include:
  - compose-tracing-v2.yml

services:
  web3signer:
    extends:
      file: compose-spec-l2-services.yml
      service: web3signer

  shomei-frontend:
    extends:
      file: compose-spec-l2-services.yml
      service: shomei-frontend

  postman:
    extends:
      file: compose-spec-l2-services.yml
      service: postman

  transaction-exclusion-api:
    extends:
      file: compose-spec-l2-services.yml
      service: transaction-exclusion-api
  
  sequencer:
    extends:
      file: compose-spec-l2-services.yml
      service: sequencer
    environment:
      BESU_PLUGIN_LINEA_LIVENESS_ENABLED: true
